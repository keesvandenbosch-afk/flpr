function ExportImportModal({ profiles, onImport, onClose }) {
  const [tab,        setTab]        = React.useState("export");
  const [maskTokens, setMaskTokens] = React.useState(true);
  const [importText, setImportText] = React.useState("");
  const [importMode, setImportMode] = React.useState("merge");
  const [importErr,  setImportErr]  = React.useState(null);
  const [importOk,   setImportOk]   = React.useState(null);
  const fileRef = React.useRef(null);

  const buildExport = () => ({
    _flpr: "backup", _version: 1,
    _exportedAt: new Date().toISOString(),
    _tokensMasked: maskTokens,
    profiles: profiles.map(p => ({
      ...p,
      config: maskTokens ? { ...p.config, token: "MASKED" } : p.config,
      werksets: (p.werksets||[]).map(w => ({ id:w.id, name:w.name, schedule:w.schedule, connectors:w.connectors||[] }))
    }))
  });

  const handleExport = () => {
    const json = JSON.stringify(buildExport(), null, 2);
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([json], { type:"application/json" }));
    a.download = "flpr-backup-" + new Date().toISOString().slice(0,10) + ".json";
    a.click();
  };

  const handleFileLoad = e => {
    const file = e.target.files?.[0]; if (!file) return;
    const r = new FileReader();
    r.onload = ev => { setImportText(ev.target.result||""); setImportErr(null); setImportOk(null); };
    r.readAsText(file);
  };

  const doImport = () => {
    setImportErr(null); setImportOk(null);
    let parsed;
    try { parsed = JSON.parse(importText); } catch(e2) { setImportErr("Ongeldig JSON-bestand."); return; }
    if (parsed._flpr !== "backup" || !Array.isArray(parsed.profiles)) { setImportErr("Geen geldig FLPR backup-bestand."); return; }
    if (parsed._tokensMasked) { setImportErr("Tokens zijn gemaskeerd in dit bestand. Verbindingen opnieuw instellen na import."); return; }
    if (!parsed.profiles.length) { setImportErr("Geen profielen gevonden."); return; }
    onImport(parsed.profiles, importMode);
    setImportOk(parsed.profiles.length + " profiel(en) geimporteerd.");
  };

  const ex = buildExport();
  const pc = ex.profiles.length;
  const wc = ex.profiles.reduce((s,p)=>s+(p.werksets?.length||0),0);
  const cc = ex.profiles.reduce((s,p)=>s+(p.werksets||[]).reduce((ss,w)=>ss+(w.connectors?.length||0),0),0);

  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{width:500}}>
        <div className="mh">
          <div className="mtitle">Backup &amp; Herstel</div>
          <div className="mclose" onClick={onClose}>X</div>
        </div>
        <div style={{display:"flex",borderBottom:"1px solid var(--b1)"}}>
          {[["export","Exporteren"],["import","Importeren"]].map(([k,lbl])=>(
            <div key={k} onClick={()=>setTab(k)}
              style={{padding:".5rem 1rem",fontSize:".72rem",fontWeight:600,cursor:"pointer",
                fontFamily:"var(--mono)",letterSpacing:".06em",textTransform:"uppercase",
                color:tab===k?"var(--neon-amber)":"var(--t3)",
                borderBottom:tab===k?"2px solid var(--neon-amber)":"2px solid transparent"}}>
              {lbl}
            </div>
          ))}
        </div>
        <div className="mb" style={{display:"flex",flexDirection:"column",gap:".8rem"}}>
          {tab==="export" && (<>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:".5rem"}}>
              {[[pc,"profielen","var(--neon-amber)"],[wc,"werksets","var(--neon-cyan)"],[cc,"connectors","var(--neon-green)"]].map(([n,lbl,col])=>(
                <div key={lbl} style={{background:"var(--s2)",border:"1px solid var(--b1)",borderRadius:4,padding:".5rem",textAlign:"center"}}>
                  <div style={{fontFamily:"var(--mono)",fontSize:"1.2rem",fontWeight:700,color:col}}>{n}</div>
                  <div style={{fontSize:".6rem",color:"var(--t3)",textTransform:"uppercase",fontFamily:"var(--mono)"}}>{lbl}</div>
                </div>
              ))}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:".65rem",background:"var(--s2)",border:"1px solid var(--b1)",borderRadius:4,padding:".6rem .8rem"}}>
              <Toggle value={maskTokens} onChange={setMaskTokens} label="" />
              <div>
                <div style={{fontSize:".72rem",fontWeight:600,color:"var(--t1)"}}>Tokens maskeren (aanbevolen)</div>
                <div style={{fontSize:".62rem",color:"var(--t3)"}}>{maskTokens?"Veilig: tokens worden NIET meegenomen":"Tokens worden meegenomen in plaintext"}</div>
              </div>
            </div>
            {!maskTokens && <div className="notice n-red" style={{fontSize:".68rem"}}>Let op: bewaar dit bestand op een veilige locatie.</div>}
            <div className="notice n-blue" style={{fontSize:".67rem"}}>Run-historie wordt niet meegenomen in de export.</div>
            <button className="btn btn-primary" style={{alignSelf:"flex-start"}} onClick={handleExport}>Backup downloaden</button>
          </>)}
          {tab==="import" && (<>
            <div className="notice n-blue" style={{fontSize:".67rem"}}>Importeer een eerder geexporteerd FLPR backup-bestand. Bestanden met gemaskeerde tokens kunnen niet worden geimporteerd.</div>
            <div>
              <div className="flbl" style={{marginBottom:".35rem"}}>Bestand kiezen</div>
              <input ref={fileRef} type="file" accept=".json" onChange={handleFileLoad} style={{display:"none"}} />
              <div style={{display:"flex",gap:".5rem",alignItems:"center"}}>
                <button className="btn btn-ghost" onClick={()=>fileRef.current&&fileRef.current.click()}>Bestand kiezen...</button>
                {importText && <span style={{fontSize:".67rem",color:"var(--neon-green)",fontFamily:"var(--mono)"}}>{(importText.length/1024).toFixed(1)} KB geladen</span>}
              </div>
            </div>
            <div>
              <div className="flbl" style={{marginBottom:".35rem"}}>Importmodus</div>
              <div style={{display:"flex",gap:".5rem"}}>
                {[["merge","Samenvoegen"],["replace","Vervangen"]].map(([v,lbl])=>(
                  <button key={v} onClick={()=>setImportMode(v)} className={"btn " + (importMode===v?"btn-primary":"btn-ghost")} style={{fontSize:".68rem"}}>{lbl}</button>
                ))}
              </div>
              <div style={{fontSize:".62rem",color:"var(--t3)",marginTop:".3rem"}}>{importMode==="merge"?"Voegt profielen toe naast bestaande.":"Verwijdert en vervangt alle huidige profielen."}</div>
            </div>
            {importMode==="replace" && <div className="notice n-red" style={{fontSize:".67rem"}}>Waarschuwing: dit verwijdert al je huidige profielen. Niet ongedaan te maken.</div>}
            {importErr && <div className="notice n-red"  style={{fontSize:".7rem"}}>{importErr}</div>}
            {importOk  && <div className="notice n-green" style={{fontSize:".7rem"}}>{importOk}</div>}
            <button className="btn btn-primary" disabled={!importText} style={{alignSelf:"flex-start"}} onClick={doImport}>Importeren</button>
          </>)}
        </div>
        <div className="mf">
          <button className="btn btn-ghost" onClick={onClose}>Sluiten</button>
        </div>
      </div>
    </div>
  );
}


function App() {
  // ── Profiles: [{id, name, config, werksets:[{id,name,connectors}], activeWerksetId}] ──
  const [profiles, setProfiles] = useState(() => {
    const saved = LS.get("afas_profiles", []);
    // Migrate: add werkset layer to old profiles that have connectors directly
    const migrated = saved.map(p => {
      if (p.werksets) return p; // already migrated
      const ws = { id: uid(), name: "Standaard", connectors: p.connectors || [] };
      return { ...p, werksets: [ws], activeWerksetId: ws.id, connectors: undefined };
    });
    if (migrated.length === 0) {
      const cfg  = LS.get("afas_cfg", null);
      const cons = LS.get("afas_conns", []);
      if (cfg) {
        const ws = { id: uid(), name: "Standaard", connectors: cons };
        return [{ id: "legacy", name: cfg.env + " (" + (cfg.envType||"productie") + ")", config: cfg, werksets: [ws], activeWerksetId: ws.id }];
      }
    }
    return migrated;
  });
  const [activeProfileId, setActiveProfileId] = useState(() => {
    const saved = LS.get("afas_profiles", []);
    if (saved.length === 0 && LS.get("afas_cfg", null)) return "legacy";
    return LS.get("afas_active_profile", null) || saved[0]?.id || null;
  });
  const [showProfiles,  setShowProfiles]  = useState(false);
  const [showWerksets,  setShowWerksets]  = useState(false);
  const [editWerkset,   setEditWerkset]   = useState(null); // {profileId, werkset} | null

  const activeProfile    = profiles.find(p => p.id === activeProfileId) || profiles[0] || null;
  const config           = activeProfile?.config || null;
  const activeWerksetId  = activeProfile?.activeWerksetId || activeProfile?.werksets?.[0]?.id || null;
  const activeWerkset    = activeProfile?.werksets?.find(w => w.id === activeWerksetId) || activeProfile?.werksets?.[0] || null;
  const connectors       = activeWerkset?.connectors || [];
  const werksets         = activeProfile?.werksets || [];

  useEffect(() => { LS.set("afas_profiles", profiles); }, [profiles]);
  useEffect(() => { LS.set("afas_active_profile", activeProfileId); }, [activeProfileId]);

  // Patch helpers
  const patchProfile  = (pid, fn) => setProfiles(prev => prev.map(p => p.id===pid ? {...p, ...fn(p)} : p));

  // ── Werkset runner ─────────────────────────────────────────────────────────
  const [werksetRunning, setWerksetRunning] = useState(null); // werkset id currently running
  const [showRunConfirm, setShowRunConfirm] = useState(null); // werkset | null
  const [pendingPreview, setPendingPreview] = useState(null); // previewData | null
  const [lastRunLog,     setLastRunLog]     = useState({});   // { [werksetId]: [log, ...] }
  const [runProgress,    setRunProgress]    = useState(null); // { connName, done, total, connector } | null
  const runAbortRef = React.useRef(null); // AbortController for active run
  const [tokenExpiredAlert, setTokenExpiredAlert] = useState(false); // toon token-verlopen banner
  const MAX_RUNS_PER_WERKSET = 20; // bewaar max N runs per werkset (voorkomt localStorage overflow)
  const [showWerksetPopup, setShowWerksetPopup] = useState(false);

  // ── Interval scheduler: polls active interval werksets while tab is open ──
  useEffect(() => {
    if (!activeWerkset || !activeProfile) return;
    const sched = activeWerkset.schedule;
    if (!sched?.enabled || sched.mode !== "interval") return;

    const check = () => {
      const now   = new Date();
      const dow   = now.getDay();
      const dom   = now.getDate();
      const dayOk = sched.freq === "daily" ? true
        : sched.freq === "weekly"  ? (sched.days||[]).includes(dow)
        : sched.freq === "monthly" ? (sched.days||[]).includes(dom)
        : false;
      if (!dayOk) return;
      const [fh,fm] = (sched.windowFrom||"00:00").split(":").map(Number);
      const [th,tm] = (sched.windowTo  ||"23:59").split(":").map(Number);
      const mins = now.getHours()*60 + now.getMinutes();
      const fromMins = fh*60+fm, toMins = th*60+tm;
      if (mins < fromMins || mins >= toMins) return;
      if (!werksetRunning) executeRun(activeWerkset, null);
    };

    const tid = setInterval(check, (sched.intervalSec||300) * 1000);
    return () => clearInterval(tid);
  }, [activeWerkset?.id, activeWerkset?.schedule?.enabled, activeWerkset?.schedule?.intervalSec,
      activeWerkset?.schedule?.windowFrom, activeWerkset?.schedule?.windowTo, werksetRunning]);

  const runWerksetNow = (werkset) => {
    if (werksetRunning) return;
    setShowRunConfirm(werkset);
  };

  const executeRun = async (werkset, previewData) => {
    setShowRunConfirm(null);
    setPendingPreview(null);
    const abort = new AbortController();
    runAbortRef.current = abort;
    setWerksetRunning(werkset.id);
    setRunProgress({ connName: "Ophalen…", done: 0, total: 0, saved: 0, failed: 0 });
    try {
      const log = await runWerkset(werkset, activeProfile.config, previewData,
        prog => setRunProgress(prog),
        abort.signal
      );
      // Bewaar max MAX_RUNS_PER_WERKSET runs (strip rij-data van oudste runs om storage te sparen)
      setLastRunLog(p => {
        const prev = p[werkset.id] || [];
        const trimmed = prev.map((r, i) => i < prev.length - MAX_RUNS_PER_WERKSET + 1
          ? { ...r, connectors: r.connectors.map(c => ({ ...c, rows: [] })) } // strip rows van oude runs
          : r
        );
        const next = [...trimmed, log].slice(-MAX_RUNS_PER_WERKSET);
        return { ...p, [werkset.id]: next };
      });
      patchWerkset(activeProfile.id, werkset.id, w => ({
        lastRun: { at: log.startedAt, saved: log.totalSaved, failed: log.totalFailed }
      }));
    } catch(e) {
      alert("Uitvoerfout: " + e.message);
    } finally {
      runAbortRef.current = null;
      setWerksetRunning(null);
      setRunProgress(null);
    }
  };

  const cancelRun = () => {
    if (runAbortRef.current) {
      runAbortRef.current.abort();
      setRunProgress(p => p ? { ...p, connName: "Annuleren…" } : p);
    }
  };

  const executeDryRun = async (werkset, previewData) => {
    setShowRunConfirm(null);
    // Build a dry-run log from preview data (no actual writes)
    const log = {
      startedAt: new Date().toISOString(),
      finishedAt: new Date().toISOString(),
      isDryRun: true,
      skipped: previewData.skipped || [],
      connectors: (previewData.connectors || []).map(c => ({
        name: c.name,
        updateConn: c.updateConn,
        fetched: c.totalRows,
        saved: 0,
        failed: 0,
        errors: c.fetchError ? [{ id:"fetch", err: c.fetchError }] : [],
        rows: (c.rows || []).map(row => {
          const connector = (werkset.connectors||[]).find(wc => wc.updateConn === c.updateConn);
          const payload = connector ? buildUpdatePayload(c.updateConn, row, connector.fieldMap) : {};
          return { id: row._id, status: "dry", fields: payload[c.updateConn]?.Element?.Fields || {} };
        }),
      })),
      totalSaved: 0,
      totalFailed: 0,
    };
    log.totalSaved  = 0;
    log.totalFailed = 0;
    setLastRunLog(p => {
      const prev = p[werkset.id] || [];
      const next = [...prev, log].slice(-MAX_RUNS_PER_WERKSET);
      return { ...p, [werkset.id]: next };
    });
  };
  const patchWerkset  = (pid, wid, fn) => patchProfile(pid, p => ({
    werksets: (p.werksets||[]).map(w => w.id===wid ? {...w, ...fn(w)} : w)
  }));
  const setConnectors = fn => patchWerkset(activeProfile?.id, activeWerksetId, w => ({
    connectors: typeof fn==="function" ? fn(w.connectors||[]) : fn
  }));

  const [activeId, setActiveId]                   = useState(null);
  const [showAdd, setShowAdd]                     = useState(false);
  const [showEdit, setShowEdit]                   = useState(null);
  const [showEditProfile, setShowEditProfile]     = useState(false);
  const [renamingWerkset, setRenamingWerkset]     = useState(null);
  const [renamingProfile, setRenamingProfile]     = useState(null);
  const [showExport, setShowExport]               = useState(false);
  const [page, setPage]                           = useState(() => profiles.length > 0 ? "home" : "setup");

  useEffect(() => {
    const getConns = connectors.filter(c => c.connType !== "update");
    if (getConns.length > 0 && (!activeId || !getConns.find(c => c.id === activeId)))
      setActiveId(getConns[0].id);
    else if (getConns.length === 0) setActiveId(null);
  }, [connectors, activeWerksetId]);

  const handleConnect = (cfg, initial, profileName) => {
    const wid   = uid();
    const pid   = uid();
    const ws    = { id: wid, name: "Standaard", connectors: initial };
    const name  = profileName || (cfg.env + " (" + (cfg.envType||"productie") + ")");
    setProfiles(prev => [...prev, { id: pid, name, config: cfg, werksets: [ws], activeWerksetId: wid }]);
    setActiveProfileId(pid);
    setActiveId(null);
    setPage("home");
  };

  const switchProfile = (id) => {
    const tProf = profiles.find(p => p.id === id);
    const tWs   = tProf?.werksets?.find(w => w.id === (tProf.activeWerksetId || tProf.werksets?.[0]?.id));
    const tConn = (tWs?.connectors || []).find(c => c.connType !== "update");
    setActiveProfileId(id);
    setActiveId(tConn?.id || null);
    setShowProfiles(false);
    setShowWerksets(false);
  };

  const deleteProfile = (id) => {
    if (!window.confirm("Profiel verwijderen?")) return;
    setProfiles(p => p.filter(pr => pr.id !== id));
    if (activeProfileId === id) setActiveProfileId(profiles.filter(pr => pr.id !== id)[0]?.id || null);
  };

  const handleImport = (incoming, mode) => {
    if (mode === "replace") {
      setProfiles(incoming);
      setActiveProfileId(incoming[0]?.id || null);
    } else {
      setProfiles(prev => {
        const ids = new Set(prev.map(p => p.id));
        return [...prev, ...incoming.filter(p => !ids.has(p.id))];
      });
    }
  };

  // Werkset actions
  const switchWerkset = (wid) => {
    patchProfile(activeProfile?.id, () => ({ activeWerksetId: wid }));
    setActiveId(null); setShowWerksets(false);
  };
  const addWerkset = (name, schedule) => {
    const wid = uid();
    patchProfile(activeProfile?.id, p => ({
      werksets: [...(p.werksets||[]), { id: wid, name, schedule: schedule||{enabled:false}, connectors: [] }],
      activeWerksetId: wid,
    }));
    setActiveId(null);
  };
  const saveWerkset = (pid, wid, patch) => patchWerkset(pid, wid, () => patch);
  const deleteWerkset = (wid) => {
    if (!window.confirm("Werkset verwijderen?")) return;
    patchProfile(activeProfile?.id, p => {
      const rem = (p.werksets||[]).filter(w => w.id !== wid);
      return { werksets: rem, activeWerksetId: p.activeWerksetId===wid ? (rem[0]?.id||null) : p.activeWerksetId };
    });
    setActiveId(null);
  };

  const updateConn   = (id, patch) => setConnectors(p => p.map(c => { if (c.id!==id) return c; const merged = {...c, ...patch}; Object.keys(patch).forEach(k => { if (patch[k] === undefined) delete merged[k]; }); return merged; }));
  const editConnSave = (id, data)  => setConnectors(p => p.map(c => {
    if (c.id !== id) return c;
    return { ...c, ...data, fieldMap: c.name===data.name ? c.fieldMap : undefined };
  }));
  const addConn    = c => { setConnectors(p => [...p, c]); if (c.connType !== "update") setActiveId(c.id); };
  const removeConn = id => {
    setConnectors(p => p.filter(c => c.id !== id));
    if (activeId === id) setActiveId(connectors.find(c => c.id !== id)?.id || null);
  };
  const disconnect = () => { if (!window.confirm("Profiel verwijderen?")) return; deleteProfile(activeProfile?.id); };

  const activeConn = connectors.find(c => c.id === activeId && c.connType !== "update")
    || connectors.find(c => c.connType !== "update") || null;
  const connected  = !!config;

  return (
    <div className="app-wrap">
      {/* SCOREBOARD / TOPBAR */}
      {page !== "home" && <div className="topbar">

        {/* ── NOODSTOP OVERLAY — dekt de hele topbar af tijdens een actieve run ── */}
        {werksetRunning===activeWerksetId && runProgress && (
          <div style={{
            position:"absolute", inset:0, zIndex:20,
            background:"linear-gradient(180deg,rgba(0,0,0,.92) 0%,rgba(5,10,20,.96) 100%)",
            borderBottom:"3px solid var(--neon-green)",
            boxShadow:"0 0 0 1px rgba(57,255,20,.15), 0 4px 32px rgba(57,255,20,.2)",
            display:"flex", alignItems:"center", padding:"0 1.75rem", gap:"1.5rem",
          }}>
            {/* Spinner + connector naam */}
            <div style={{ display:"flex", alignItems:"center", gap:".6rem", flexShrink:0 }}>
              <span style={{ fontSize:"1.1rem", color:"var(--neon-green)",
                display:"inline-block", animation:"spin .7s linear infinite",
                textShadow:"0 0 10px rgba(57,255,20,.7)" }}>⟳</span>
              <div style={{ display:"flex", flexDirection:"column", gap:".1rem" }}>
                <div style={{ fontFamily:"var(--mono)", fontSize:".5rem", color:"var(--chrome-dim)",
                  letterSpacing:".12em", textTransform:"uppercase" }}>Bezig met verwerken</div>
                <div style={{ fontFamily:"var(--mono)", fontSize:".75rem", color:"var(--neon-green)",
                  textShadow:"0 0 8px rgba(57,255,20,.5)", maxWidth:180,
                  overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                  {runProgress.connName}
                </div>
              </div>
            </div>

            {/* Progress bar + tellers */}
            <div style={{ flex:1, display:"flex", flexDirection:"column", gap:".3rem" }}>
              <div style={{ height:6, background:"rgba(255,255,255,.08)", borderRadius:3, overflow:"hidden" }}>
                <div style={{
                  height:"100%", borderRadius:3,
                  background:"linear-gradient(90deg,var(--neon-green),rgba(57,255,20,.7))",
                  boxShadow:"0 0 10px rgba(57,255,20,.6)",
                  width: runProgress.total > 0 ? `${Math.round((runProgress.done/runProgress.total)*100)}%` : "100%",
                  transition:"width .25s ease",
                  animation: runProgress.total === 0 ? "pulse 1.2s ease-in-out infinite" : "none",
                }} />
              </div>
              <div style={{ display:"flex", gap:"1.2rem", fontFamily:"var(--mono)", fontSize:".6rem" }}>
                {runProgress.total > 0 && (
                  <span style={{ color:"var(--chrome-dim)" }}>
                    <span style={{ color:"var(--text-bright)" }}>{runProgress.done}</span> / {runProgress.total} records
                  </span>
                )}
                <span style={{ color:"var(--neon-green)" }}>✓ {runProgress.saved} opgeslagen</span>
                {runProgress.failed > 0 && (
                  <span style={{ color:"var(--neon-red)" }}>✕ {runProgress.failed} mislukt</span>
                )}
                {runProgress.total > 0 && (
                  <span style={{ color:"var(--chrome-dim)" }}>
                    {Math.round((runProgress.done/runProgress.total)*100)}%
                  </span>
                )}
              </div>
            </div>

            {/* NOODSTOP KNOP */}
            <div onClick={cancelRun} style={{
              cursor:"pointer", flexShrink:0,
              display:"flex", alignItems:"center", gap:".5rem",
              background:"rgba(255,42,74,.12)",
              border:"2px solid var(--neon-red)",
              borderRadius:5, padding:".4rem 1.1rem",
              fontFamily:"var(--mono)", fontSize:".75rem", fontWeight:700,
              color:"var(--neon-red)", letterSpacing:".06em",
              textShadow:"0 0 8px rgba(255,42,74,.6)",
              boxShadow:"0 0 16px rgba(255,42,74,.2)",
              transition:"all .15s",
              userSelect:"none",
            }}
            onMouseEnter={e=>{
              e.currentTarget.style.background="rgba(255,42,74,.28)";
              e.currentTarget.style.boxShadow="0 0 24px rgba(255,42,74,.5)";
              e.currentTarget.style.transform="scale(1.03)";
            }}
            onMouseLeave={e=>{
              e.currentTarget.style.background="rgba(255,42,74,.12)";
              e.currentTarget.style.boxShadow="0 0 16px rgba(255,42,74,.2)";
              e.currentTarget.style.transform="scale(1)";
            }}>
              <span style={{ fontSize:"1rem", lineHeight:1 }}>⏹</span>
              STOP RUN
            </div>
          </div>
        )}

        {/* FLPR wordmark */}
        <div className="brand-mark">
          <span className="brand-mark-fl">FL</span>
          <span className="brand-mark-p">P</span>
          <span className="brand-mark-r">R</span>
        </div>
        <span className="brand-text">data connector</span>

        {/* DMD score panels */}
        {connected && (() => {
          const ws = activeWerkset;
          const conns = connectors || [];
          const getConns = conns.filter(c=>c.connType!=="update");
          const ucConns  = conns.filter(c=>c.connType==="update");
          return (
            <div className="score-cluster">
              <div className="score-panel">
                <div className="score-label">Werkset</div>
                <div className="score-value" style={{ fontSize:".85rem", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", maxWidth:"100%" }} title={ws?.name}>{ws?.name || "—"}</div>
              </div>
              <div className="score-panel">
                <div className="score-label">Get / UC</div>
                <div className="score-value">{getConns.length}<span style={{ fontSize:".6rem", opacity:.5 }}> / </span><span className="cyan">{ucConns.length}</span></div>
              </div>
              <div className="score-panel">
                <div className="score-label">Profiel</div>
                <div className="score-value" style={{ fontSize:".72rem", color:"var(--neon-cyan)" }}>
                  {activeProfile?.name || "—"}
                </div>
              </div>
              <div className="score-panel">
                <div className="score-label">Status</div>
                <div className="score-value" style={{
                  fontSize:".85rem",
                  color: werksetRunning===activeWerksetId ? "var(--neon-green)" : "var(--chrome-dim)" }}>
                  {werksetRunning===activeWerksetId ? "● RUN" : "○ READY"}
                </div>
              </div>
            </div>
          );
        })()}

        {/* Bumper buttons */}
        <div className="bumper-row">
          {connected && (
            <div className={`bumper bumper-amber${page==="editor"?" active":""}`}
              onClick={()=>setPage("editor")} title="Editor">
              EDT
            </div>
          )}
          {connected && (
            <div className={`bumper bumper-cyan${page==="settings"?" active":""}`}
              onClick={()=>setPage("settings")} title="Instellingen">
              CFG
            </div>
          )}
          {connected && (
            <div className="bumper bumper-green" onClick={()=>setPage("home")} title="Startscherm">
              ↩
            </div>
          )}
        </div>

        <div className="ml" />
        <div className={`sync-pill ${connected?"on":"off"}`}>
          <div className={`sdot ${connected?"on":"off"}`} />
          {connected
            ? `${config.env} · ${ {production:"PROD",test:"TEST",acceptance:"ACC"}[config.envType||"production"] }`
            : "offline"}
        </div>
      </div>}

      {/* CONTENT */}
      {page==="setup" || profiles.length === 0
        ? <SetupScreen onConnect={handleConnect} onCancel={profiles.length > 0 ? ()=>setPage("home") : null} />
        : page==="home"
        ? <HomeScreen profiles={profiles} onSelect={(pid, wid)=>{
            // Lees connectors VOOR de state-updates (zijn nog sync beschikbaar)
            const tProf = profiles.find(p => p.id === pid);
            const tWs   = tProf?.werksets?.find(w => w.id === wid);
            const tConn = (tWs?.connectors || []).find(c => c.connType !== "update");
            // Zet alles in één keer
            setActiveProfileId(pid);
            setProfiles(prev => prev.map(p => p.id===pid ? {...p, activeWerksetId: wid} : p));
            if (tConn) setActiveId(tConn.id);
            else setActiveId(null);
            setShowProfiles(false);
            setShowWerksets(false);
            setPage("editor");
          }}
          onNewProfile={()=>setPage("setup")}
          onRenameWerkset={(pid,wid,n)=>patchWerkset(pid,wid,()=>({name:n}))}
          onRenameProfile={(pid,n)=>patchProfile(pid,()=>({name:n}))}
          onExport={()=>setShowExport(true)}
        />
        : page==="settings"
        ? <SettingsPage config={config} onDisconnect={()=>setPage("home")} />
        : (
          <div className="layout">
            {/* SIDEBAR */}
            <div className="sidebar">
              {/* WERKSET SECTIE — rijen zoals GET-connectors, max 10, popup bij meer */}
              <div className="sb-sec">
                <div className="sb-lbl">
                  Werksets
                  {werksets.length > 10 && (
                    <span onClick={()=>setShowWerksetPopup(true)}
                      style={{ marginLeft:"auto", fontSize:".5rem", color:"var(--neon-cyan)", cursor:"pointer",
                        padding:".04rem .3rem", borderRadius:2, fontFamily:"var(--mono)",
                        border:"1px solid rgba(0,229,255,.3)", letterSpacing:".06em",
                        textTransform:"uppercase" }}>
                      alle {werksets.length} ›
                    </span>
                  )}
                </div>

                {werksets.length === 0 && <div className="no-act">Geen werksets.</div>}

                {werksets.slice(0, 10).map(w => {
                  const isActive = w.id === activeWerksetId;
                  const running  = werksetRunning === w.id;
                  const schedIcon = w.schedule?.enabled
                    ? (w.schedule.mode==="interval" ? "🔄" : "⏱") : null;
                  const connCount = (w.connectors||[]).length;
                  return (
                    <div key={w.id}
                      className={`si sb-row${isActive ? " active" : ""}`}
                      onClick={()=>switchWerkset(w.id)}
                      style={{ display:"flex", alignItems:"center", gap:0, paddingRight:".3rem",
                        ...(running ? { borderColor:"var(--neon-amber)", background:"rgba(255,149,0,.07)" } : {}) }}>
                      {/* Running pulse / active dot */}
                      <span style={{ width:6, height:6, borderRadius:"50%", flexShrink:0, margin:"0 .42rem 0 .1rem",
                        background: running ? "var(--neon-amber)"
                          : isActive ? "var(--neon-cyan)"
                          : "rgba(200,168,75,.2)",
                        boxShadow: running ? "0 0 6px var(--neon-amber)"
                          : isActive ? "0 0 6px var(--neon-cyan)" : "none",
                        animation: running ? "blink 1s infinite" : "none" }} />
                      {renamingWerkset?.id === w.id ? (
                        <input autoFocus value={renamingWerkset.value}
                          onChange={e => setRenamingWerkset(r => ({ ...r, value: e.target.value }))}
                          onBlur={() => { const v = renamingWerkset.value.trim(); if (v) patchWerkset(activeProfile?.id, w.id, () => ({ name: v })); setRenamingWerkset(null); }}
                          onKeyDown={e => { if (e.key==="Enter") e.target.blur(); if (e.key==="Escape") setRenamingWerkset(null); e.stopPropagation(); }}
                          onClick={e => e.stopPropagation()}
                          style={{ flex:1, background:"rgba(0,229,255,.08)", border:"1px solid var(--neon-cyan)", borderRadius:3, color:"var(--neon-cyan)", fontFamily:"var(--sans)", fontWeight:700, fontSize:".72rem", padding:".1rem .3rem", outline:"none", minWidth:0 }} />
                      ) : (
                        <span className="si-name" title={w.name + " — dubbelklik om te hernoemen"}
                          onDoubleClick={e => { e.stopPropagation(); setRenamingWerkset({ id: w.id, value: w.name || "" }); }}
                          style={{ flex:1, color: isActive ? "var(--neon-cyan)" : "var(--text-dim)", fontFamily:"var(--sans)", fontWeight: isActive ? 700 : 400 }}>
                          {w.name || "Standaard"}
                        </span>
                      )}
                      {schedIcon && (
                        <span style={{ fontSize:".6rem", marginRight:".2rem", opacity:.7 }}>{schedIcon}</span>
                      )}
                      <span style={{ fontFamily:"var(--mono)", fontSize:".52rem",
                        color:"var(--chrome-dim)", marginRight:".25rem", whiteSpace:"nowrap" }}>
                        {connCount}c
                      </span>
                      <span className="sb-actions" style={{ display:"flex", alignItems:"center", gap:".15rem" }}>
                        <span className="sb-act-btn"
                          title="Nu uitvoeren"
                          style={{ color: running ? "var(--neon-amber)" : "var(--neon-green)", fontSize:".72rem" }}
                          onClick={e=>{ e.stopPropagation(); runWerksetNow(w); }}>
                          {running ? "⟳" : "▶"}
                        </span>
                        <span className="sb-act-btn" title="Instellingen" style={{ fontSize:".68rem" }}
                          onClick={e=>{ e.stopPropagation(); setEditWerkset({ profileId: activeProfile?.id, werkset: w }); }}>⚙</span>
                        {werksets.length > 1 && (
                          <span className="sb-act-btn sb-act-del" title="Verwijderen" style={{ fontSize:".68rem" }}
                            onClick={e=>{ e.stopPropagation(); deleteWerkset(w.id); }}>✕</span>
                        )}
                      </span>
                    </div>
                  );
                })}

                {/* Overloop: toon "meer" rij als er > 10 werksets zijn */}
                {werksets.length > 10 && (
                  <div className="add-conn"
                    style={{ borderColor:"rgba(0,229,255,.2)", color:"var(--neon-cyan)" }}
                    onClick={()=>setShowWerksetPopup(true)}>
                    <span>≡</span> {werksets.length - 10} meer werksets…
                  </div>
                )}

                {/* Laatste run info voor actieve werkset */}
                {activeWerkset?.lastRun && (
                  <div style={{ fontSize:".56rem", color:"var(--chrome-dim)", padding:".2rem .35rem .05rem",
                    display:"flex", gap:".38rem", alignItems:"center", fontFamily:"var(--mono)" }}>
                    <span style={{ letterSpacing:".04em" }}>laatste run:</span>
                    <span style={{ color: activeWerkset.lastRun.failed > 0 ? "var(--neon-amber)" : "var(--neon-green)" }}>
                      {new Date(activeWerkset.lastRun.at).toLocaleString("nl-NL",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"})}
                    </span>
                    <span style={{ color:"var(--neon-green)" }}>✓{activeWerkset.lastRun.saved}</span>
                    {activeWerkset.lastRun.failed > 0 && <span style={{ color:"var(--neon-red)" }}>✕{activeWerkset.lastRun.failed}</span>}
                    <span style={{ marginLeft:"auto", cursor:"pointer", color:"var(--neon-cyan)", letterSpacing:".04em" }}
                      style={{ cursor:"default" }}>→ Runs-tab</span>
                  </div>
                )}
                <div className="add-conn"
                  style={{ borderColor:"rgba(255,149,0,.22)", color:"var(--neon-amber)" }}
                  onClick={()=>setEditWerkset({ profileId: activeProfile?.id, werkset: null })}>
                  <span>+</span> Werkset toevoegen
                </div>
              </div>

              <div className="sb-div" />

              {/* GET connectors — navigeerbaar */}
              <div className="sb-sec">
                <div className="sb-lbl">GetConnectoren</div>
                {connectors.filter(c=>c.connType!=="update").length===0 && <div className="no-act">Voeg een GetConnector toe.</div>}
                {connectors.filter(c=>c.connType!=="update").map(c=>(
                  <div key={c.id} className={`si sb-row${activeId===c.id?" active":""}`}
                    onClick={()=>setActiveId(c.id)}
                    style={{ display:"flex", alignItems:"center", gap:0, paddingRight:".3rem" }}>
                    <span className="si-icon">{c.icon}</span>
                    <span className="si-name" title={c.name} style={{ flex:1 }}>{c.label||c.name}</span>
                    <span className="sb-actions" style={{ display:"flex", alignItems:"center", gap:".2rem" }}>
                      <div onClick={e=>{ e.stopPropagation(); updateConn(c.id, { enabled: c.enabled !== false ? false : undefined }); }}
                        title={c.enabled !== false ? "Actief — klik om uit te zetten" : "Inactief — klik om aan te zetten"}>
                        <FlipperSwitch size="sm" on={c.enabled !== false} onChange={()=>{}} />
                      </div>
                      <span className="sb-act-btn" title="Bewerken"
                        onClick={e=>{ e.stopPropagation(); setShowEdit(c); }}>✎</span>
                      <span className="sb-act-btn sb-act-del" title="Verwijderen"
                        onClick={e=>{ e.stopPropagation(); if(window.confirm(`"${c.label||c.name}" verwijderen?`)) removeConn(c.id); }}>✕</span>
                    </span>
                  </div>
                ))}
                <div className="add-conn" onClick={()=>setShowAdd("get")}>
                  <span>+</span> GetConnector toevoegen
                </div>
              </div>

              <div className="sb-div" />

              {/* UPDATE connectors — informatief, niet als editor */}
              <div className="sb-sec">
                <div className="sb-lbl">UpdateConnectoren</div>
                {connectors.filter(c=>c.connType==="update").length===0 && <div className="no-act">Geen UpdateConnectoren.</div>}
                {connectors.filter(c=>c.connType==="update").map(c=>(
                  <div key={c.id} className="sb-row"
                    style={{ display:"flex", alignItems:"center", gap:".45rem",
                      padding:".38rem .35rem .38rem .55rem", borderRadius:5, fontSize:".75rem" }}>
                    <span style={{ fontSize:".78rem", flexShrink:0 }}>✏️</span>
                    <span style={{ overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", flex:1, minWidth:0, color:"var(--t2)" }} title={c.name}>{c.label||c.name}</span>
                    {c.keyField && (
                      <span style={{ fontFamily:"var(--mono)", fontSize:".55rem", background:"rgba(245,158,11,.1)", border:"1px solid rgba(245,158,11,.2)", color:"var(--amber)", borderRadius:3, padding:".05rem .3rem", flexShrink:0 }}>
                        {c.keyField}
                      </span>
                    )}
                    <span className="sb-actions">
                      <span className="sb-act-btn" title="Bewerken"
                        onClick={()=>setShowEdit(c)}>✎</span>
                      <span className="sb-act-btn sb-act-del" title="Verwijderen"
                        onClick={()=>{ if(window.confirm(`"${c.label||c.name}" verwijderen?`)) removeConn(c.id); }}>✕</span>
                    </span>
                  </div>
                ))}
                <div className="add-conn" style={{ borderColor:"rgba(0,229,255,.2)", color:"var(--neon-cyan)" }} onClick={()=>setShowAdd("update")}>
                  <span>+</span> UpdateConnector toevoegen
                </div>
              </div>

              {/* ── FLIPPER CONTROLS ── */}
              <div className="flipper-controls">
                <div style={{ fontFamily:"var(--mono)", fontSize:".44rem", color:"var(--chrome-dim)",
                  letterSpacing:".12em", textTransform:"uppercase", textAlign:"center",
                  marginBottom:".1rem" }}>Controls</div>
                <div className="flipper-pair">
                  <div className="flipper-btn flipper-left"
                    onClick={()=>{ if(activeConn) setShowEdit(activeConn); }}
                    title="Bewerk actieve connector">
                    ✎ Edit
                  </div>
                  <div className="flipper-btn flipper-right"
                    onClick={()=>{ if(activeWerkset) runWerksetNow(activeWerkset); }}
                    title="Nu uitvoeren"
                    style={{ borderColor: werksetRunning===activeWerksetId?"var(--neon-green)":"var(--neon-amber)",
                      color: werksetRunning===activeWerksetId?"var(--neon-green)":"var(--neon-amber)",
                      boxShadow: werksetRunning===activeWerksetId?"0 0 18px rgba(57,255,20,.5)":"" }}>
                    {werksetRunning===activeWerksetId ? "⟳ Run" : "▶ Run"}
                  </div>
                </div>
              </div>

              <div className="sb-div" />

              {/* PROFIELEN SWITCHER */}
              <div className="sb-sec" style={{ paddingBottom:".5rem" }}>
                <div className="sb-lbl" style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                  <span>Omgeving</span>
                  {profiles.length > 1 && (
                    <span onClick={()=>setShowProfiles(v=>!v)}
                      style={{ fontSize:".62rem", color:"var(--accent)", cursor:"pointer", fontWeight:400 }}>
                      {showProfiles ? "▲" : `▼ ${profiles.length}`}
                    </span>
                  )}
                </div>

                {/* Active profile */}
                <div className="sb-row" style={{ display:"flex", alignItems:"center", gap:".4rem", padding:".3rem .4rem",
                  background:"var(--s2)", borderRadius:5, border:"1px solid var(--b1)", marginBottom:".3rem" }}>
                  <span style={{ width:7, height:7, borderRadius:"50%", flexShrink:0,
                    background: config?.envType==="production" ? "var(--green)" : config?.envType==="test" ? "var(--amber)" : "var(--accent)" }} />
                  <div style={{ flex:1, minWidth:0 }}>
                    {renamingProfile?.id === activeProfile?.id ? (
                      <input autoFocus value={renamingProfile.value}
                        onChange={e => setRenamingProfile(r => ({ ...r, value: e.target.value }))}
                        onBlur={() => { const v = renamingProfile.value.trim(); if (v) patchProfile(activeProfile.id, () => ({ name: v })); setRenamingProfile(null); }}
                        onKeyDown={e => { if (e.key==="Enter") e.target.blur(); if (e.key==="Escape") setRenamingProfile(null); e.stopPropagation(); }}
                        style={{ width:"100%", background:"rgba(200,168,75,.1)", border:"1px solid var(--chrome)", borderRadius:3, color:"var(--t1)", fontWeight:600, fontSize:".72rem", padding:".1rem .3rem", outline:"none", fontFamily:"var(--sans)" }} />
                    ) : (
                      <div title="Dubbelklik om naam te wijzigen"
                        onDoubleClick={() => setRenamingProfile({ id: activeProfile?.id, value: activeProfile?.name || "" })}
                        style={{ fontSize:".72rem", fontWeight:600, color:"var(--t1)", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", cursor:"text" }}>
                        {activeProfile?.name || config?.env}
                      </div>
                    )}
                    <div style={{ fontSize:".6rem", color:"var(--t3)", fontFamily:"var(--mono)" }}>
                      {config?.env}.{{production:"rest",test:"resttest",acceptance:"restaccept"}[config?.envType||"production"]}.afas.online
                    </div>
                  </div>
                  <span className="sb-actions">
                    <span className="sb-act-btn" title="Profiel bewerken"
                      onClick={()=>setShowEditProfile(true)}>✎</span>
                    <span className="sb-act-btn sb-act-del" title="Profiel verwijderen"
                      onClick={()=>deleteProfile(activeProfile?.id)}>✕</span>
                  </span>
                </div>

                {/* Other profiles */}
                {showProfiles && profiles.filter(pr=>pr.id!==activeProfileId).map(pr => (
                  <div key={pr.id} className="sb-row"
                    onClick={()=>switchProfile(pr.id)}
                    style={{ display:"flex", alignItems:"center", gap:".4rem", padding:".28rem .4rem",
                      borderRadius:4, cursor:"pointer", marginBottom:".1rem",
                      background:"var(--s2)", border:"1px solid var(--b1)" }}>
                    <span style={{ width:6, height:6, borderRadius:"50%", flexShrink:0,
                      background: pr.config?.envType==="production" ? "var(--green)" : pr.config?.envType==="test" ? "var(--amber)" : "var(--accent)" }} />
                    {renamingProfile?.id === pr.id ? (
                      <input autoFocus value={renamingProfile.value}
                        onChange={e => setRenamingProfile(r => ({ ...r, value: e.target.value }))}
                        onBlur={() => { const v = renamingProfile.value.trim(); if (v) patchProfile(pr.id, () => ({ name: v })); setRenamingProfile(null); }}
                        onKeyDown={e => { if (e.key==="Enter") e.target.blur(); if (e.key==="Escape") setRenamingProfile(null); e.stopPropagation(); }}
                        onClick={e => e.stopPropagation()}
                        style={{ flex:1, background:"rgba(200,168,75,.1)", border:"1px solid var(--chrome)", borderRadius:3, color:"var(--t2)", fontSize:".7rem", padding:".1rem .3rem", outline:"none", fontFamily:"var(--sans)" }} />
                    ) : (
                      <span title="Dubbelklik om naam te wijzigen"
                        onDoubleClick={e => { e.stopPropagation(); setRenamingProfile({ id: pr.id, value: pr.name }); }}
                        style={{ flex:1, fontSize:".7rem", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", color:"var(--t2)", cursor:"text" }}>
                        {pr.name}
                      </span>
                    )}
                    <span className="sb-actions">
                      <span className="sb-act-btn" title="Bewerken" onClick={e=>{ e.stopPropagation(); switchProfile(pr.id); setShowEditProfile(true); }}>✎</span>
                      <span className="sb-act-btn sb-act-del" title="Verwijderen"
                        onClick={e=>{ e.stopPropagation(); deleteProfile(pr.id); }}>✕</span>
                    </span>
                  </div>
                ))}

                <div className="add-conn" style={{ marginTop:".25rem", borderStyle:"dashed" }}
                  onClick={()=>setPage("setup")}>
                  <span>+</span> Nieuw profiel
                </div>
                <div onClick={()=>setPage("home")}
                  style={{ marginTop:".3rem", fontSize:".62rem", color:"var(--t3)", cursor:"pointer",
                    textAlign:"center", padding:".2rem", borderRadius:3, transition:"color .1s" }}
                  onMouseEnter={e=>e.currentTarget.style.color="var(--t1)"}
                  onMouseLeave={e=>e.currentTarget.style.color="var(--t3)"}>
                  ← Startscherm
                </div>
              </div>
            </div>

            {/* WORKSPACE */}
            <div className="workspace">
              {activeConn
                ? <EditorView key={activeWerksetId + "_" + activeConn.id} config={config} connector={activeConn} onUpdateConnector={patch => updateConn(activeConn.id, patch)} runHistory={lastRunLog[activeWerksetId]||[]} onEnableConnector={name => setConnectors(p => p.map(c => { if (c.name!==name) return c; const {enabled, ...rest} = c; return rest; }))} onTokenExpired={() => setTokenExpiredAlert(true)} />
                : (
                  <div className="empty-state" style={{ height:"100%" }}>
                    <div className="es-icon">👈</div>
                    <div className="es-title">Kies een connector</div>
                    <div className="es-sub">Selecteer een GetConnector in de zijbalk of voeg er een toe.</div>
                    <button className="btn btn-primary" style={{ marginTop:".5rem" }} onClick={()=>setShowAdd(true)}>+ Connector toevoegen</button>
                  </div>
                )
              }
            </div>
          </div>
        )
      }

      {/* STATUS BAR */}
      <div className="statusbar">
        <div className={`sbi ${connected?"green":"red"}`}>{connected?"● Verbonden":"○ Niet verbonden"}</div>
        {connected && <div className="sbi" style={{color: config.envType==="test"?"var(--amber)":config.envType==="acceptance"?"var(--accent)":"inherit"}}>
          {config.env}.{ {production:"rest",test:"resttest",acceptance:"restaccept"}[config.envType||"production"] }.afas.online
        </div>}
        {activeConn && <div className="sbi">{activeConn.name}</div>}
        <div className="sbi ml">AFAS DataEditor v1.0</div>
        <div className="sbi" onClick={()=>setShowExport(true)}
          title="Backup exporteren / importeren"
          style={{ cursor:"pointer", color:"var(--chrome-dim)", fontSize:".6rem", padding:".15rem .4rem",
            borderRadius:3, border:"1px solid transparent", transition:"all .12s", fontFamily:"var(--mono)" }}
          onMouseEnter={e=>{ e.currentTarget.style.color="var(--neon-amber)"; e.currentTarget.style.borderColor="rgba(200,168,75,.3)"; }}
          onMouseLeave={e=>{ e.currentTarget.style.color="var(--chrome-dim)"; e.currentTarget.style.borderColor="transparent"; }}>
          Backup
        </div>
      </div>

      {/* ── WERKSET OVERZICHT POPUP ── */}
      {showWerksetPopup && (
        <div className="overlay" onClick={e=>{ if(e.target===e.currentTarget) setShowWerksetPopup(false); }}>
          <div className="modal" style={{ width:520, maxHeight:"82vh" }}>
            <div className="mh">
              <span className="mtitle">Alle werksets</span>
              <span className="mclose" onClick={()=>setShowWerksetPopup(false)}>✕</span>
            </div>
            <div className="mb" style={{ padding:".6rem .9rem", gap:".2rem" }}>
              {werksets.map(w => {
                const isActive = w.id === activeWerksetId;
                const running  = werksetRunning === w.id;
                const connCount = (w.connectors||[]).length;
                const getCount  = (w.connectors||[]).filter(c=>c.connType!=="update").length;
                const ucCount   = (w.connectors||[]).filter(c=>c.connType==="update").length;
                const schedIcon = w.schedule?.enabled ? (w.schedule.mode==="interval" ? "🔄" : "⏱") : null;
                return (
                  <div key={w.id}
                    className={`si sb-row${isActive ? " active" : ""}`}
                    onClick={()=>{ switchWerkset(w.id); setShowWerksetPopup(false); }}
                    style={{ display:"flex", alignItems:"center", gap:0, paddingRight:".5rem", marginBottom:".12rem",
                      ...(running ? { borderColor:"var(--neon-amber)", background:"rgba(255,149,0,.07)" } : {}) }}>
                    <span style={{ width:7, height:7, borderRadius:"50%", flexShrink:0, margin:"0 .55rem 0 .15rem",
                      background: running ? "var(--neon-amber)" : isActive ? "var(--neon-cyan)" : "rgba(200,168,75,.2)",
                      boxShadow: running ? "0 0 7px var(--neon-amber)" : isActive ? "0 0 7px var(--neon-cyan)" : "none",
                      animation: running ? "blink 1s infinite" : "none" }} />
                    <span style={{ flex:1, fontSize:".76rem", fontFamily:"var(--sans)",
                      color: isActive ? "var(--neon-cyan)" : "var(--text-dim)",
                      fontWeight: isActive ? 700 : 400,
                      overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                      {w.name || "Standaard"}
                    </span>
                    <span style={{ fontFamily:"var(--mono)", fontSize:".55rem", color:"var(--chrome-dim)",
                      marginRight:".5rem", whiteSpace:"nowrap" }}>
                      {getCount}G · {ucCount}UC
                    </span>
                    {schedIcon && (
                      <span style={{ fontSize:".65rem", marginRight:".4rem", opacity:.8 }}>{schedIcon}</span>
                    )}
                    {w.lastRun && (
                      <span style={{ fontFamily:"var(--mono)", fontSize:".52rem",
                        color: w.lastRun.failed > 0 ? "var(--neon-amber)" : "var(--neon-green)",
                        marginRight:".4rem", whiteSpace:"nowrap" }}>
                        {w.lastRun.failed > 0 ? `✕${w.lastRun.failed}` : `✓${w.lastRun.saved}`}
                      </span>
                    )}
                    <span className="sb-actions" style={{ display:"flex", alignItems:"center", gap:".2rem" }}>
                      <span className="sb-act-btn"
                        style={{ color: running ? "var(--neon-amber)" : "var(--neon-green)", fontSize:".75rem" }}
                        onClick={e=>{ e.stopPropagation(); runWerksetNow(w); }}
                        title="Nu uitvoeren">{running ? "⟳" : "▶"}</span>
                      <span className="sb-act-btn" style={{ fontSize:".7rem" }}
                        onClick={e=>{ e.stopPropagation(); setShowWerksetPopup(false); setEditWerkset({ profileId: activeProfile?.id, werkset: w }); }}
                        title="Instellingen">⚙</span>
                      {werksets.length > 1 && (
                        <span className="sb-act-btn sb-act-del" style={{ fontSize:".7rem" }}
                          onClick={e=>{ e.stopPropagation(); deleteWerkset(w.id); }}
                          title="Verwijderen">✕</span>
                      )}
                    </span>
                  </div>
                );
              })}
            </div>
            <div className="mf" style={{ justifyContent:"space-between", alignItems:"center" }}>
              <span style={{ fontFamily:"var(--mono)", fontSize:".58rem", color:"var(--chrome-dim)",
                letterSpacing:".06em" }}>{werksets.length} werkset{werksets.length !== 1 ? "s" : ""}</span>
              <button className="btn btn-primary" onClick={()=>{ setShowWerksetPopup(false); setEditWerkset({ profileId: activeProfile?.id, werkset: null }); }}>
                + Nieuwe werkset
              </button>
            </div>
          </div>
        </div>
      )}


      {/* ── TOKEN VERLOPEN BANNER ── */}
      {tokenExpiredAlert && (
        <div style={{
          position:"fixed", top:0, left:0, right:0, zIndex:1000,
          background:"linear-gradient(90deg,#1a0008,#0a0e1a,#1a0008)",
          borderBottom:"3px solid var(--neon-red)",
          boxShadow:"0 0 40px rgba(255,42,74,.4), 0 4px 32px rgba(0,0,0,.8)",
          padding:".7rem 1.5rem",
          display:"flex", alignItems:"center", gap:"1.2rem",
          animation:"pulse 2s ease-in-out infinite",
        }}>
          {/* Icoon */}
          <span style={{ fontSize:"1.4rem", flexShrink:0 }}>🔑</span>

          {/* Tekst */}
          <div style={{ flex:1 }}>
            <div style={{ fontFamily:"'Bungee Inline',sans-serif", fontSize:".85rem",
              color:"var(--neon-red)", letterSpacing:".05em",
              textShadow:"0 0 10px rgba(255,42,74,.6)" }}>
              TOKEN VERLOPEN
            </div>
            <div style={{ fontFamily:"var(--mono)", fontSize:".62rem",
              color:"var(--chrome-dim)", marginTop:".1rem" }}>
              Het App token is verlopen of ongeldig. De run is gestopt.
              Al verwerkte records zijn opgeslagen.
            </div>
          </div>

          {/* Naar instellingen knop */}
          <div onClick={()=>{ setTokenExpiredAlert(false); setPage("settings"); }}
            style={{ cursor:"pointer", flexShrink:0,
              padding:".35rem .9rem", borderRadius:4,
              background:"rgba(255,42,74,.15)",
              border:"1px solid var(--neon-red)",
              fontFamily:"var(--mono)", fontSize:".65rem",
              color:"var(--neon-red)", fontWeight:700,
              letterSpacing:".06em", whiteSpace:"nowrap",
              transition:"all .15s",
            }}
            onMouseEnter={e=>e.currentTarget.style.background="rgba(255,42,74,.3)"}
            onMouseLeave={e=>e.currentTarget.style.background="rgba(255,42,74,.15)"}>
            ⚙ Token bijwerken
          </div>

          {/* Sluit */}
          <div onClick={()=>setTokenExpiredAlert(false)}
            style={{ cursor:"pointer", flexShrink:0,
              fontFamily:"var(--mono)", fontSize:".7rem",
              color:"var(--chrome-dim)", padding:".2rem .4rem",
              border:"1px solid rgba(255,255,255,.1)", borderRadius:3,
              transition:"all .12s",
            }}
            onMouseEnter={e=>e.currentTarget.style.color="var(--text-bright)"}
            onMouseLeave={e=>e.currentTarget.style.color="var(--chrome-dim)"}>
            ✕
          </div>
        </div>
      )}

      {showRunConfirm && (
        <RunConfirmModal
          werkset={showRunConfirm}
          config={activeProfile?.config}
          onConfirm={preview => executeRun(showRunConfirm, preview)}
          onDryRun={preview => executeDryRun(showRunConfirm, preview)}
          onClose={() => setShowRunConfirm(null)}
        />
      )}
      {editWerkset !== null && (
        <WerksetModal
          werkset={editWerkset.werkset}
          onSave={(name, schedule) => {
            if (editWerkset.werkset?.id) {
              saveWerkset(editWerkset.profileId, editWerkset.werkset.id, { name, schedule });
            } else {
              addWerkset(name, schedule);
            }
          }}
          onClose={()=>setEditWerkset(null)}
        />
      )}
      {showEditProfile && activeProfile && (
        <EditProfileModal
          profile={activeProfile}
          onSave={patch => patchProfile(activeProfile.id, () => patch)}
          onClose={()=>setShowEditProfile(false)}
        />
      )}
      {showExport && (
        <ExportImportModal
          profiles={profiles}
          onImport={handleImport}
          onClose={()=>setShowExport(false)}
        />
      )}
      {showAdd  && config && <AddConnectorModal config={config} initialType={showAdd==="update"?"update":"get"} connectors={connectors} afasUpdateConns={config?.afasUpdateConnectors||[]} onClose={()=>setShowAdd(false)} onAdd={addConn} />}
      {showEdit && config && <AddConnectorModal config={config} editConnector={showEdit} connectors={connectors} afasUpdateConns={config?.afasUpdateConnectors||[]} onClose={()=>setShowEdit(null)} onAdd={addConn} onUpdate={(id,data)=>{ editConnSave(id,data); setShowEdit(null); }} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App /></ErrorBoundary>);
</script>
</body>
</html>
