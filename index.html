// ── FIELD MAPPING MODAL ───────────────────────────────────────────────────────
// Quick transforms available in the mapping UI
// All quick transforms with which dataTypes they apply to.
// dataTypes: string, long, decimal, date, boolean, blob — from AFAS metainfo
const ALL_QUICK_TX = [
  { id:null,               label:"— geen transformatie —",   types: null }, // always shown
  { id:"uppercase",        label:"HOOFDLETTERS",             types: ["string"] },
  { id:"lowercase",        label:"kleine letters",           types: ["string"] },
  { id:"trim",             label:"Spaties trimmen",          types: ["string"] },
  { id:"normalize_spaces", label:"Spaties normaliseren",     types: ["string"] },
  { id:"nl_postcode",      label:"Postcode → 1234 AB",       types: ["string"] },
  { id:"nl_phone",         label:"Telefoonnummer → 06-12345678", types: ["string"] },
  { id:"nl_iban",          label:"IBAN formatteren",         types: ["string"] },
  { id:"num_round_2",      label:"Getal: afronden 2 dec.",   types: ["decimal"] },
  { id:"num_format",       label:"Getal: NL-notatie (1.234,56)", types: ["decimal"] },
  { id:"date_format_iso",  label:"Datum → ISO (yyyy-MM-dd)", types: ["date"] },
];

// Return only transforms relevant for a given AFAS dataType.
// If dataType unknown/null: show all. Boolean: none (handled separately).
function quickTxForType(dataType) {
  const dt = (dataType || "").toLowerCase();
  if (["boolean","bool"].includes(dt)) return [];
  if (!dt || dt === "string" || dt === "text") {
    return ALL_QUICK_TX.filter(t => !t.types || t.types.includes("string"));
  }
  if (["long","integer","int","number"].includes(dt)) return [ALL_QUICK_TX[0]]; // no transforms for int
  if (["decimal","double","float","currency","bedrag"].includes(dt)) {
    return ALL_QUICK_TX.filter(t => !t.types || t.types.includes("decimal"));
  }
  if (["date","datetime","timestamp"].includes(dt)) {
    return ALL_QUICK_TX.filter(t => !t.types || t.types.includes("date"));
  }
  // Unknown type: show all options
  return ALL_QUICK_TX;
}

// Backwards-compat alias (used elsewhere as QUICK_TX)
const QUICK_TX = ALL_QUICK_TX;

function PreviewResult({ formula, sampleRow, computed, evalF }) {
  if (!sampleRow || !formula.trim()) return <span style={{ fontFamily:"var(--mono)", fontSize:".68rem", color:"var(--chrome-dim)" }}>— vul een formule in —</span>;
  const ctx = {...sampleRow, ...(Object.fromEntries(computed.map(c=>[c.id, evalF(c.formula,sampleRow)])))};
  const res = evalF(formula, ctx);
  const isErr = res.startsWith("⚠")||res.startsWith("#ERR");
  return <span style={{ fontFamily:"var(--mono)", fontSize:".72rem", color:isErr?"var(--neon-amber)":"var(--neon-green)", textShadow:isErr?"":`0 0 6px rgba(57,255,20,.3)` }}>{res}</span>;
}

function FieldMappingModal({ connector, getFields, config, sampleRow, onSave, onClose }) {
  // ── State (identical to original — handleSave must stay compatible) ──────────
  const initLinks = () => {
    const existing = connector.fieldMap || {};
    const l = {};
    Object.entries(existing).forEach(([gf, m]) => {
      if (gf === "__computedDefs__") return;
      if (m.include === false || !m.updateField) return;
      const uf = m.updateField;
      if (gf.startsWith("__fixed__")) {
        l[uf] = { getField: null, computedId: null, transform: null, fixedValue: m.fixedValue ?? null, boolFormat: m.boolFormat || null, fixedOnly: true };
      } else if (gf.startsWith("__multi__")) {
        const srcField = m.getField || gf.replace(/^__multi__(.+?)__[^_]+$/, '$1');
        l[uf] = { getField: srcField, computedId: null, srcType: "get", transform: m.transform || null, fixedValue: m.fixedValue ?? null, boolFormat: m.boolFormat || null, fixedOnly: false };
      } else if (gf.startsWith("__comp__")) {
        l[uf] = { getField: null, computedId: m.computedId, srcType: "computed", transform: m.transform || null, fixedValue: m.fixedValue ?? null, boolFormat: m.boolFormat || null, fixedOnly: false };
      } else {
        l[uf] = { getField: gf, computedId: null, srcType: "get", transform: m.transform || null, fixedValue: m.fixedValue ?? null, boolFormat: m.boolFormat || null, fixedOnly: false };
      }
    });
    return l;
  };
  const initUFields = () => {
    const existing = connector.fieldMap || {};
    const req = connector.requiredFields || [];
    const seen = new Set();
    const result = [];
    req.forEach(n => { if (!seen.has(n)) { seen.add(n); result.push({ name: n, required: true }); } });
    Object.entries(existing).filter(([k,m]) => k !== "__computedDefs__" && m.include !== false && m.updateField).map(([,m]) => m.updateField)
      .forEach(n => { if (!seen.has(n)) { seen.add(n); result.push({ name: n, required: false }); } });
    return [...result.filter(u => u.required), ...result.filter(u => !u.required)];
  };

  const [links,          setLinks]         = useState(initLinks);
  const [uFields,        setUFields]       = useState(initUFields);
  const [metaFields,     setMetaFields]    = useState([]);
  const [schemaLoading,  setSchemaLoading] = useState(false);
  const [schemaError,    setSchemaError]   = useState(null);
  const [autoMatched,    setAutoMatched]   = useState(null);

  // Computed/formula fields: restored from saved fieldMap or start empty
  const [computed, setComputed] = useState(() => connector.fieldMap?.__computedDefs__ || []);
  // Active popover: { ucId } or null
  const [activePop, setActivePop] = useState(null);
  useEffect(() => {
    const onKey = e => {
      if (e.key === "Escape") { setActivePop(null); setActiveComp(null); setSelSrc(null); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, []);

  // Active computed editor: id or "new" or null
  const [activeComp, setActiveComp] = useState(null);
  // Selection in progress: { id, type:"get"|"computed" } or null
  const [selSrc,  setSelSrc]  = useState(null);
  // Hovered link ucId
  const [hovLink, setHovLink] = useState(null);
  const hovLinkRef = React.useRef(null);
  const [chipTip, setChipTip] = useState(null); // {op, x, y}
  const [pendingFixed, setPendingFixed] = useState(null); // ucId of pending fixed-value (no link entry yet)
  // SVG redraw trigger
  const [svgTick, setSvgTick] = useState(0);

  // Refs for SVG drawing
  const topZoneRef  = React.useRef(null);
  const pageRef     = React.useRef(null);
  const svgTopRef   = React.useRef(null);
  const svgFullRef  = React.useRef(null);

  // ── Fetch schema ─────────────────────────────────────────────────────────────
  useEffect(() => {
    if (!config || !connector.updateConn) return;
    setSchemaLoading(true);
    afasFetch(config.env, config.token, `/metainfo/update/${encodeURIComponent(connector.updateConn)}`, {}, config.envType || "production")
      .then(data => {
        const fields = data.fields || [];
        setMetaFields(fields);
        const buildUF = f => ({ name: f.fieldId, label: f.label || f.fieldId, required: !!f.mandatory,
          dataType: f.dataType, autoNum: !!f.autoNum, primaryKey: !!f.primaryKey,
          defaultValue: f.defaultValue ?? null, values: f.valuesDataSet || f.values || null });
        setUFields(prev => {
          const seen = new Set(prev.map(u => u.name));
          const extras = [];
          fields.forEach(f => { if (!seen.has(f.fieldId)) { extras.push(buildUF(f)); seen.add(f.fieldId); } });
          const updated = prev.map(u => { const live = fields.find(f => f.fieldId === u.name); return live ? { ...u, ...buildUF(live) } : u; });
          const merged = [...updated, ...extras];
          return [...merged.filter(u => u.required), ...merged.filter(u => !u.required)];
        });
      }).catch(e => setSchemaError("Schema ophalen mislukt: " + e.message))
      .finally(() => setSchemaLoading(false));
  }, []);

  // Redraw SVG whenever anything changes
  useEffect(() => { setSvgTick(t => t + 1); }, [links, computed, selSrc, hovLink, activePop, uFields]);
  useEffect(() => { hovLinkRef.current = hovLink; }, [hovLink]);
  useEffect(() => { if (svgTick > 0) drawLines(); }, [svgTick]);
  useEffect(() => { window.addEventListener("resize", triggerRedraw); return () => window.removeEventListener("resize", triggerRedraw); }, []);
  const triggerRedraw = () => setSvgTick(t => t + 1);

  // ── Auto-match ────────────────────────────────────────────────────────────────
  const autoMatch = () => {
    if (!metaFields.length && !uFields.length) return;
    const norm = s => s.toLowerCase().replace(/[_\-\s]+/g,"").replace(/^(get|put|fld|col)/,"").trim();
    const score = (getF, uf) => {
      const gn = norm(getF), un = norm(uf.name), ul = norm(uf.label||"");
      if (gn===un||gn===ul) return 100;
      if (gn.length>2&&(un.includes(gn)||gn.includes(un))) return 80;
      if (ul.length>2&&(ul.includes(gn)||gn.includes(ul))) return 75;
      const tokens = s => s.replace(/([a-z])([A-Z])/g,"$1 $2").toLowerCase().split(/[\s_\-]+/).filter(t=>t.length>2);
      const gt=tokens(getF), ut=[...tokens(uf.name),...tokens(uf.label||"")];
      const shared=gt.filter(t=>ut.includes(t));
      if (shared.length>0) return 40+shared.length*10;
      return 0;
    };
    const newLinks = { ...links };
    let matched = 0;
    getFields.forEach(getF => {
      if (Object.values(newLinks).some(l => l.getField === getF)) return;
      const takenUFs = new Set(Object.keys(newLinks));
      const candidates = uFields.filter(u => !takenUFs.has(u.name) && !u.autoNum)
        .map(u => ({ u, s: score(getF, u) })).filter(x => x.s >= 75).sort((a,b) => b.s-a.s);
      if (candidates.length > 0) { newLinks[candidates[0].u.name] = { getField: getF, srcType:"get", transform: null, fixedValue: null, fixedOnly: false }; matched++; }
    });
    setLinks(newLinks); setAutoMatched(matched);
  };

  // ── Formula evaluator ─────────────────────────────────────────────────────────
  // Operators:
  //   +   numeric addition  — always converts operands to Number
  //   &   string concat     — always converts operands to String
  // Field refs {X} are injected as __fv("X") calls so the operator decides the type.
  const evalF = (formula, row) => {
    try {
      // Step 1: replace {FIELD} with a placeholder function call __fv("id")
      // so the value is resolved at eval-time with the right type per operator context
      let e = formula
        .replace(/\{([^}]+)\}/g, (_,id) => `__fv(${JSON.stringify(id.trim())})`);

      // Step 2: replace & (string concat operator) with a tagged concat:
      // A & B  →  __sc(A, B)  (string concat, not JS which would be bitwise AND)
      // We process left-to-right greedily, careful not to touch & inside strings
      e = e.replace(/([^&])&([^&])/g, (_,a,b) => `${a}__sc__${b}`);

      // Step 3: standard function replacements
      e = e
        .replace(/ALS\(([^,]+),([^,]+),([^)]+)\)/g, (_,c,a,b) => `((${c.replace(/(?<![=!<>])=(?!=)/g,'==')})?(${a}):(${b}))`)
        .replace(/LENGTE\(([^)]+)\)/g,   (_,s) => `String(${s}).length`)
        .replace(/BOVENKANT\(([^)]+)\)/g, (_,s) => `String(${s}).toUpperCase()`)
        .replace(/LINKS\(([^,]+),([^)]+)\)/g, (_,s,n) => `String(${s}).slice(0,${n})`)
        .replace(/DATUMPLUS\(([^,]+),([^)]+)\)/g, (_,d,n) => {
          return `(()=>{ const __d=new Date(${d}); __d.setDate(__d.getDate()+(${n})); return isNaN(__d.getTime())?${d}:__d.toISOString().slice(0,10); })()`;
        });

      // Step 4: rewrite __sc__ back to string concat expression
      // Split on __sc__ and join with string coercion
      e = e.split('__sc__').map(part => `String(${part.trim()})`).join(' + ');

      // Step 5: wrap + operators to force numeric: a + b → __add(a, b)
      // Only when not inside a __sc__ context (already handled above)
      // Simple approach: replace remaining + (not inside strings) with numeric add
      // We do this by evaluating with a helper that coerces to number
      const fn = new Function('__fv', '__add',
        `"use strict"; return (${e});`
      );

      const __fv = (id) => {
        const v = row[id] ?? '';
        return v; // return raw value; operator decides conversion
      };

      // + in JS will concat strings — we need to force numeric for arithmetic
      // Instead, rewrite remaining + as __add calls
      // Actually: inject values always as numbers when possible, strings otherwise,
      // and use & for explicit concat. The key insight: after __sc__ handling,
      // remaining + operators ARE arithmetic. So inject fields as numbers.
      const __fv2 = (id) => {
        const v = row[id] ?? '';
        const n = Number(v);
        return (!isNaN(n) && v !== '') ? n : v;
      };

      // eslint-disable-next-line no-new-func
      return String(new Function('__fv', `"use strict"; return (${e});`)(__fv2));
    } catch { return "⚠ fout"; }
  };

  const getRow = () => {
    // Seed with real sample data if available, else empty strings
    const row = {};
    getFields.forEach(f => { row[f] = sampleRow ? String(sampleRow[f] ?? "") : ""; });
    computed.forEach(c => { row[c.id] = evalF(c.formula, row); });
    return row;
  };

  // ── Save ──────────────────────────────────────────────────────────────────────
  const handleSave = () => {
    const fieldMap = {};
    const primaryStored = {};
    Object.entries(links).forEach(([uf, lnk]) => {
      const fv = (lnk.fixedValue !== undefined && lnk.fixedValue !== null && lnk.fixedValue !== "") ? lnk.fixedValue : undefined;
      if (lnk.getField) {
        if (!primaryStored[lnk.getField]) {
          fieldMap[lnk.getField] = { updateField: uf, include: true, transform: lnk.transform || null, fixedValue: fv, boolFormat: lnk.boolFormat || null };
          primaryStored[lnk.getField] = true;
        } else {
          fieldMap[`__multi__${lnk.getField}__${uf}`] = { getField: lnk.getField, updateField: uf, include: true, transform: lnk.transform || null, fixedValue: fv, boolFormat: lnk.boolFormat || null };
        }
      } else if (lnk.computedId) {
        // Computed field → UC field mapping
        fieldMap[`__comp__${lnk.computedId}__${uf}`] = { computedId: lnk.computedId, updateField: uf, include: true, transform: lnk.transform || null, fixedValue: fv, boolFormat: lnk.boolFormat || null };
      } else if (fv !== undefined) {
        fieldMap[`__fixed__${uf}`] = { updateField: uf, include: true, fixedValue: fv, isFixed: true, boolFormat: lnk.boolFormat || null };
      }
    });
    getFields.forEach(f => { if (!fieldMap[f]) fieldMap[f] = { updateField: null, include: false, transform: null }; });
    // Store computed field definitions in fieldMap so buildUpdatePayload can evaluate them
    if (computed.length > 0) {
      fieldMap.__computedDefs__ = computed;
    }
    onSave(fieldMap, uFields.filter(u => u.required).map(u => u.name));
  };

  // ── Link mutations ────────────────────────────────────────────────────────────
  const doLink = (srcId, srcType, ucId) => {
    setLinks(p => {
      const n = { ...p };
      // Only remove the previous mapping of this UC field (not other UC fields linked to same src)
      // This allows one GET field → multiple UC fields
      delete n[ucId];
      n[ucId] = { getField: srcType==="get" ? srcId : null, computedId: srcType==="computed" ? srcId : null,
        srcType, transform: null, fixedValue: null, fixedOnly: false };
      return n;
    });
    // Keep selection active so user can link same GET field to more UC fields
    // User deselects by clicking the src again
  };
  const doUnlink = (ucId) => { setLinks(p => { const n={...p}; delete n[ucId]; return n; }); setPendingFixed(null); };
  const setTx    = (ucId, tx) => setLinks(p => ({ ...p, [ucId]: { ...p[ucId], transform: tx||null } }));
  const setFixed = (ucId, val) => {
    setLinks(p => ({ ...p, [ucId]: { ...(p[ucId]||{}), getField: p[ucId]?.getField||null, computedId: p[ucId]?.computedId||null, fixedOnly: true, fixedValue: val } }));
    setPendingFixed(null); // entry now exists, no longer pending
  };

  // ── Derived ───────────────────────────────────────────────────────────────────
  const linkedSrcIds = new Set(Object.values(links).map(l => l.getField || l.computedId).filter(Boolean));
  // Count how many UC fields each src is linked to (for badge display)
  const srcLinkCount = {};
  Object.values(links).forEach(l => {
    const id = l.getField || l.computedId;
    if (id) srcLinkCount[id] = (srcLinkCount[id] || 0) + 1;
  });
  const linkedUcIds  = new Set(Object.keys(links));
  const missingReq   = uFields.filter(u => u.required && !links[u.name]);
  const mappedCount  = Object.keys(links).length;
  const keyGetField  = connector.keyField;
  const keyIsMapped  = keyGetField && Object.values(links).some(l => l.getField === keyGetField);
  const keyUCField   = keyGetField && Object.entries(links).find(([uf,l]) => l.getField===keyGetField)?.[0];

  // ── SVG line drawing ──────────────────────────────────────────────────────────
  const drawLines = () => {
    if (!svgFullRef.current || !pageRef.current) return;
    const svg = svgFullRef.current;
    const pageCR = pageRef.current.getBoundingClientRect();

    // Clear previous lines, hit areas, labels
    svg.querySelectorAll("path.fm-line, path.fm-hit").forEach(e => e.remove());
    pageRef.current.querySelectorAll(".vm-lbl").forEach(e => e.remove());
    // also clear svgTopRef if it exists (unused but keep clean)
    if (svgTopRef.current) svgTopRef.current.innerHTML = "";

    const dotXY = (cardEl, side) => {
      const dot = cardEl.querySelector(side==="r" ? ".vm-dot-r" : ".vm-dot-l");
      if (!dot) return null;
      const r = dot.getBoundingClientRect();
      return { x: r.left + r.width/2 - pageCR.left, y: r.top + r.height/2 - pageCR.top };
    };

    // Bezier: horizontal pull from dot, curves smoothly across playfield
    const bz = (x1,y1,x2,y2) => {
      const pull = Math.min(Math.abs(x2-x1) * 0.55, 220);
      return `M${x1} ${y1}C${x1+pull} ${y1} ${x2-pull} ${y2} ${x2} ${y2}`;
    };

    const mkGlowPath = (d, color, width, opacity, dash, filterId) => {
      const p = document.createElementNS("http://www.w3.org/2000/svg","path");
      p.setAttribute("d",d); p.setAttribute("stroke",color);
      p.setAttribute("stroke-width",String(width)); p.setAttribute("fill","none");
      p.setAttribute("opacity",String(opacity)); p.classList.add("fm-line");
      if (dash) p.setAttribute("stroke-dasharray",dash);
      if (filterId) p.setAttribute("filter",`url(#${filterId})`);
      svg.appendChild(p);
    };

    const mkHit = (d, ucId) => {
      const p = document.createElementNS("http://www.w3.org/2000/svg","path");
      p.setAttribute("d",d); p.setAttribute("stroke","transparent");
      p.setAttribute("stroke-width","22"); p.setAttribute("fill","none");
      p.style.cursor = "pointer"; p.style.pointerEvents = "all";
      p.classList.add("fm-hit");
      p.addEventListener("click", () => setActivePop(ucId));
      p.addEventListener("mouseenter", () => { hovLinkRef.current = ucId; setHovLink(ucId); });
      p.addEventListener("mouseleave", () => { hovLinkRef.current = null; setHovLink(null); });
      svg.appendChild(p);
    };

    const mkLbl = (mx, my, text, classes, ucId) => {
      const div = document.createElement("div");
      div.className = "vm-lbl " + classes;
      div.textContent = text;
      div.style.left = mx+"px"; div.style.top = my+"px";
      div.addEventListener("click", () => {
        if ((hovLinkRef.current ?? hovLink) === ucId) { doUnlink(ucId); hovLinkRef.current=null; setHovLink(null); }
        else setActivePop(ucId);
      });
      pageRef.current.appendChild(div);
    };

    Object.entries(links).forEach(([ucId, lnk]) => {
      const isGet  = !lnk.computedId && !!lnk.getField;
      const isComp = !!lnk.computedId;
      const srcId  = lnk.getField || lnk.computedId;
      if (!srcId) return; // fixed-only, no line

      const srcEl = isGet
        ? document.querySelector(`[data-vmcol="get"] [data-vmid="${srcId}"]`)
        : document.querySelector(`[data-vmcol="comp"] [data-vmid="${srcId}"]`);
      const ucEl  = document.querySelector(`[data-vmcol="uc"] [data-vmid="${ucId}"]`);
      if (!srcEl || !ucEl) return;

      const p1 = dotXY(srcEl, "r"), p2 = dotXY(ucEl, "l");
      if (!p1 || !p2) return;

      const isHov = (hovLinkRef.current ?? hovLink) === ucId;
      const isAct = activePop === ucId;
      const color = isHov ? "#ff2a4a" : isAct ? "#bf5fff" : isGet ? "#ff9500" : "#00e5ff";
      const glowId = isHov ? "fm-glow-red" : isComp ? "fm-glow-cyan" : "fm-glow-amber";
      const d = bz(p1.x, p1.y, p2.x, p2.y);

      // Soft glow layer behind line
      mkGlowPath(d, color, isHov?6:4, 0.15, null, null);
      // Main line with filter glow
      mkGlowPath(d, color, isHov||isAct?2.5:1.8, isHov||isAct?1:.8, isHov?"6 3":null, glowId);
      // Hit area (transparent, wide)
      mkHit(d, ucId);

      // Midpoint label
      const mx = (p1.x + p2.x) / 2, my = (p1.y + p2.y) / 2;
      const tx = lnk.transform ? QUICK_TX.find(t=>t.id===lnk.transform)?.label : null;
      const fv = lnk.fixedValue ? `"${lnk.fixedValue}"` : null;
      const parts = [tx, fv].filter(Boolean);
      const cls = [
        isHov ? "vm-lbl-del" : "",
        isComp && !isHov ? "vm-lbl-comp" : "",
        lnk.transform ? "vm-lbl-tx" : "",
        lnk.fixedValue ? "vm-lbl-fix" : "",
      ].filter(Boolean).join(" ");
      mkLbl(mx, my, isHov ? "✕ verwijderen" : (parts.join(" · ") || (isComp ? "ƒ ⚙" : "⚙")), cls, ucId);
    });
  };

  // ── Card state helpers ────────────────────────────────────────────────────────
  const getCardCls = (id, type) => {
    const linked = linkedSrcIds.has(id);
    const isSel  = selSrc?.id===id && selSrc?.type===type;
    if (isSel)   return "vm-card vm-sel-src";
    if (linked)  return type==="computed" ? "vm-card vm-comp vm-lnk-src" : "vm-card vm-lnk-src";
    if (selSrc)  return (type==="computed" ? "vm-card vm-comp" : "vm-card") + " vm-dim";
    return type==="computed" ? "vm-card vm-comp" : "vm-card";
  };
  const ucCardCls = (id) => {
    if (id===activePop)     return "vm-card vm-act-pop";
    // Only show as linked (green) when there's an actual value — not for empty fixedOnly entries
    const lnk = links[id];
    const hasValue = lnk && (lnk.getField || lnk.computedId || (lnk.fixedValue !== null && lnk.fixedValue !== undefined && lnk.fixedValue !== ""));
    if (hasValue)           return "vm-card vm-lnk-dst";
    if (selSrc)             return "vm-card vm-sel-dst";
    return "vm-card";
  };

  // ── Click handlers ────────────────────────────────────────────────────────────
  const onClickSrc = (id, type) => {
    setActivePop(null); setActiveComp(null);
    setSelSrc(prev => prev?.id===id ? null : {id,type});
  };
  const onClickUc = (ucId) => {
    if (selSrc) { doLink(selSrc.id, selSrc.type, ucId); }
    else setActivePop(prev => prev===ucId ? null : ucId);
  };

  // ── Popover state ─────────────────────────────────────────────────────────────
  const lnkPop = activePop ? (links[activePop] ?? {}) : null;
  const ufPop  = activePop ? uFields.find(u => u.name===activePop) : null;
  const mfPop  = activePop ? metaFields.find(f => f.fieldId===activePop) : null;
  const txOptions = quickTxForType(mfPop?.dataType || ufPop?.dataType);
  const valOptions = ufPop?.values || mfPop?.valuesDataSet || mfPop?.values || null;

  // ── Computed editor fields ────────────────────────────────────────────────────
  const [compName, setCompName]       = useState("");
  const [compFormula, setCompFormula] = useState("");
  const compPrev = compFormula ? evalF(compFormula, getRow()) : "—";
  const OPS = [
    { l:'& combineren', v:' & ',
      tip:'Plakt twee tekstvelden aan elkaar. Gebruik aanhalingstekens voor een spatie of ander scheidingsteken.',
      ex:'{Voornaam} & " " & {Achternaam}' },
    { l:'+ optellen', v:' + ',
      tip:'Telt twee getallen bij elkaar op. Werkt alleen correct als beide velden numeriek zijn.',
      ex:'{Bedrag} + {Toeslag}' },
    { l:'− aftrekken', v:' - ',
      tip:'Trekt het tweede getal af van het eerste.',
      ex:'{Totaal} - {Korting}' },
    { l:'× vermenigvuldigen', v:' * ',
      tip:'Vermenigvuldigt twee getallen met elkaar.',
      ex:'{Prijs} * {Aantal}' },
    { l:'÷ delen', v:' / ',
      tip:'Deelt het eerste getal door het tweede.',
      ex:'{Bedrag} / 100' },
    { l:'ALS(…)', v:'ALS({VELD}="waarde","ja","nee")',
      tip:'Geeft een waarde terug op basis van een voorwaarde. Gebruik = voor vergelijking, <, >, <>, <=, >=.',
      ex:'ALS({Actief}=1,"Actief","Inactief")' },
    { l:'DATUMPLUS(n)', v:'DATUMPLUS({VELD},30)',
      tip:'Telt een aantal dagen op bij een datum. Gebruik een negatief getal om dagen af te trekken.',
      ex:'DATUMPLUS({Startdatum},30)' },
    { l:'BOVENKANT()', v:'BOVENKANT({VELD})',
      tip:'Zet alle letters van een tekstveld om naar hoofdletters.',
      ex:'BOVENKANT({Naam})' },
    { l:'LINKS(n)', v:'LINKS({VELD},5)',
      tip:'Geeft de eerste n tekens van een tekstveld terug.',
      ex:'LINKS({Postcode},4)' },
    { l:'LENGTE()', v:'LENGTE({VELD})',
      tip:'Geeft het aantal tekens in een tekstveld als getal terug.',
      ex:'LENGTE({Omschrijving})' },
  ];

  const openCompEditor = (id) => {
    setActiveComp(id); setActivePop(null);
    setNameIsManual(false);
    if (id==="new") { setCompName(""); setCompFormula(""); }
    else { const c=computed.find(x=>x.id===id); if(c){setCompName(c.name);setCompFormula(c.formula); setNameIsManual(true);} }
  };
  const saveComp = () => {
    if (!compName.trim()||!compFormula.trim()) return;
    if (activeComp==="new") setComputed(p => [...p, {id:"C"+(Date.now()%100000),name:compName.trim(),formula:compFormula.trim()}]);
    else setComputed(p => p.map(c => c.id===activeComp ? {...c,name:compName.trim(),formula:compFormula.trim()} : c));
    setActiveComp(null);
  };
  const delComp = (id) => {
    setLinks(p => { const n={...p}; Object.keys(n).forEach(k=>{if(n[k]?.computedId===id)delete n[k];}); return n; });
    setComputed(p => p.filter(c => c.id!==id));
    setActiveComp(null);
  };
  const insFormula = (text) => {
    const ta = document.getElementById("vm-formula-ta");
    if (!ta) { setCompFormula(f => { const nv=f+text; autoName(nv); return nv; }); return; }
    const s=ta.selectionStart, e2=ta.selectionEnd;
    const nv = ta.value.slice(0,s)+text+ta.value.slice(e2);
    setCompFormula(nv);
    autoName(nv);
    setTimeout(()=>{ ta.selectionStart=ta.selectionEnd=s+text.length; ta.focus(); },0);
  };

  // ── Auto-name: derive a readable name from the formula ────────────────────────
  const [nameIsManual, setNameIsManual] = useState(false);

  const autoName = (formula) => {
    if (nameIsManual) return; // user typed a custom name → don't overwrite
    if (!formula.trim()) { setCompName(""); return; }

    // Extract field references like {Naam}, {Bedrag}
    const fields = [...formula.matchAll(/\{([^}]+)\}/g)].map(m => {
      const id = m[1].trim();
      // Prefer label from getFields list if available, else use id itself
      return id;
    });

    // Detect dominant operator
    const hasAmpersand = / & /.test(formula);
    const hasPlus      = / \+ /.test(formula);
    const hasMinus     = / - /.test(formula);
    const hasMult      = / \* /.test(formula);
    const hasDiv       = / \/ /.test(formula);
    const hasAls       = /\bALS\b/i.test(formula);
    const hasDatum     = /\bDATUMPLUS\b/i.test(formula);
    const hasBovenkant = /\bBOVENKANT\b/i.test(formula);
    const hasLinks     = /\bLINKS\b/i.test(formula);
    const hasLengte    = /\bLENGTE\b/i.test(formula);

    let name = "";

    if (hasAls) {
      name = fields.length > 0 ? `${fields[0]} (conditioneel)` : "Conditioneel veld";
    } else if (hasDatum) {
      name = fields.length > 0 ? `${fields[0]} + dagen` : "Datum berekening";
    } else if (hasBovenkant) {
      name = fields.length > 0 ? `${fields[0]} hoofdletters` : "Hoofdletters";
    } else if (hasLinks) {
      name = fields.length > 0 ? `${fields[0]} (begin)` : "Tekst begin";
    } else if (hasLengte) {
      name = fields.length > 0 ? `Lengte ${fields[0]}` : "Lengte";
    } else if (hasAmpersand) {
      // Text combine: join field names with " & "
      name = fields.length >= 2 ? fields.slice(0,3).join(" & ") : fields[0] || "Combinatie";
    } else if (hasPlus) {
      name = fields.length >= 2 ? `${fields[0]} + ${fields[1]}` : fields[0] ? `${fields[0]} som` : "Optelling";
    } else if (hasMinus) {
      name = fields.length >= 2 ? `${fields[0]} − ${fields[1]}` : fields[0] ? `${fields[0]} verschil` : "Verschil";
    } else if (hasMult) {
      name = fields.length >= 2 ? `${fields[0]} × ${fields[1]}` : fields[0] ? `${fields[0]} product` : "Product";
    } else if (hasDiv) {
      name = fields.length >= 2 ? `${fields[0]} ÷ ${fields[1]}` : fields[0] ? `${fields[0]} quotiënt` : "Deling";
    } else if (fields.length === 1) {
      name = fields[0];
    } else if (fields.length > 1) {
      name = fields.slice(0,3).join(" & ");
    } else {
      name = "Berekend veld";
    }

    setCompName(name);
  };

  // ── Styles (inline, matching editor theme) ────────────────────────────────────
  const card = (extra={}) => ({
    background:"var(--s2)", border:"1px solid var(--b1)", borderRadius:6,
    padding:".44rem .62rem", cursor:"pointer", transition:"all .13s",
    userSelect:"none", position:"relative", ...extra,
  });
  const pill_ = (bg,brd,col) => ({
    fontSize:".56rem", fontWeight:700, padding:".12rem .42rem", borderRadius:2,
    background:bg, border:"1px solid "+brd, color:col,
    fontFamily:"'Share Tech Mono',monospace", letterSpacing:".05em",
  });
  const dot_ = (side) => ({
    position:"absolute", top:"50%", transform:"translateY(-50%)",
    width:9, height:9, borderRadius:"50%",
    border:"2px solid var(--s1,#0d1117)", background:"var(--b2)",
    [side==="r"?"right":"left"]: -5, zIndex:5,
  });

  // CSS injected once
  if (!document.getElementById("vm-styles")) {
    const st = document.createElement("style");
    st.id = "vm-styles";
    st.textContent = `
      .vm-card { background:rgba(0,0,0,.35);border:1px solid rgba(200,168,75,.2);border-radius:3px;
        padding:.44rem .62rem;cursor:pointer;transition:all .13s;user-select:none;position:relative; }
      .vm-card:hover { border-color:rgba(200,168,75,.4);background:rgba(255,149,0,.04); }
      .vm-sel-src { border-color:var(--neon-amber)!important;background:rgba(255,149,0,.08)!important;box-shadow:0 0 10px rgba(255,149,0,.25)!important; }
      .vm-sel-dst { border-color:var(--neon-green)!important;background:rgba(57,255,20,.05)!important;box-shadow:0 0 10px rgba(57,255,20,.2)!important; }
      .vm-lnk-src { border-color:rgba(255,149,0,.45)!important;background:rgba(255,149,0,.05)!important; }
      .vm-lnk-dst { border-color:rgba(57,255,20,.4)!important;background:rgba(57,255,20,.04)!important; }
      .vm-act-pop { border-color:var(--neon-purple)!important;background:rgba(191,95,255,.08)!important;box-shadow:0 0 10px rgba(191,95,255,.25)!important; }
      .vm-dim     { opacity:.18!important;pointer-events:none!important; }
      .vm-comp    { border-color:rgba(0,229,255,.28)!important;background:rgba(0,229,255,.04)!important; }
      .vm-comp:hover { border-color:rgba(0,229,255,.5)!important;background:rgba(0,229,255,.07)!important; }
      .vm-comp.vm-lnk-src { border-color:rgba(0,229,255,.5)!important; }
      .vm-comp.vm-sel-src { border-color:var(--neon-cyan)!important;box-shadow:0 0 10px rgba(0,229,255,.25)!important; }
      .vm-dot-r,.vm-dot-l { position:absolute;top:50%;transform:translateY(-50%);
        width:9px;height:9px;border-radius:50%;border:2px solid #0a0e1a;
        background:rgba(200,168,75,.4);transition:all .13s;cursor:crosshair;z-index:5; }
      .vm-dot-r { right:-5px; } .vm-dot-l { left:-5px; }
      .vm-lnk-src .vm-dot-r,.vm-sel-src .vm-dot-r { background:var(--neon-amber);border-color:var(--neon-amber);box-shadow:0 0 6px rgba(255,149,0,.6); }
      .vm-comp.vm-lnk-src .vm-dot-r,.vm-comp.vm-sel-src .vm-dot-r { background:var(--neon-cyan);border-color:var(--neon-cyan);box-shadow:0 0 6px rgba(0,229,255,.6); }
      .vm-lnk-dst .vm-dot-l,.vm-sel-dst .vm-dot-l { background:var(--neon-green);border-color:var(--neon-green);box-shadow:0 0 6px rgba(57,255,20,.6); }
      .vm-act-pop .vm-dot-l { background:var(--neon-purple);border-color:var(--neon-purple);box-shadow:0 0 6px rgba(191,95,255,.6); }
      .vm-lbl { position:absolute;transform:translate(-50%,-50%);pointer-events:all;cursor:pointer;z-index:20;
        background:rgba(0,0,0,.7);border:1px solid rgba(200,168,75,.3);border-radius:2px;
        padding:.08rem .3rem;font-size:.58rem;color:var(--text-dim);white-space:nowrap;transition:all .12s;
        font-family:'Share Tech Mono',monospace;letter-spacing:.04em; }
      .vm-lbl:hover { background:rgba(255,149,0,.08);border-color:rgba(255,149,0,.4); }
      .vm-lbl-tx  { border-color:rgba(191,95,255,.4)!important;color:var(--neon-purple)!important;box-shadow:0 0 4px rgba(191,95,255,.2); }
      .vm-lbl-fix { border-color:rgba(255,149,0,.5)!important;color:var(--neon-amber)!important;box-shadow:0 0 4px rgba(255,149,0,.2); }
      .vm-lbl-del { border-color:rgba(255,42,74,.4)!important;color:var(--neon-red)!important;background:rgba(255,42,74,.06)!important; }
      .vm-lbl-comp { border-color:rgba(0,229,255,.35)!important;color:var(--neon-cyan)!important;box-shadow:0 0 4px rgba(0,229,255,.2); }
      .vm-add-comp { border:1px dashed rgba(0,229,255,.25);background:transparent;border-radius:3px;
        padding:.38rem .62rem;cursor:pointer;display:inline-flex;align-items:center;gap:.38rem;
        font-size:.63rem;color:var(--text-dim);transition:all .13s; }
      .vm-add-comp:hover { border-color:var(--neon-cyan);color:var(--neon-cyan);background:rgba(0,229,255,.04);box-shadow:0 0 8px rgba(0,229,255,.15); }
      .chip-tip { position:fixed;z-index:9999;pointer-events:none;
        background:#0a0e1a;border:2px solid var(--chrome-dim);border-radius:4px;
        padding:.6rem .8rem;max-width:280px;box-shadow:0 0 24px rgba(255,149,0,.2),0 8px 32px rgba(0,0,0,.8);
        animation:tipIn .12s ease; }
      @keyframes tipIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
      .chip-tip-label { font-size:.7rem;font-weight:700;color:var(--neon-amber);margin-bottom:.3rem;font-family:'Bungee Inline',sans-serif;letter-spacing:.05em;text-shadow:0 0 6px rgba(255,149,0,.4); }
      .chip-tip-desc  { font-size:.67rem;color:var(--text-dim);line-height:1.55;margin-bottom:.45rem;font-family:'Share Tech Mono',monospace; }
      .chip-tip-ex    { font-size:.62rem;color:var(--neon-cyan);font-family:'Share Tech Mono',monospace;
        background:rgba(0,229,255,.06);border:1px solid rgba(0,229,255,.22);
        border-radius:3px;padding:.25rem .45rem;box-shadow:0 0 6px rgba(0,229,255,.12); }
      .chip-tip-ex-lbl{ font-size:.52rem;color:var(--chrome-dim);text-transform:uppercase;
        letter-spacing:.08em;margin-bottom:.18rem;font-family:'Share Tech Mono',monospace; }
      .chip-g  { display:inline-flex;cursor:pointer;font-size:.7rem;padding:.3rem .58rem;border-radius:20px;
        background:rgba(255,149,0,.08);border:1px solid rgba(255,149,0,.3);color:var(--neon-amber);

      .chip-c  { display:inline-flex;cursor:pointer;font-size:.7rem;padding:.3rem .58rem;border-radius:20px;

        transition:all .12s;margin:.2rem .2rem 0 0;font-weight:700;font-family:'Share Tech Mono',monospace;
        text-shadow:0 0 5px rgba(0,229,255,.4); }

      .chip-op { display:inline-flex;cursor:pointer;font-size:.7rem;padding:.3rem .58rem;border-radius:20px;
        background:rgba(0,0,0,.4);border:1px solid rgba(200,168,75,.25);color:var(--chrome);
        font-family:'Share Tech Mono',monospace;transition:all .12s;margin:.2rem .2rem 0 0;letter-spacing:.04em; }
      .chip-op:hover { border-color:var(--chrome);background:rgba(200,168,75,.08);transform:translateY(-1px); }
    `;
    document.head.appendChild(st);
  }

  // ── Render ────────────────────────────────────────────────────────────────────
  return (
    <div className="overlay" onClick={e => e.target===e.currentTarget && onClose()}>
      <div style={{
        width:"min(98vw,1400px)", height:"92vh",
        display:"flex", flexDirection:"column", overflow:"hidden",
        background:"var(--playfield)", border:"2px solid var(--chrome)",
        borderRadius:4, boxShadow:"0 0 60px rgba(255,149,0,.2), 0 0 120px rgba(255,149,0,.06)",
        animation:"modin .16s ease",
        position:"relative",
      }}>

        {/* ── SCOREBOARD ── */}
        <div style={{
          height:56, flexShrink:0,
          background:"linear-gradient(180deg,#000 0%,#0a0e1a 100%)",
          borderBottom:"3px solid var(--chrome)",
          display:"flex", alignItems:"center", padding:"0 1.5rem", gap:"1.2rem",
          boxShadow:"0 4px 32px rgba(255,149,0,.18)",
          position:"relative", overflow:"hidden",
        }}>
          {/* Scanline */}
          <div style={{ position:"absolute", inset:0, pointerEvents:"none",
            background:"repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.1) 3px,rgba(0,0,0,.1) 4px)" }} />

          {/* FLPR wordmark */}
          <div style={{ display:"flex", alignItems:"baseline", gap:".04rem", flexShrink:0, position:"relative", zIndex:1 }}>
            <span style={{ fontFamily:"'Bungee Inline',sans-serif", fontSize:"1.7rem", color:"var(--neon-amber)", lineHeight:1, textShadow:"0 0 10px var(--neon-amber),0 0 28px rgba(255,149,0,.5)" }}>FL</span>
            <span style={{ fontFamily:"'Bungee Inline',sans-serif", fontSize:"1.7rem", color:"var(--neon-red)",   lineHeight:1, textShadow:"0 0 10px var(--neon-red)" }}>P</span>
            <span style={{ fontFamily:"'Bungee Inline',sans-serif", fontSize:"1.7rem", color:"var(--neon-cyan)",  lineHeight:1, textShadow:"0 0 10px var(--neon-cyan)" }}>R</span>
          </div>

          {/* DMD panels */}
          <div style={{ display:"flex", gap:".6rem", flex:1, position:"relative", zIndex:1 }}>
            {[
              { lbl:"GET-connector",   val:connector.name,        cls:"" },
              { lbl:"UpdateConnector", val:connector.updateConn,  cls:"cyan" },
              { lbl:"Gekoppeld",       val:`${mappedCount} / ${uFields.filter(u=>!u.autoNum).length}`, cls:"green" },
              { lbl:"Verplicht open",  val:missingReq.length>0?`${missingReq.length}`:"✓ OK",
                style:{ color:missingReq.length>0?"var(--neon-red)":"var(--neon-green)", textShadow:missingReq.length>0?"0 0 8px rgba(255,42,74,.6)":"0 0 8px rgba(57,255,20,.6)" } },
            ].map((d,i) => (
              <div key={i} style={{ flex:1, background:"#000", border:"2px solid var(--chrome-dim)", borderRadius:3,
                padding:".28rem .7rem", minWidth:100, position:"relative", overflow:"hidden" }}>
                <div style={{ position:"absolute", inset:0, background:"repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,149,0,.02) 2px,rgba(255,149,0,.02) 3px)" }} />
                <div style={{ fontFamily:"var(--mono)", fontSize:".5rem", color:"var(--chrome-dim)", letterSpacing:".1em", textTransform:"uppercase", position:"relative" }}>{d.lbl}</div>
                <div style={{ fontFamily:"var(--mono)", fontSize:".9rem", letterSpacing:".04em", lineHeight:1.25,
                  whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis", position:"relative",
                  color: d.style?.color || (d.cls==="cyan"?"var(--neon-cyan)":d.cls==="green"?"var(--neon-green)":"var(--neon-amber)"),
                  textShadow: d.style?.textShadow || (d.cls==="cyan"?"0 0 8px rgba(0,229,255,.6)":d.cls==="green"?"0 0 8px rgba(57,255,20,.6)":"0 0 8px rgba(255,149,0,.6)"),
                }}>{d.val||"—"}</div>
              </div>
            ))}
          </div>

          {/* Bumper buttons */}
          <div style={{ display:"flex", gap:".55rem", alignItems:"center", position:"relative", zIndex:1 }}>
            {schemaLoading && <span style={{ fontFamily:"var(--mono)", fontSize:".58rem", color:"var(--chrome-dim)" }}><Spin /> schema…</span>}
            {!schemaLoading && schemaError && <span style={{ fontFamily:"var(--mono)", fontSize:".58rem", color:"var(--neon-amber)" }}>⚠ schema fout</span>}
            {metaFields.length > 0 && (
              <div key="auto" onClick={()=>{ setAutoMatched(null); autoMatch(); }} title="Auto-koppelen" style={{
                width:42, height:42, borderRadius:"50%", border:"2px solid var(--neon-purple)",
                display:"flex", alignItems:"center", justifyContent:"center",
                fontFamily:"var(--mono)", fontSize:".48rem", fontWeight:700, letterSpacing:".06em",
                cursor:"pointer", color:"var(--neon-purple)", background:"rgba(191,95,255,.07)",
                boxShadow:"0 0 10px rgba(191,95,255,.3)", transition:"all .12s", textTransform:"uppercase",
              }}
                onMouseEnter={e=>{ e.currentTarget.style.background="rgba(191,95,255,.18)"; e.currentTarget.style.boxShadow="0 0 20px rgba(191,95,255,.3)"; }}
                onMouseLeave={e=>{ e.currentTarget.style.background="rgba(191,95,255,.07)"; e.currentTarget.style.boxShadow="0 0 10px rgba(191,95,255,.3)"; }}>
                AUTO
              </div>
            )}
            {metaFields.length > 0 && (
              <div key="clr" onClick={()=>setSelSrc(null)} title="Wis selectie" style={{
                width:42, height:42, borderRadius:"50%", border:"2px solid var(--neon-amber)",
                display:"flex", alignItems:"center", justifyContent:"center",
                fontFamily:"var(--mono)", fontSize:".48rem", fontWeight:700, letterSpacing:".06em",

                boxShadow:"0 0 10px rgba(255,149,0,.25)", transition:"all .12s", textTransform:"uppercase",

                onMouseEnter={e=>{ e.currentTarget.style.background="rgba(255,149,0,.18)"; e.currentTarget.style.boxShadow="0 0 20px rgba(255,149,0,.25)"; }}
                onMouseLeave={e=>{ e.currentTarget.style.background="rgba(255,149,0,.07)"; e.currentTarget.style.boxShadow="0 0 10px rgba(255,149,0,.25)"; }}>
                CLR

            {/* Close bumper */}
            <div onClick={onClose} style={{
              width:42, height:42, borderRadius:"50%", border:"2px solid rgba(200,168,75,.4)",

              onMouseEnter={e=>{ e.currentTarget.style.borderColor="var(--neon-red)"; e.currentTarget.style.color="var(--neon-red)"; e.currentTarget.style.boxShadow="0 0 12px rgba(255,42,74,.3)"; }}

        </div>

        {/* Auto-match notice */}
        {autoMatched !== null && (
          <div style={{ padding:".28rem 1rem", borderBottom:"1px solid rgba(200,168,75,.15)", flexShrink:0,
            background: autoMatched>0?"rgba(57,255,20,.05)":"rgba(255,149,0,.05)",

            {autoMatched>0
              ? <><span style={{color:"var(--neon-green)",textShadow:"0 0 5px rgba(57,255,20,.5)"}}>✓</span> <span style={{color:"var(--text-dim)"}}><strong style={{color:"var(--neon-green)"}}>{autoMatched}</strong> veld{autoMatched!==1?"en":""} automatisch gekoppeld.</span></>

            <button onClick={()=>setAutoMatched(null)} style={{marginLeft:"auto",background:"none",border:"none",cursor:"pointer",color:"var(--chrome-dim)",fontSize:".75rem"}}>✕</button>
          </div>
        )}

        {/* ── THREE-COLUMN LAYOUT ── */}
        <div ref={pageRef} style={{ flex:1, display:"flex", overflow:"hidden", position:"relative" }}>

          {/* Full-modal SVG for computed→UC lines */}
          <svg ref={svgFullRef} style={{ position:"absolute",top:0,left:0,width:"100%",height:"100%",
            pointerEvents:"none",zIndex:15,overflow:"visible" }}>
            <defs>
              <filter id="fm-glow-amber" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="2.5" result="blur"/>
                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
              <filter id="fm-glow-cyan" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="2.5" result="blur"/>
                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
              <filter id="fm-glow-red" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="3" result="blur"/>
                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
            </defs>
          </svg>

          {/* ── LEFT RAIL: GET fields ── */}
          <div style={{
            width:220, flexShrink:0,
            background:"var(--rail)", borderRight:"2px solid var(--chrome-dim)",
            display:"flex", flexDirection:"column", overflow:"hidden", position:"relative",
          }}>
            {/* diagonal stripes */}
            <div style={{ position:"absolute", inset:0, pointerEvents:"none",
              background:"repeating-linear-gradient(-45deg,transparent 0,transparent 18px,rgba(255,149,0,.025) 18px,rgba(255,149,0,.025) 19px)" }} />

            {/* Rail header */}
            <div style={{ padding:".55rem .75rem .4rem", borderBottom:"1px solid rgba(200,168,75,.12)", flexShrink:0, position:"relative", zIndex:1 }}>
              <div style={{ fontFamily:"var(--mono)", fontSize:".5rem", color:"var(--chrome)", letterSpacing:".14em",
                textTransform:"uppercase", display:"flex", alignItems:"center", gap:".35rem" }}>

                <div style={{ background:"rgba(0,0,0,.4)", border:"1px solid rgba(200,168,75,.22)", borderRadius:3, padding:".42rem .55rem" }}>
                  {sampleRow && compFormula.trim()
                    ? <PreviewResult formula={compFormula} sampleRow={sampleRow} computed={computed} evalF={evalF} />

                  }
                </div>
              </div>
              {activeComp !== "new" && (

                  display:"flex", alignItems:"center", gap:".3rem", padding:".32rem .5rem", borderRadius:3,
                  border:"1px solid rgba(255,42,74,.3)", background:"rgba(255,42,74,.04)",
                  fontFamily:"var(--mono)", letterSpacing:".04em", transition:"all .13s" }}
                  onMouseEnter={e=>{ e.currentTarget.style.background="rgba(255,42,74,.12)"; e.currentTarget.style.boxShadow="0 0 8px rgba(255,42,74,.2)"; }}
                  onMouseLeave={e=>{ e.currentTarget.style.background="rgba(255,42,74,.04)"; e.currentTarget.style.boxShadow="none"; }}
                  onClick={()=>delComp(activeComp)}>✕ &nbsp;Berekend veld verwijderen</div>
              )}
            </div>
            <div style={{ padding:".55rem .9rem", borderTop:"1px solid rgba(200,168,75,.2)", flexShrink:0,
              display:"flex", gap:".4rem", justifyContent:"flex-end" }}>
              <button className="btn btn-ghost" onClick={()=>setActiveComp(null)}>Annuleren</button>
              <button className="btn" style={{ borderColor:"var(--neon-cyan)", color:"var(--neon-cyan)",
                background:"transparent", boxShadow:"0 0 8px rgba(0,229,255,.18)" }}

            </div>
          </div>
        )}

        {/* ── CHIP TOOLTIP ── */}
        {chipTip && (
          <div className="chip-tip" style={{
            left: Math.min(chipTip.x, window.innerWidth - 300),
            top: chipTip.y - 8,
            transform: 'translate(-50%, -100%)'
          }}>
            <div className="chip-tip-label">{chipTip.op.l}</div>
            <div className="chip-tip-desc">{chipTip.op.tip}</div>
            <div className="chip-tip-ex-lbl">Voorbeeld</div>
            <div className="chip-tip-ex">{chipTip.op.ex}</div>
          </div>
        )}

        {/* ── DRAIN / INSTRUCTION BAR ── */}
        <div style={{
          height:26, background:"#000", borderTop:"2px solid var(--chrome-dim)",
          display:"flex", alignItems:"center", padding:"0 1.1rem", gap:".85rem",
          flexShrink:0, fontFamily:"var(--mono)", fontSize:".56rem", letterSpacing:".05em", color:"var(--chrome-dim)",
        }}>
          {[
            { col:"var(--neon-amber)", text:"Klik GET → meerdere UC-velden mogelijk · klik src opnieuw om te deselecteren" },
            { col:"var(--neon-cyan)",  text:"Klik ƒ-veld → UC koppelen" },
            { col:"var(--chrome-dim)",  text:"Klik lijn voor instellingen" },
          ].map((h,i) => (
            <span key={i} style={{ display:"flex", alignItems:"center", gap:".28rem", whiteSpace:"nowrap" }}>
              <span style={{ width:6,height:6,borderRadius:"50%",background:h.col,boxShadow:`0 0 5px ${h.col}`,flexShrink:0 }}/>
              {h.text}
            </span>
          ))}
          <div style={{ marginLeft:"auto", display:"flex", alignItems:"center", gap:".7rem" }}>
            {selSrc && <span style={{ color:"var(--neon-amber)", animation:"blink 1s infinite" }}>● {selSrc.id} geselecteerd</span>}
            {missingReq.length > 0 && (
              <span style={{ color:"var(--neon-red)", background:"rgba(255,42,74,.08)", border:"1px solid rgba(255,42,74,.25)", borderRadius:2, padding:".06rem .32rem" }}>
                ⚠ {missingReq.length} verplicht open
              </span>
            )}
          </div>
        </div>

        {/* ── RAMP BUTTONS ── */}
        <div style={{
          background:"linear-gradient(0deg,#000 0%,rgba(0,0,0,.4) 100%)",
          borderTop:"1px solid rgba(200,168,75,.15)",
          padding:".52rem 1.1rem", display:"flex", alignItems:"center", gap:".6rem", flexShrink:0,
        }}>
          {keyGetField && keyIsMapped && (
            <span style={{ fontFamily:"var(--mono)", fontSize:".58rem", color:"var(--neon-green)",
              textShadow:"0 0 5px rgba(57,255,20,.4)", letterSpacing:".04em" }}>
              🔑 {keyGetField} → {keyUCField}
            </span>
          )}
          {keyGetField && !keyIsMapped && (
            <span style={{ fontFamily:"var(--mono)", fontSize:".58rem", color:"var(--neon-amber)", letterSpacing:".04em" }}>
              ⚠ Sleutelveld "{keyGetField}" niet gekoppeld
            </span>
          )}
          <div style={{ marginLeft:"auto", display:"flex", gap:".55rem", alignItems:"center" }}>
            {/* Cancel */}
            <div onClick={onClose} style={{
              padding:".38rem .95rem", borderRadius:20, border:"2px solid rgba(200,168,75,.3)",
              color:"var(--chrome-dim)", fontFamily:"var(--mono)", fontSize:".65rem",
              fontWeight:700, letterSpacing:".1em", textTransform:"uppercase",
              cursor:"pointer", background:"transparent", transition:"all .13s",
            }}
              onMouseEnter={e=>{ e.currentTarget.style.borderColor="var(--chrome)"; e.currentTarget.style.color="var(--chrome)"; }}
              onMouseLeave={e=>{ e.currentTarget.style.borderColor="rgba(200,168,75,.3)"; e.currentTarget.style.color="var(--chrome-dim)"; }}>
              Annuleren
            </div>
            {/* Save — ramp style */}
            <div onClick={handleSave} style={{
              padding:".38rem 1.1rem", borderRadius:20, border:"2px solid var(--neon-amber)",
              color:"var(--neon-amber)", fontFamily:"var(--mono)", fontSize:".65rem",
              fontWeight:700, letterSpacing:".1em", textTransform:"uppercase",
              cursor:"pointer", background:"transparent", transition:"all .13s",
              display:"flex", alignItems:"center", gap:".45rem",
              boxShadow:"0 0 10px rgba(255,149,0,.25)",
            }}
              onMouseEnter={e=>{ e.currentTarget.style.background="rgba(255,149,0,.14)"; e.currentTarget.style.boxShadow="0 0 22px rgba(255,149,0,.55)"; }}
              onMouseLeave={e=>{ e.currentTarget.style.background="transparent"; e.currentTarget.style.boxShadow="0 0 10px rgba(255,149,0,.25)"; }}>
              ⇄ Koppeling opslaan
              <span style={{ background:"rgba(255,149,0,.15)", border:"1px solid rgba(255,149,0,.35)", borderRadius:2, padding:".04rem .3rem", fontSize:".6rem" }}>
                {mappedCount} gekoppeld
              </span>
            </div>
          </div>
        </div>

      </div>
    </div>
  );
}


// ── DIFF MODAL ────────────────────────────────────────────────────────────────
function DiffModal({ rows, originals, fields, connector, selectedIds, onConfirm, onClose }) {
  const [tab, setTab] = useState("wijzigingen");

  // Only changed/new rows; filter to selection if active
  const allChanged = rows.filter(r => {
    if (r._isNew) return true;
    const o = originals.find(x => x._id === r._id);
    return o && fields.some(f => String(r[f] ?? "") !== String(o[f] ?? ""));
  });
  const changes = selectedIds && selectedIds.size > 0
    ? allChanged.filter(r => selectedIds.has(r._id))
    : allChanged;
  const isScopeSelected = selectedIds && selectedIds.size > 0 && changes.length < allChanged.length;
  const hasUpdateConn = !!connector.updateConn;
  const fm = connector.fieldMap || null;

  // Build the exact payload per changed record using the same function as the real save
  const payloadPreviews = changes.map(r => {
    const p = buildUpdatePayload(connector.updateConn || "UC", r, fm);
    const pFields = (p[connector.updateConn || "UC"] || {});
    const fields_ = (pFields.Element || {}).Fields || {};
    return { r, fields: fields_ };
  });

  // Info bar stats
  const fmStats = fm ? {
    active:   Object.values(fm).filter(m => m.include !== false).length,
    renamed:  Object.entries(fm).filter(([k,m]) => !k.startsWith("__fixed__") && m.include !== false && m.updateField && m.updateField !== k).length,
    tx:       Object.values(fm).filter(m => m.include !== false && m.transform).length,
    fixed:    Object.values(fm).filter(m => m.include !== false && m.fixedValue !== undefined && m.fixedValue !== null && m.fixedValue !== "").length,
    excluded: Object.values(fm).filter(m => m.include === false).length,
  } : null;

  const tabBtn = (id, label) => (
    <button onClick={() => setTab(id)} style={{
      padding: ".28rem .85rem", borderRadius: 4, border: "none", cursor: "pointer",
      fontSize: ".72rem", fontFamily: "var(--mono)", transition: "all .1s",
      background: tab === id ? "var(--accent)" : "transparent",
      color: tab === id ? "#fff" : "var(--t3)",
    }}>{label}</button>
  );

  return (
    <div className="overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal" style={{ width: 700, maxWidth: "98vw" }}>
        <div className="mh">
          <div className="mtitle">Opslaan naar Profit</div>
          <div className="mclose" onClick={onClose}>✕</div>
        </div>
        <div className="mb" style={{ padding: 0 }}>

          {/* Info bar */}
          <div style={{ padding: ".55rem .9rem", borderBottom: "1px solid var(--b1)", background: "var(--s2)" }}>
            {hasUpdateConn ? (
              <div style={{ display: "flex", flexWrap: "wrap", gap: ".55rem .9rem", fontSize: ".72rem", lineHeight: 1.6 }}>
                <span>GET: <strong style={{ fontFamily:"var(--mono)", color:"var(--accent)" }}>{connector.name}</strong></span>
                <span>UPDATE: <strong style={{ fontFamily:"var(--mono)", color:"var(--amber)" }}>{connector.updateConn}</strong></span>
                {connector.keyField && <span>Sleutel: <code style={{ fontFamily:"var(--mono)" }}>{connector.keyField}</code></span>}
                <span style={{ color:"var(--t3)" }}>
                  {isScopeSelected && <span style={{color:"var(--amber)",marginRight:".35rem"}}>({changes.length} geselecteerd)</span>}
                  {changes.filter(r => !r._isNew).length} via PUT
                  {changes.filter(r => r._isNew).length > 0 && " · " + changes.filter(r=>r._isNew).length + " POST"}
                </span>
                {fmStats && (
                  <span style={{ color:"var(--t3)" }}>
                    Koppeling: <span style={{ color:"var(--green)" }}>{fmStats.active} actief</span>
                    {fmStats.renamed > 0 && <span style={{ color:"var(--amber)" }}> · {fmStats.renamed} hernoemd</span>}
                    {fmStats.tx > 0 && <span style={{ color:"var(--amber)" }}> · {fmStats.tx} getransformeerd</span>}
                    {fmStats.fixed > 0 && <span style={{ color:"#a78bfa" }}> · {fmStats.fixed} vaste waarde</span>}
                    {fmStats.excluded > 0 && <span style={{ color:"var(--red)" }}> · {fmStats.excluded} uitgesloten</span>}
                  </span>
                )}
              </div>
            ) : (
              <div style={{ fontSize: ".72rem", color: "var(--red)" }}>
                ⚠ Geen UpdateConnector geconfigureerd.
              </div>
            )}
          </div>

          {/* Tabs */}
          <div style={{ display: "flex", gap: ".25rem", padding: ".35rem .6rem",
            borderBottom: "1px solid var(--b1)", background: "var(--s1)" }}>
            {tabBtn("wijzigingen", "Records (" + changes.length + ")")}
            {tabBtn("payload", "Payload naar Profit")}
          </div>

          <div className="diff-scroll">

            {/* ── Tab: Wijzigingen ── */}
            {tab === "wijzigingen" && (<>
              {changes.length === 0
                ? <div style={{ padding: ".75rem", color: "var(--t2)", fontSize: ".8rem" }}>Geen wijzigingen.</div>
                : changes.map(r => {
                  const o = originals.find(x => x._id === r._id) || {};
                  const diffs = r._isNew ? fields : fields.filter(f => String(r[f] ?? "") !== String(o[f] ?? ""));
                  return (
                    <div className="diff-rec" key={r._id}>
                      <div style={{ fontFamily:"var(--mono)", fontSize:".62rem", color:"var(--t3)",
                        marginBottom:".28rem", display:"flex", gap:".4rem", alignItems:"center" }}>
                        {r._isNew
                          ? <span style={{ background:"var(--gb)", border:"1px solid rgba(34,197,94,.3)", color:"var(--green)", padding:".05rem .3rem", borderRadius:3 }}>POST nieuw</span>
                          : <span style={{ background:"rgba(59,130,246,.1)", border:"1px solid rgba(59,130,246,.2)", color:"var(--accent)", padding:".05rem .3rem", borderRadius:3 }}>PUT update</span>
                        }
                        {connector.keyField && !r._isNew && <span style={{ color:"var(--t2)" }}>{connector.keyField}: <strong>{String(r[connector.keyField] ?? "")}</strong></span>}
                        <span style={{ color:"var(--t2)" }}>{String(r[fields[0]] ?? "")}</span>
                      </div>
                      {r._isNew
                        ? <div style={{ fontSize:".7rem", color:"var(--t3)", paddingLeft:".4rem" }}>Nieuw record wordt aangemaakt via POST</div>
                        : diffs.map(f => {
                          const mapped = fm && fm[f];
                          const targetName = mapped && mapped.include !== false && mapped.updateField ? mapped.updateField : f;
                          return (
                            <div className="drow" key={f} style={{ paddingLeft:".4rem" }}>
                              <span className="dfield" title={f}>
                                {f}
                                {targetName !== f && <span style={{ marginLeft:".3rem", fontSize:".58rem", color:"var(--amber)" }}>→ {targetName}</span>}
                              </span>
                              <div className="dvals">
                                <span className="dold">{String(o[f] ?? "")}</span>
                                <span className="arr">→</span>
                                <span className="dnew">{String(r[f] ?? "")}</span>
                              </div>
                            </div>
                          );
                        })
                      }
                    </div>
                  );
                })
              }
            </>)}

            {/* ── Tab: Payload naar Profit ── */}
            {tab === "payload" && (<>
              <div style={{ padding:".45rem .75rem", background:"rgba(59,130,246,.04)",
                borderBottom:"1px solid var(--b1)", fontSize:".68rem", color:"var(--t3)" }}>
                Dit is exact wat naar <strong style={{ color:"var(--amber)" }}>{connector.updateConn}</strong> wordt verstuurd —
                na veldkoppeling, transformaties en vaste waarden.
              </div>
              {payloadPreviews.map(({ r, fields: pf }) => {
                const entries = Object.entries(pf);
                const keyVal = connector.keyField ? String(r[connector.keyField] ?? "") : r._id;
                return (
                  <div className="diff-rec" key={r._id}>
                    <div style={{ fontFamily:"var(--mono)", fontSize:".62rem", color:"var(--t3)",
                      marginBottom:".35rem", display:"flex", gap:".4rem", alignItems:"center" }}>
                      {r._isNew
                        ? <span style={{ background:"var(--gb)", border:"1px solid rgba(34,197,94,.3)", color:"var(--green)", padding:".05rem .3rem", borderRadius:3 }}>POST</span>
                        : <span style={{ background:"rgba(59,130,246,.1)", border:"1px solid rgba(59,130,246,.2)", color:"var(--accent)", padding:".05rem .3rem", borderRadius:3 }}>PUT</span>
                      }
                      {connector.keyField && !r._isNew && <span style={{ color:"var(--t2)" }}>{connector.keyField}: <strong>{keyVal}</strong></span>}
                      <span style={{ color:"var(--t3)" }}>{entries.length} veld{entries.length !== 1 ? "en" : ""}</span>
                    </div>
                    {entries.length === 0
                      ? <div style={{ fontSize:".7rem", color:"var(--red)", paddingLeft:".4rem" }}>
                          ⚠ Geen velden in payload — controleer veldkoppeling
                        </div>
                      : (
                        <div style={{ display:"grid", gridTemplateColumns:"minmax(120px,1fr) 2fr",
                          gap:"0", fontFamily:"var(--mono)", fontSize:".7rem" }}>
                          {/* Header */}
                          <div style={{ padding:".2rem .45rem", color:"var(--t3)", fontSize:".6rem",
                            borderBottom:"1px solid var(--b1)", fontWeight:600, letterSpacing:".04em" }}>
                            VELD (UpdateConnector)
                          </div>
                          <div style={{ padding:".2rem .45rem", color:"var(--t3)", fontSize:".6rem",
                            borderBottom:"1px solid var(--b1)", fontWeight:600, letterSpacing:".04em" }}>
                            WAARDE
                          </div>
                          {entries.map(([fieldName, value]) => {
                            // Look up source GET field + transform annotations
                            const srcEntry = fm
                              ? Object.entries(fm).find(([k, m]) => m.updateField === fieldName && m.include !== false)
                              : null;
                            const srcGetField = srcEntry ? srcEntry[0] : null;
                            const srcMapping  = srcEntry ? srcEntry[1] : null;
                            const hasTx       = srcMapping && srcMapping.transform;
                            const hasFixed    = srcMapping && srcMapping.fixedValue !== undefined && srcMapping.fixedValue !== null && srcMapping.fixedValue !== "";
                            const isFixedOnly = srcGetField && srcGetField.startsWith("__fixed__");
                            return [
                              <div key={fieldName + "_k"} style={{ padding:".25rem .45rem",
                                borderBottom:"1px solid rgba(255,255,255,.04)",
                                color:"var(--t1)", display:"flex", alignItems:"center", gap:".3rem" }}>
                                <span>{fieldName}</span>
                                {hasTx && <span title={"Transformatie: " + hasTx}
                                  style={{ color:"var(--amber)", fontSize:".58rem" }}>⚡</span>}
                                {(hasFixed || isFixedOnly) && <span title="Vaste waarde"
                                  style={{ color:"#a78bfa", fontSize:".58rem" }}>⬤</span>}
                              </div>,
                              <div key={fieldName + "_v"} style={{ padding:".25rem .45rem",
                                borderBottom:"1px solid rgba(255,255,255,.04)",
                                display:"flex", alignItems:"center", gap:".45rem" }}>
                                <span style={{ color:"var(--green)", wordBreak:"break-all" }}>
                                  {value === null || value === undefined ? <em style={{ color:"var(--t3)" }}>null</em> : String(value)}
                                </span>
                                {!isFixedOnly && srcGetField && srcGetField !== fieldName && (
                                  <span style={{ color:"var(--t3)", fontSize:".6rem" }}>
                                    ← {srcGetField}
                                    {hasTx && <span style={{ color:"var(--amber)", marginLeft:".25rem" }}>({hasTx})</span>}
                                  </span>
                                )}
                                {(hasFixed || isFixedOnly) && (
                                  <span style={{ color:"#a78bfa", fontSize:".6rem" }}>vaste waarde</span>
                                )}
                              </div>
                            ];
                          })}
                        </div>
                      )
                    }
                  </div>
                );
              })}
            </>)}

          </div>

          <div className="notice n-amber" style={{ margin:".55rem .75rem", borderRadius:5 }}>
            ⚠ Wijzigingen worden direct verstuurd naar AFAS Profit. Dit kan niet ongedaan worden gemaakt.
          </div>
        </div>

        <div className="mf">
          <button className="btn btn-ghost" onClick={onClose}>Annuleren</button>
          <button className="btn btn-success" disabled={changes.length === 0 || !hasUpdateConn}
            onClick={()=>onConfirm()}>↑ Bevestig &amp; verstuur {changes.length} record{changes.length!==1?"s":""} naar Profit</button>
        </div>
      </div>
    </div>
  );
}

// ── SAVE RESULT MODAL ─────────────────────────────────────────────────────────
function SaveResultModal({ result, rows, fields, onRetry, onReload, onClose }) {
  const { results } = result;
  const failedIds = new Set(results.failed.map(f => f.id));
  const allOk = results.failed.length === 0 && results.ok.length > 0;
  const allFailed = results.ok.length === 0 && results.failed.length > 0;

  return (
    <div className="overlay" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="modal wide">
        <div className="mh">
          <div className="mtitle" style={{ color: allOk ? "var(--green)" : allFailed ? "var(--red)" : "var(--amber)" }}>
            {allOk ? "✓ Opgeslagen in Profit" : allFailed ? "✕ Opslaan mislukt" : "⚠ Deels opgeslagen"}
          </div>
          <div className="mclose" onClick={onClose}>✕</div>
        </div>
        <div className="mb">
          {/* Summary */}
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:".65rem" }}>
            <div style={{ background:"var(--gb)", border:"1px solid rgba(34,197,94,.25)", borderRadius:6, padding:".65rem .9rem", display:"flex", alignItems:"center", gap:".5rem" }}>
              <span style={{ fontSize:"1.2rem" }}>✓</span>
              <div>
                <div style={{ fontFamily:"var(--mono)", fontSize:"1.15rem", color:"var(--green)", fontWeight:700 }}>{results.ok.length}</div>
                <div style={{ fontSize:".7rem", color:"var(--t2)" }}>Succesvol opgeslagen</div>
              </div>
            </div>
            <div style={{ background:"var(--rb)", border:"1px solid rgba(239,68,68,.25)", borderRadius:6, padding:".65rem .9rem", display:"flex", alignItems:"center", gap:".5rem" }}>
              <span style={{ fontSize:"1.2rem" }}>✕</span>
              <div>
                <div style={{ fontFamily:"var(--mono)", fontSize:"1.15rem", color:"var(--red)", fontWeight:700 }}>{results.failed.length}</div>
                <div style={{ fontSize:".7rem", color:"var(--t2)" }}>Mislukt</div>
              </div>
            </div>
          </div>

          {/* Failed records detail */}
          {results.failed.length > 0 && (
            <>
              <div className="notice n-amber">
                ⚠ Mislukte records zijn <strong>niet teruggedraaid</strong> — wijzigingen blijven zichtbaar zodat je ze kunt corrigeren en opnieuw proberen.
              </div>
              <div className="diff-scroll">
                <div className="diff-head">Mislukte records — foutdetails</div>
                {results.failed.map(({ id, err }) => {
                  const row = rows.find(r => r._id === id) || {};
                  return (
                    <div className="diff-rec" key={id} style={{ borderLeft:"3px solid var(--red)" }}>
                      <div style={{ fontFamily:"var(--mono)", fontSize:".62rem", color:"var(--t3)", marginBottom:".3rem" }}>
                        {row._isNew
                          ? <span style={{ color:"var(--green)" }}>POST nieuw</span>
                          : <span style={{ color:"var(--accent)" }}>PUT {id}</span>
                        }
                        {fields[0] && <span style={{ color:"var(--t2)", marginLeft:".4rem" }}>{String(row[fields[0]]??"")}</span>}
                      </div>
                      <div style={{ padding:".35rem .5rem",
                        background:"rgba(239,68,68,.08)", border:"1px solid rgba(239,68,68,.2)",
                        borderRadius:4, fontFamily:"var(--mono)", fontSize:".65rem",
                        color:"var(--red)", wordBreak:"break-word", lineHeight:1.65, whiteSpace:"pre-wrap" }}>
                        {err}
                      </div>
                    </div>
                  );
                })}
              </div>
            </>
          )}
        </div>
        <div className="mf">
          <button className="btn btn-ghost" onClick={onClose}>Sluiten zonder herladen</button>
          {results.failed.length > 0 && (
            <button className="btn btn-primary" onClick={() => onRetry(failedIds)}>
              ↻ Opnieuw proberen ({results.failed.length})
            </button>
          )}
          {results.ok.length > 0 && (
            <button className="btn btn-success" onClick={onReload}>
              ↓ Sluiten &amp; data herladen
            </button>
          )}
        </div>
      </div>
    </div>
  );
}


function AddConnectorModal({ config, initialType="get", connectors=[], editConnector=null, onClose, onAdd, onUpdate, afasUpdateConns=[] }) {
  const isEdit = !!editConnector;

  // Derive initial tab from editConnector if editing
  const [tab, setTab] = useState(editConnector?.connType || initialType);

  // GET tab state — pre-fill when editing
  // gLinked stores the UpdateConnector name (works with both live and local lists)
  const linkedId = () => {
    if (!editConnector?.updateConn) return "";
    return editConnector.updateConn || "";
  };
  const [gName, setGName]       = useState(editConnector?.name  || "");
  const [gLabel, setGLabel]     = useState(editConnector?.label || "");
  const [gIcon, setGIcon]       = useState(editConnector?.icon  || "📋");
  const [gTake, setGTake]       = useState(String(editConnector?.take ?? 100));
  const [gFf, setGFf]           = useState(editConnector?.filter?.fields || "");
  const [gFv, setGFv]           = useState(editConnector?.filter?.values || "");
  const [gFo, setGFo]           = useState(editConnector?.filter?.ops    || "1");
  const [gLinked, setGLinked]   = useState(linkedId);
  const [testing, setTesting]   = useState(false);
  const [testResult, setTestResult] = useState(null);
  const [previewRows, setPreviewRows] = useState(null);

  // Live AFAS connector lists fetched on mount
  const [liveGet,    setLiveGet]    = useState([]);
  const [liveUpdate, setLiveUpdate] = useState([]);
  const [liveFetching, setLiveFetching] = useState(false);
  const [liveErr,    setLiveErr]    = useState(null);

  useEffect(() => {
    if (!config?.env || !config?.token) return;
    setLiveFetching(true);
    afasFetch(config.env, config.token, "/metainfo", {}, config.envType||"production")
      .then(data => {
        const getList    = (data.getConnectors    || []).map(c => typeof c==="string" ? {id:c,description:""} : {id:c.id||c.connectorId||"",description:c.description||""});
        const updateList = (data.updateConnectors || []).map(c => typeof c==="string" ? {id:c,description:""} : {id:c.id||c.connectorId||"",description:c.description||""});
        setLiveGet(getList);
        setLiveUpdate(updateList);
      })
      .catch(e => setLiveErr(e.message))
      .finally(() => setLiveFetching(false));
  }, []);

  // File connector state
  const [fLabel, setFLabel]         = useState(editConnector?.connType==="file" ? (editConnector.label||"") : "");
  const [fLinked, setFLinked]       = useState(() => {
    if (editConnector?.connType!=="file" || !editConnector?.updateConn) return "";
    // Use the name directly (live dropdown uses names as values)
    return editConnector.updateConn || "";
  });
  const [fKeyField, setFKeyField]   = useState(editConnector?.connType==="file" ? (editConnector.keyField||"") : "");
  const [fFile, setFFile]           = useState(null);   // File object
  const [fParsed, setFParsed]       = useState(null);   // { fields, rows }
  const [fParseErr, setFParseErr]   = useState(null);
  const [fParsing, setFParsing]     = useState(false);
  const [fDelimiter, setFDelimiter] = useState(editConnector?.fileData?.delimiter || "auto");
  const [fRawText,  setFRawText]   = useState(editConnector?.connType==="file" ? (editConnector.fileData?.rawText||null) : null);

  const parseFile = async (file, delimOverride) => {
    if (!file) return;
    setFParsing(true); setFParseErr(null); setFParsed(null);
    const delim = delimOverride !== undefined ? delimOverride : fDelimiter;
    // file can be a File object or a raw text string (for re-parse on delimiter change)
    const isRawText = typeof file === "string";
    const ext = isRawText ? "csv" : file.name.split(".").pop().toLowerCase();
    try {
      if (ext === "csv" || ext === "txt") {
        await new Promise((resolve) => {
          Papa.parse(file, {
            header: true, skipEmptyLines: true,
            delimiter: delim === "auto" ? "" : delim,
            complete: (result) => {
              if (result.errors.length && !result.data.length) {
                setFParseErr("CSV-fout: " + result.errors[0].message);
              } else {
                const det = result.meta.delimiter || delim;
                // If auto-detect found a different delimiter, update the select
                if (delim === "auto" || delim === ",") {
                  setFDelimiter(det === "\t" ? "\t" : det);
                }
                const rows = result.data.map((r,i) => ({ ...r, _id: String(r[Object.keys(r)[0]] ?? `ROW-${i}`) }));
                setFParsed({ fields: result.meta.fields || [], rows, detectedDelim: det, isCSV: true });
              }
              resolve();
            },
            error: (err) => { setFParseErr(err.message); resolve(); }
          });
        });
      } else if (["xlsx","xls","ods"].includes(ext)) {
        const buf = await file.arrayBuffer();
        const wb  = XLSX.read(buf, { type:"array" });
        const ws  = wb.Sheets[wb.SheetNames[0]];
        const data = XLSX.utils.sheet_to_json(ws, { defval:"" });
        if (!data.length) { setFParseErr("Geen data gevonden in het bestand."); }
        else {
          const rows = data.map((r,i) => ({ ...r, _id: String(r[Object.keys(r)[0]] ?? `ROW-${i}`) }));
          setFParsed({ fields: Object.keys(data[0]), rows });
        }
      } else {
        setFParseErr("Bestandstype niet ondersteund. Gebruik CSV of Excel (.xlsx/.xls).");
      }
    } catch(e) { setFParseErr(e.message); }
    setFParsing(false);
  };

  const handleFileChange = (e) => {
    const f = e.target.files?.[0];
    if (!f) return;
    setFFile(f);
    if (!fLabel.trim()) setFLabel(f.name.replace(/\.[^.]+$/,""));
    // Store raw text for re-parse on delimiter change
    if (f.name.match(/\.(csv|txt)$/i)) {
      f.text().then(txt => setFRawText(txt));
    } else {
      setFRawText(null);
    }
    parseFile(f);
  };

  // UPDATE tab state — pre-fill when editing
  const [uName, setUName]   = useState(editConnector?.name     || "");
  const [uLabel, setULabel] = useState(editConnector?.label    || "");
  const [uKey, setUKey]     = useState(editConnector?.keyField || "");

  const ICONS = ["📋","👥","💰","📦","🏢","🧾","📊","🔧","📁","🗂️","⚙️","📈","📉","🔑","📝"];
  const allUpdateConns = connectors.filter(c => c.connType === "update" && (!isEdit || c.id !== editConnector?.id));
  const updateConns = afasUpdateConns.length > 0
    ? allUpdateConns.filter(c => afasUpdateConns.some(a => (typeof a === "string" ? a : (a.id||a.connectorId||a)) === c.name))
    : allUpdateConns;
  const envSub = { production:"rest", test:"resttest", acceptance:"restaccept" }[config.envType||"production"];

  useEffect(() => { if (!isEdit) { setTestResult(null); setPreviewRows(null); } }, [gName]);
  useEffect(() => { setTestResult(null); setPreviewRows(null); }, [tab]);

  const runTest = async () => {
    if (!gName.trim()) { setTestResult({ ok:false, msg:"Vul een connectornaam in." }); return; }
    setTesting(true); setTestResult(null); setPreviewRows(null);
    try {
      const params = { skip:0, take:3 };
      if (gFf.trim()) { params.filterfieldids=gFf.trim(); params.filtervalues=gFv.trim(); params.operatortypes=gFo; }
      const data = await afasFetch(config.env, config.token, `/connectors/${encodeURIComponent(gName.trim())}`, params, config.envType||"production");
      const rows = data.rows || [];
      setPreviewRows(rows);
      setTestResult({ ok:true, msg:`✓ Verbinding OK — ${rows.length>0?Object.keys(rows[0]).length:0} velden, ${rows.length} preview record(s).` });
      if (!gLabel.trim()) setGLabel(gName.trim());
    } catch(e) {
      setTestResult({ ok:false, msg:`Fout: ${e.message}` });
    } finally { setTesting(false); }
  };

  const handleSave = () => {
    if (tab === "get") {
      if (!gName.trim()) return;
      // gLinked is either a live connector name or a local connector id
      const linkedLocal = updateConns.find(c => c.id === gLinked);
      const linkedName  = linkedLocal?.name || (liveUpdate.find(c => c.id === gLinked) ? gLinked : null);
      const linkedKey   = linkedLocal?.keyField || null;
      // Auto-create UpdateConnector locally if it's live but not yet local
      if (linkedName && !linkedLocal && !connectors.find(c => c.connType==="update" && c.name===linkedName)) {
        onAdd({ id: uid(), name: linkedName, label: linkedName, connType:"update", icon:"✏️", take:0, filter:null, updateConn:linkedName, keyField:null });
      }
      const data = {
        connType: "get",
        name:      gName.trim(),
        label:     gLabel.trim() || gName.trim(),
        icon:      gIcon,
        take:      Math.max(1, parseInt(gTake)||100),
        filter:    gFf.trim() ? { fields:gFf.trim(), values:gFv.trim(), ops:gFo } : null,
        updateConn: linkedName,
        keyField:   linkedKey,
      };
      if (isEdit) onUpdate(editConnector.id, data);
      else        onAdd({ id: uid(), ...data });
