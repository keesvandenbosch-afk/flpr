                onKeyDown={e => e.key==="Enter" && handleTest()} />
              <div className="help-text">
                Plak de volledige waarde uit <code style={{ fontFamily:"var(--mono)", fontSize:".67rem" }}>-H "Authorization: …"</code> of alleen de base64-string.<br/>
                Aanmaken via <em>AFAS Profit → Beheer → App connector → Nieuw</em>.
              </div>
            </div>

            {/* Token preview */}
            {token && (
              <div className="fgrp">
                <div className="flbl">Authorization header (gegenereerd)</div>
                <div className="token-preview">
                  {buildToken(token).slice(0,120)}{buildToken(token).length > 120 ? "…" : ""}
                </div>
              </div>
            )}

            {err && <div className="notice n-red">{err}</div>}

            <div className="notice n-amber" style={{ fontSize:".72rem" }}>
              <strong>Let op CORS:</strong> open dit bestand via een lokale server.<br/>
              <code style={{ fontFamily:"var(--mono)", fontSize:".68rem" }}>npx serve .</code>
              &nbsp;of&nbsp;
              <code style={{ fontFamily:"var(--mono)", fontSize:".68rem" }}>python -m http.server</code>
            </div>
          </div>

          <div className="setup-footer">
            {onCancel && <button className="btn btn-ghost" onClick={onCancel} style={{ marginRight:"auto" }}>✕ Annuleren</button>}
            <button className="btn btn-primary"
              onClick={handleTest}
              disabled={testing || !env.trim() || !token.trim()}>
              {testing ? <><Spin /> Verbinding testen &amp; connectoren ophalen…</> : "Verbinding testen →"}
            </button>
          </div>
        </>}

        {/* ── STAP 2: Connectoren kiezen ── */}
        {step === 2 && metaInfo && <>
          <div className="setup-body" style={{ gap:".75rem" }}>

            {/* Success banner met omgevingsinfo */}
            <div style={{ background:"var(--gb)", border:"1px solid rgba(34,197,94,.2)", borderRadius:6,
              padding:".6rem .85rem", display:"flex", justifyContent:"space-between",
              alignItems:"center", flexWrap:"wrap", gap:".5rem" }}>
              <div>
                <div style={{ fontSize:".8rem", color:"var(--green)", fontWeight:500 }}>
                  ✓ Verbinding geslaagd
                </div>
                <div style={{ fontFamily:"var(--mono)", fontSize:".65rem", color:"var(--t2)", marginTop:".1rem" }}>
                  {domain} · {ENV_LABELS[envType]}
                  {metaInfo.info?.appName && <span style={{ marginLeft:".5rem", color:"var(--t3)" }}>· {metaInfo.info.appName}</span>}
                  {metaInfo.info?.tokenExpiry && <span style={{ marginLeft:".5rem", color:"var(--t3)" }}>· token verloopt: {metaInfo.info.tokenExpiry}</span>}
                </div>
              </div>
            </div>

            {/* Telrij */}
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:".45rem" }}>
              {[
                { label:"GetConnectoren",    n: metaInfo.getConnectors.length,    color:"var(--accent)" },
                { label:"UpdateConnectoren", n: metaInfo.updateConnectors.length, color:"var(--amber)"  },
                { label:"Geselecteerd",      n: sel.size,                         color:"var(--green)"  },
              ].map(s => (
                <div key={s.label} style={{ background:"var(--s2)", border:"1px solid var(--b1)",
                  borderRadius:6, padding:".5rem .6rem", textAlign:"center" }}>
                  <div style={{ fontFamily:"var(--mono)", fontSize:"1.15rem", fontWeight:700, color:s.color }}>{s.n}</div>
                  <div style={{ fontSize:".62rem", color:"var(--t3)", marginTop:".08rem" }}>{s.label}</div>
                </div>
              ))}
            </div>

            {totalConns > 0
              ? <ConnectorPicker connList={metaInfo} sel={sel} setSel={setSel} />
              : <div className="notice n-amber">Geen connectoren gevonden via de metainfo-endpoint. Je kunt ze later handmatig toevoegen.</div>
            }
          </div>

          <div className="setup-footer">
            <div style={{ display:"flex", gap:".5rem" }}>
              {onCancel && <button className="btn btn-ghost" onClick={onCancel}>✕ Annuleren</button>}
              <button className="btn btn-ghost" onClick={() => { setStep(1); setErr(null); }}>← Terug</button>
            </div>
            <button className="btn btn-primary" onClick={handleFinish}>
              {sel.size > 0
                ? `${sel.size} connector${sel.size !== 1 ? "s" : ""} laden →`
                : "Doorgaan zonder connectoren →"}
            </button>
          </div>
        </>}
      </div>
    </div>
  );
}
// ── EDITOR VIEW ───────────────────────────────────────────────────────────────
function EditorView({ config, connector, onUpdateConnector, runHistory = [], onEnableConnector, onTokenExpired }) {
  const [loading, setLoading]     = useState(false);
  const [saving,       setSaving]       = useState(false);
  const [rows, setRows]           = useState([]);
  const [originals, setOriginals] = useState([]);
  const [fields, setFields]       = useState([]);
  const [selected, setSelected]   = useState(new Set());
  const [activeRow, setActiveRow] = useState(null);
  const [search, setSearch]       = useState("");
  const [sortField, setSortField] = useState(null);
  const [sortDir, setSortDir]     = useState("asc");
  const [colWidths, setColWidths] = useState({});
  const theadRef = React.useRef(null);
  const colWidthsInit = React.useRef(false);

  // Eenmalig: lees werkelijke th-breedtes uit DOM zodra tabel zichtbaar is
  // Reset when fields change so new connector gets fresh measurement
  React.useEffect(() => {
    colWidthsInit.current = false;
    setColWidths({});
  }, [fields.join(",")]);

  React.useEffect(() => {
    if (colWidthsInit.current || !theadRef.current) return;
    const ths = theadRef.current.querySelectorAll("th[data-field]");
    if (!ths.length) return;
    const measured = {};
    ths.forEach(th => { measured[th.dataset.field] = th.getBoundingClientRect().width; });
    setColWidths(measured);
    colWidthsInit.current = true;
  });

  const startResize = (e, field) => {
    e.preventDefault(); e.stopPropagation();
    const startX = e.clientX;
    const startW = colWidths[field] || e.currentTarget.closest("th").getBoundingClientRect().width;
    const onMove = ev => setColWidths(w => ({ ...w, [field]: Math.max(60, startW + ev.clientX - startX) }));
    const onUp   = () => { document.removeEventListener("mousemove", onMove); document.removeEventListener("mouseup", onUp); };
    document.addEventListener("mousemove", onMove);
    document.addEventListener("mouseup", onUp);
  };
  const [showTx, setShowTx]                     = useState(false);
  const [showDiff, setShowDiff]                 = useState(false);
  const [showSaveResult, setShowSaveResult]     = useState(null);
  const [showFieldMap, setShowFieldMap]         = useState(false);
  const [toast, setToast]                       = useState(null);
  const [auditLog, setAuditLog]   = useState([]);
  const [editorTab, setEditorTab] = useState("data"); // "data" | "logboek" 
  const [fetchErr, setFetchErr]   = useState(null);
  const [skip, setSkip]           = useState(0);
  const [total, setTotal]         = useState(null);

  const showToast = (msg, type="green") => setToast({ msg, type, key:uid() });
  const addAudit = (msg, details = null) => {
    const d = new Date();
    const t = `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}:${String(d.getSeconds()).padStart(2,"0")}`;
    const datum = d.toLocaleDateString("nl-NL");
    setAuditLog(p => [{ t, datum, msg, details }, ...p.slice(0, 49)]);
  };

  // Reset when connector changes; auto-load first 10 rows
  useEffect(() => {
    setRows([]); setOriginals([]); setFields([]); setFetchErr(null);
    setTotal(null); setSkip(0); setSelected(new Set()); setActiveRow(null);
    // Always auto-load first 10 rows when opening a connector
    const t = setTimeout(() => doFetch(0, 10), 50);
    return () => clearTimeout(t);
  }, [connector.id]);

  const doFetch = useCallback(async (newSkip=0, takeOverride=null) => {
    setLoading(true); setFetchErr(null); setSelected(new Set()); setActiveRow(null); setSearch("");
    try {
      // File connector: load from embedded fileData instead of AFAS API
      if (connector.connType === "file") {
        const fd = connector.fileData;
        if (!fd) throw new Error("Geen bestandsdata gevonden. Bewerk de connector om het bestand opnieuw te uploaden.");
        const allRows = fd.rows || [];
        const take = takeOverride ?? allRows.length;
        const slice = allRows.slice(newSkip, newSkip + take);
        setRows(deepClone(slice));
        setOriginals(deepClone(slice));
        setFields(fd.fields || (slice.length>0 ? Object.keys(slice[0]).filter(k=>!k.startsWith("_")) : []));
        setTotal(allRows.length);
        setSkip(newSkip);
        showToast(`${slice.length} records geladen uit ${connector.fileName||"bestand"}`, "green");
        addAudit(`${connector.name} — ${slice.length} records uit bestand`);
        return;
      }
      const params = { skip:newSkip, take:takeOverride ?? connector.take ?? 100 };
      if (connector.filter?.fields) { params.filterfieldids=connector.filter.fields; params.filtervalues=connector.filter.values; params.operatortypes=connector.filter.ops||"1"; }
      const data = await afasFetch(config.env, config.token, `/connectors/${encodeURIComponent(connector.name)}`, params, config.envType||"production");
      const r = (data.rows||[]).map((row,i) => {
        // Use keyField as _id. connector.keyField is the UC field name (e.g. BcCoNr),
        // but GET data may use a different name. Try direct match first, then first field.
        const keyVal = connector.keyField ? (row[connector.keyField] ?? Object.values(row)[0]) : Object.values(row)[0];
        const id = keyVal ?? `ROW-${newSkip+i}`;
        return { ...row, _id: String(id) };
      });
      setRows(r);
      setOriginals(deepClone(r));
      setFields(r.length>0 ? Object.keys(r[0]).filter(k=>!k.startsWith("_")) : []);
      setTotal(data.count??data.total??null);
      setSkip(newSkip);
      showToast(`${r.length} records geladen`, "green");
      addAudit(`${connector.name} — ${r.length} records opgehaald`);
    } catch(e) {
      if (e.name === "TokenExpiredError" && onTokenExpired) onTokenExpired();
      setFetchErr(e.message);
      showToast(`Fout: ${e.message}`, "red");
    } finally { setLoading(false); }
  }, [config, connector]);

  const changedCount = useMemo(() => rows.filter(r => {
    if (r._isNew) return true;
    const o=originals.find(x=>x._id===r._id);
    return o && fields.some(f=>String(r[f]??"")!==String(o[f]??""));
  }).length, [rows, originals, fields]);



  const visible = useMemo(() => {
    let v=[...rows];
    if (search.trim()) { const q=search.toLowerCase(); v=v.filter(r=>fields.some(f=>String(r[f]??"").toLowerCase().includes(q))); }
    if (sortField) v.sort((a,b)=>{ const av=String(a[sortField]??""),bv=String(b[sortField]??""); return sortDir==="asc"?av.localeCompare(bv):bv.localeCompare(av); });
    return v;
  }, [rows, search, sortField, sortDir, fields]);

  const editCell = (rowId, f, v) => setRows(p=>p.map(r=>r._id===rowId?{...r,[f]:v}:r));

  const toggleSel = (id, e) => { e.stopPropagation(); setSelected(p=>{const s=new Set(p);s.has(id)?s.delete(id):s.add(id);return s;}); };

  const addRow = () => {
    const nr={_id:`NEW-${uid()}`,_isNew:true};
    fields.forEach(f=>{nr[f]="";});
    setRows(p=>[nr,...p]); setActiveRow(nr);
    showToast("Nieuw record aangemaakt","amber");
  };

  const deleteSelected = () => {
    const cnt=selected.size;
    setRows(p=>p.filter(r=>!selected.has(r._id)));
    setOriginals(p=>p.filter(r=>!selected.has(r._id)));
    setSelected(new Set()); setActiveRow(null);
    showToast(`${cnt} record(s) verwijderd`,"amber");
    addAudit(`${cnt} record(s) verwijderd`);
  };

  const revertRow = id => {
    const o=originals.find(r=>r._id===id); if(!o) return;
    setRows(p=>p.map(r=>r._id===id?deepClone(o):r)); setActiveRow(deepClone(o));
    showToast("Teruggedraaid","amber");
  };

  const saveSingleRow = async (row, e) => {
    e.stopPropagation();
    if (!connector.updateConn) { showToast("Geen UpdateConnector geconfigureerd", "red"); return; }
    const method  = row._isNew ? "POST" : "PUT";

    // For PUT: send all explicitly mapped GET fields (include:true) + changed fields
    // Always include mapped fields so MatchOga/BcCo etc. are present for AFAS to find the record
    let rowForPayload = row;
    if (method === "PUT" && connector.fieldMap) {
      // buildUpdatePayload verwerkt alle passes (GET, fixed, multi, comp)
      // geef de volledige row mee zodat alle sleutels beschikbaar zijn
      rowForPayload = row;
    }

    const payload = buildUpdatePayload(connector.updateConn, rowForPayload, connector.fieldMap || null);
    let url_suffix = "";
    if (!row._isNew) {
      const { paramName, paramValue } = getKeyForUrl(row, connector);
      if (paramName) url_suffix = "?" + encodeURIComponent(paramName) + "=" + encodeURIComponent(paramValue);
    }
    const results = { ok: [], failed: [] };
    const snapshot = deepClone(originals);
    try {
      await afasUpdate(config.env, config.token, connector.updateConn + url_suffix, method, payload, config.envType || "production");
      results.ok.push(row._id);
      setOriginals(p => p.map(o => {
        if (o._id !== row._id) return o;
        const c = {...row}; delete c._isNew; return c;
      }));
      setRows(p => p.map(r => {
        if (r._id !== row._id) return r;
        const c = {...r}; delete c._isNew; return c;
      }));
      addAudit(connector.updateConn + " — 1 record opgeslagen (" + method + ")");
    } catch(err) {
      results.failed.push({ id: row._id, err: err.message });
    }
    setShowSaveResult({ results, snapshot, toSave: [row] });
  };

  const revertAll = () => { setRows(deepClone(originals)); setActiveRow(null); showToast("Alle wijzigingen teruggedraaid","amber"); };

  const applyTransform = (params) => {
    const { type, field, field2, params: p } = params;
    const ids = selected.size > 0 ? selected : new Set(visible.map(r => r._id));
    let changed = 0;

    setRows(prev => prev.map(r => {
      if (!ids.has(r._id)) return r;
      const raw  = r[field] ?? "";
      const raw2 = field2 ? (r[field2] ?? "") : "";
      let v = String(raw);
      let v2 = field2 ? String(raw2) : "";
      let result = v;

      try {
        switch (type) {
          // ── TEKST ────────────────────────────────────────────────
          case "replace":         result = v.replaceAll(p.find ?? "", p.replace ?? ""); break;
          case "replace_regex":   result = v.replace(new RegExp(p.pattern, p.flags ?? "g"), p.replace ?? ""); break;
          case "bulkset":         result = p.value ?? ""; break;
          case "uppercase":       result = v.toUpperCase(); break;
          case "lowercase":       result = v.toLowerCase(); break;
          case "titlecase":       result = v.replace(/\b\w/g, c => c.toUpperCase()); break;
          case "trim":            result = v.trim(); break;
          case "trim_left":       result = v.trimStart(); break;
          case "trim_right":      result = v.trimEnd(); break;
          case "prefix":          result = (p.value ?? "") + v; break;
          case "suffix":          result = v + (p.value ?? ""); break;
          case "pad_left":        result = v.padStart(parseInt(p.length) || 0, p.char ?? " "); break;
          case "pad_right":       result = v.padEnd(parseInt(p.length) || 0, p.char ?? " "); break;
          case "slice":           result = v.slice(parseInt(p.start) || 0, p.end !== "" ? parseInt(p.end) : undefined); break;
          case "truncate":        result = v.length > (parseInt(p.length)||0) ? v.slice(0, parseInt(p.length)) + (p.ellipsis ? "…" : "") : v; break;
          case "remove_spaces":   result = v.replace(/\s+/g, ""); break;
          case "normalize_spaces":result = v.trim().replace(/\s+/g, " "); break;
          case "remove_special":  result = v.replace(/[^a-zA-Z0-9\s]/g, ""); break;
          case "extract_numbers": result = (v.match(/\d+\.?\d*/g) || []).join(""); break;
          case "extract_letters": result = v.replace(/[^a-zA-Z]/g, ""); break;
          case "repeat":          result = v.repeat(Math.max(1, parseInt(p.times) || 1)); break;
          case "reverse":         result = v.split("").reverse().join(""); break;
          case "clear":           result = ""; break;
          case "concat_field":    result = v + (p.sep ?? "") + v2; break;

          // ── GETAL ────────────────────────────────────────────────
          case "num_add":         { const n=parseFloat(v); result = isNaN(n) ? v : String(+(n + parseFloat(p.value||0)).toFixed(10)); } break;
          case "num_subtract":    { const n=parseFloat(v); result = isNaN(n) ? v : String(+(n - parseFloat(p.value||0)).toFixed(10)); } break;
          case "num_multiply":    { const n=parseFloat(v); result = isNaN(n) ? v : String(+(n * parseFloat(p.value||1)).toFixed(10)); } break;
          case "num_divide":      { const n=parseFloat(v); const d=parseFloat(p.value||1); result = isNaN(n)||d===0 ? v : String(+(n/d).toFixed(10)); } break;
          case "num_round":       { const n=parseFloat(v); result = isNaN(n) ? v : String(+n.toFixed(parseInt(p.decimals)??0)); } break;
          case "num_floor":       { const n=parseFloat(v); result = isNaN(n) ? v : String(Math.floor(n)); } break;
          case "num_ceil":        { const n=parseFloat(v); result = isNaN(n) ? v : String(Math.ceil(n)); } break;
          case "num_abs":         { const n=parseFloat(v); result = isNaN(n) ? v : String(Math.abs(n)); } break;
          case "num_negate":      { const n=parseFloat(v); result = isNaN(n) ? v : String(-n); } break;
          case "num_format":      { const n=parseFloat(v); result = isNaN(n) ? v : n.toLocaleString("nl-NL", { minimumFractionDigits: parseInt(p.decimals)??2, maximumFractionDigits: parseInt(p.decimals)??2 }); } break;
          case "num_clamp":       { const n=parseFloat(v); const mn=parseFloat(p.min??"-Infinity"); const mx=parseFloat(p.max??"Infinity"); result = isNaN(n)?v:String(Math.min(Math.max(n,mn),mx)); } break;
          case "num_percent":     { const n=parseFloat(v); result = isNaN(n) ? v : String(+(n/100).toFixed(10)); } break;
          case "num_from_percent":{ const n=parseFloat(v); result = isNaN(n) ? v : String(+(n*100).toFixed(10)); } break;

          // ── DATUM ────────────────────────────────────────────────
          case "date_today":      result = new Date().toISOString().slice(0,10); break;
          case "date_now":        result = new Date().toISOString(); break;
          case "date_format": {
            const d = new Date(v);
            if (isNaN(d)) { result = v; break; }
            const fmt = p.format ?? "dd-MM-yyyy";
            const pad = n => String(n).padStart(2,"0");
            result = fmt
              .replace("yyyy", d.getFullYear())
              .replace("MM",   pad(d.getMonth()+1))
              .replace("dd",   pad(d.getDate()))
              .replace("HH",   pad(d.getHours()))
              .replace("mm",   pad(d.getMinutes()))
              .replace("ss",   pad(d.getSeconds()));
          } break;
          case "date_add_days": {
            const d = new Date(v); if (isNaN(d)) { result=v; break; }
            d.setDate(d.getDate() + (parseInt(p.days)||0));
            result = d.toISOString().slice(0,10);
          } break;
          case "date_add_months": {
            const d = new Date(v); if (isNaN(d)) { result=v; break; }
            d.setMonth(d.getMonth() + (parseInt(p.months)||0));
            result = d.toISOString().slice(0,10);
          } break;
          case "date_extract": {
            const d = new Date(v); if (isNaN(d)) { result=v; break; }
            const part = p.part ?? "year";
            if (part==="year")  result = String(d.getFullYear());
            else if (part==="month") result = String(d.getMonth()+1);
            else if (part==="day")   result = String(d.getDate());
            else if (part==="weekday") result = ["zondag","maandag","dinsdag","woensdag","donderdag","vrijdag","zaterdag"][d.getDay()];
            else if (part==="quarter") result = String(Math.ceil((d.getMonth()+1)/3));
          } break;
          case "date_diff_days": {
            const d1=new Date(v), d2=new Date(v2);
            if(isNaN(d1)||isNaN(d2)) { result=v; break; }
            result = String(Math.round((d2-d1)/(1000*60*60*24)));
          } break;

          // ── CONDITIONEEL ─────────────────────────────────────────
          case "if_empty":        result = v.trim()==="" ? (p.then??"") : v; break;
          case "if_not_empty":    result = v.trim()!==""  ? (p.then??v) : (p.else??""); break;
          case "if_equals":       result = v === (p.compare??"") ? (p.then??v) : (p.else??v); break;
          case "if_contains":     result = v.includes(p.find??"") ? (p.then??v) : (p.else??v); break;
          case "if_starts":       result = v.startsWith(p.find??"") ? (p.then??v) : (p.else??v); break;
          case "if_gt":           { const n=parseFloat(v); result = (!isNaN(n)&&n>parseFloat(p.value||0)) ? (p.then??v) : (p.else??v); } break;
          case "if_lt":           { const n=parseFloat(v); result = (!isNaN(n)&&n<parseFloat(p.value||0)) ? (p.then??v) : (p.else??v); } break;
          case "coalesce":        result = v.trim()!=="" ? v : v2; break;
          case "map_values": {
            try {
              const map = JSON.parse(p.map ?? "{}");
              result = map.hasOwnProperty(v) ? map[v] : (p.fallback ?? v);
            } catch { result = v; }
          } break;

          // ── OPMAAK / CODERING ─────────────────────────────────────
          case "encode_base64":   result = btoa(unescape(encodeURIComponent(v))); break;
          case "decode_base64":   { try { result = decodeURIComponent(escape(atob(v))); } catch { result = v; } } break;
          case "encode_uri":      result = encodeURIComponent(v); break;
          case "decode_uri":      result = decodeURIComponent(v); break;
          case "nl_bsn_format":   result = v.replace(/\D/g,"").replace(/^(\d{3})(\d{3})(\d{3})$/,"$1.$2.$3"); break;
          case "nl_postcode":     result = v.replace(/\s/g,"").toUpperCase().replace(/^(\d{4})([A-Z]{2})$/,"$1 $2"); break;
          case "nl_iban":         result = v.replace(/\s/g,"").replace(/(.{4})/g,"$1 ").trim().toUpperCase(); break;
          case "nl_phone":        result = v.replace(/\D/g,"").replace(/^(0\d{1})(\d{8})$/,"$1-$2").replace(/^(0\d{2})(\d{7})$/,"$1-$2"); break;
          case "json_extract": {
            try { const obj=JSON.parse(v); const path=(p.path??"").split("."); let cur=obj; for(const k of path) cur=cur?.[k]; result=cur!=null?String(cur):v; } catch { result=v; }
          } break;
          case "hash_simple":     result = String([...v].reduce((h,c)=>(Math.imul(31,h)+c.charCodeAt(0))|0,0)>>>0); break;

          default: result = v;
        }
      } catch(e) { result = v; }

      if (result !== v) changed++;
      return { ...r, [field]: result };
    }));

    addAudit(`Transformatie "${type}" op "${field}" — ${ids.size} records`);
    showToast(`Transformatie toegepast op ${ids.size} records`, "green");
  };

  const saveToProfit = async (retryIds = null) => {
    if (!connector.updateConn) {
      showToast("Geen UpdateConnector geconfigureerd voor deze connector.", "red");
      return;
    }
    setShowDiff(false);
    setSaving(true);

    // Save: retryIds > selected+changed > all changed
    const changedIds = new Set(rows.filter(r => {
      if (r._isNew) return true;
      const o = originals.find(x => x._id === r._id);
      return o && fields.some(f => String(r[f]??"") !== String(o[f]??""));
    }).map(r => r._id));
    const selChangedIds = selected.size > 0
      ? new Set([...selected].filter(id => changedIds.has(id)))
      : new Set();
    const toSave = rows.filter(r => {
      if (retryIds) return retryIds.has(r._id);
      if (selChangedIds.size > 0) return selChangedIds.has(r._id);
      return changedIds.has(r._id);
    });

    if (toSave.length === 0) {
      setSaving(false);
      showToast("Geen gewijzigde records om op te slaan", "amber");
      return;
    }

    const results = { ok: [], failed: [] };
    const snapshot = deepClone(originals);

    try {
      for (const row of toSave) {
        const method  = row._isNew ? "POST" : "PUT";

        // For PUT: send all explicitly mapped GET fields so AFAS can find the record
        // (e.g. BcCo for MatchOga lookup must always be present, even if unchanged)
        const rowForPayload = row;
        const payload = buildUpdatePayload(connector.updateConn, rowForPayload, connector.fieldMap || null);

        let url_suffix = "";
        if (!row._isNew) {
          const { paramName, paramValue } = getKeyForUrl(row, connector);
          if (paramName) url_suffix = "?" + encodeURIComponent(paramName) + "=" + encodeURIComponent(paramValue);
        }

        let attempts = 0;
        let lastErr  = null;
        while (attempts < 2) {
          attempts++;
          try {
            await afasUpdate(
              config.env, config.token,
              connector.updateConn + url_suffix,
              method, payload,
              config.envType || "production"
            );
            results.ok.push(row._id);
            lastErr = null;
            break;
          } catch(e) {
            if (e.name === "TokenExpiredError") {
              if (onTokenExpired) onTokenExpired();
              setSaving(false);
              showToast("Token verlopen — opslaan gestopt. Ververs het token in instellingen.", "red");
              return; // stop de hele saveToProfit
            }
            lastErr = e.message;
            if (attempts < 2) await new Promise(r => setTimeout(r, 600));
          }
        }
        if (lastErr) results.failed.push({ id: row._id, err: lastErr });
      }
    } finally {
      setSaving(false);
    }

    if (results.failed.length === 0 && results.ok.length === 0) {
      showToast("Geen records verwerkt", "amber");
      return;
    }

    // Commit successfully saved rows in local state
    if (results.ok.length > 0) {
      const okSet = new Set(results.ok);
      setOriginals(prev => prev.map(o => {
        if (!okSet.has(o._id)) return o;
        const updated = rows.find(r => r._id === o._id);
        if (!updated) return o;
        const c = {...updated}; delete c._isNew; return c;
      }));
      setRows(p => p.map(r => {
        if (!okSet.has(r._id)) return r;
        const c = {...r}; delete c._isNew; return c;
      }));
    }

    // Build rich log details: per row list changed fields and required fields
    const reqFields = connector.requiredFields || [];
    const logDetails = toSave.map(row => {
      const orig = originals.find(x => x._id === row._id) || {};
      const changed = fields.filter(f => String(row[f]??"") !== String(orig[f]??"")).map(f => ({
        field: f,
        updateField: connector.fieldMap?.[f]?.updateField || f,
        from: String(orig[f] ?? ""),
        to:   String(row[f] ?? ""),
      }));
      const payload = buildUpdatePayload(connector.updateConn, row, connector.fieldMap || null);
      const pFields = ((payload[connector.updateConn]||{}).Element||{}).Fields||{};
      const required = reqFields.map(rf => ({ field: rf, value: String(pFields[rf] ?? "") }));
      const ok = results.ok.includes(row._id);
      const err = (results.failed.find(f => f.id === row._id)||{}).err || null;
      return { rowId: row._id, label: String(row[fields[0]]??row._id), ok, err, changed, required };
    });
    addAudit(
      `${results.ok.length} opgeslagen / ${results.failed.length} mislukt → ${connector.updateConn}`,
      { rows: logDetails }
    );
    // Always show result modal — user decides when to reload
    setShowSaveResult({ results, snapshot, toSave });
  };

  const take = connector.take||100;
  const hasPrev = skip>0;
  const hasNext = total!=null?(skip+take)<total:rows.length>=take;
  const activeRowData = activeRow ? rows.find(r=>r._id===activeRow._id) : null;
  const activeRowOrig = activeRow ? (originals.find(r=>r._id===activeRow._id)||null) : null;

  return (
    <>
      {/* Connector bar */}
      <div className="conn-bar">
        <div className="conn-lbl">Connector:</div>
        <div className="conn-tag">{connector.icon} {connector.label||connector.name} <code>{connector.name}</code></div>
        {connector.filter?.fields && <div className="param-chip">{connector.filter.fields} = {connector.filter.values}</div>}
        {connector.updateConn && (
          <div style={{ display:"flex", alignItems:"center", gap:".35rem" }}>
            <span style={{ fontSize:".6rem", color:"var(--t3)" }}>→</span>
            <div style={{ display:"flex", alignItems:"center", gap:".3rem",
              background: connector.connType==="file" ? "rgba(34,197,94,.08)" : "rgba(245,158,11,.08)",
              border: connector.connType==="file" ? "1px solid rgba(34,197,94,.2)" : "1px solid rgba(245,158,11,.2)",
              borderRadius:4, padding:".18rem .55rem", fontSize:".7rem",
              color: connector.connType==="file" ? "var(--green)" : "var(--amber)" }}>
              {connector.connType==="file" ? "📂" : "✏️"} {connector.updateConn}
              {connector.fieldMap
                ? <span style={{ fontFamily:"var(--mono)", fontSize:".6rem", color:"var(--t3)", marginLeft:".2rem" }}>
                    ({Object.values(connector.fieldMap).filter(m=>m.include!==false).length} velden)
                  </span>
                : <span style={{ fontSize:".6rem", color:"var(--red)", marginLeft:".3rem", fontWeight:600 }}>
                    ⚠ geen koppeling
                  </span>
              }
            </div>
            <button className={`btn ${!connector.fieldMap ? "btn-primary" : "btn-ghost"}`}
              style={{ fontSize:".65rem", padding:".18rem .5rem",
                ...((!connector.fieldMap) ? { animation:"pulse 1.5s infinite" } : {}) }}
              onClick={()=>setShowFieldMap(true)} disabled={fields.length===0}
              title={!connector.fieldMap ? "Stel eerst de veldkoppeling in voor je opslaat" : "Veldkoppeling bewerken"}>
              ⇄ {!connector.fieldMap ? "Veldkoppeling instellen!" : "Veldkoppeling"}
            </button>
            {connector.fieldMap && (
              <button className="btn btn-ghost" style={{ fontSize:".65rem", padding:".18rem .4rem", color:"var(--red)", borderColor:"rgba(239,68,68,.3)" }}
                title="Veldkoppeling wissen en opnieuw instellen"
                onClick={()=>{ if(window.confirm("Veldkoppeling wissen? Je moet daarna opnieuw koppelen via ⇄ Veldkoppeling instellen.")) { onUpdateConnector({ fieldMap: null, requiredFields: [] }); showToast("Veldkoppeling gewist","amber"); }}}>
                ✕ Reset
              </button>
            )}
          </div>
        )}
        <div className="ml" style={{ display:"flex", alignItems:"center", gap:".45rem" }}>
          <span className="rec-cnt">{loading?"laden…":`${visible.length}${total?` / ${total}`:""} records`}</span>
          {hasPrev && <button className="btn btn-ghost" style={{ fontSize:".7rem" }} onClick={()=>doFetch(skip-take)}>← Vorige</button>}
          {hasNext && <button className="btn btn-ghost" style={{ fontSize:".7rem" }} onClick={()=>doFetch(skip+take)}>Volgende →</button>}
          {saving && <span style={{fontSize:".7rem",color:"var(--amber)",display:"flex",alignItems:"center",gap:".3rem"}}><Spin/> opslaan…</span>}
          <button className="btn btn-primary" onClick={()=>doFetch(skip)} disabled={loading||saving}>
            {loading ? <><Spin /> Laden…</> : connector.connType==="file" ? "↓ Bestand herladen" : "↓ Ophalen uit Profit"}
          </button>
        </div>
      </div>

      {/* Toolbar */}
      <div className="toolbar">
        <div className="search-w">
          <span style={{ color:"var(--t3)", fontSize:"1rem" }}>⌕</span>
          <input placeholder="Zoeken…" value={search} onChange={e=>setSearch(e.target.value)} />
          {search && <span onClick={()=>setSearch("")} style={{ cursor:"pointer", color:"var(--t3)" }}>✕</span>}
        </div>
        <button className="btn btn-ghost" onClick={()=>setShowTx(true)} disabled={fields.length===0}>⚡ Transformatie</button>
        {selected.size>0 && <button className="btn btn-danger" onClick={deleteSelected}>🗑 ({selected.size})</button>}
        {changedCount>0 && <span className="chg-badge">{changedCount} wijziging{changedCount!==1?"en":""}</span>}
        <div className="ml" style={{ display:"flex", gap:".35rem" }}>
          {changedCount>0 && <button className="btn btn-ghost" onClick={revertAll}>↩ Alles revert</button>}
          {(() => {
            const selChanged = rows.filter(r => selected.has(r._id) && (r._isNew || fields.some(f => String(r[f]??"") !== String((originals.find(x=>x._id===r._id)||{})[f]??""))));
            const allChanged = rows.filter(r => r._isNew || fields.some(f => String(r[f]??"") !== String((originals.find(x=>x._id===r._id)||{})[f]??"")));
            const hasChanges  = allChanged.length > 0;
            const noFieldMap  = connector.updateConn && !connector.fieldMap;
            const label = selChanged.length > 0
              ? "↑ Opslaan (" + selChanged.length + " geselecteerd)"
              : "↑ Opslaan naar Profit";
            return (
              <button
                className={`btn ${connector.updateConn && hasChanges && !noFieldMap ? "btn-success" : "btn-ghost"}`}
                disabled={!hasChanges || noFieldMap}
                onClick={()=>setShowDiff(true)}
                title={
                  !connector.updateConn ? "Geen UpdateConnector geconfigureerd"
                  : noFieldMap ? "Stel eerst de veldkoppeling in (⇄ Veldkoppeling instellen!)"
                  : !hasChanges ? "Geen wijzigingen"
                  : selChanged.length > 0 ? selChanged.length + " geselecteerde gewijzigde records opslaan"
                  : allChanged.length + " gewijzigde records opslaan"
                }
              >
                {noFieldMap ? "⚠ Veldkoppeling vereist" : connector.updateConn ? label : "↑ Opslaan naar Profit ⚠"}
              </button>
            );
          })()}
        </div>
      </div>

      {/* Tab bar */}
      <div style={{ display:"flex", alignItems:"center", gap:0, borderBottom:"1px solid var(--b1)",
        background:"var(--s1)", padding:"0 1rem" }}>
        {[["data","📋 Data"],["logboek","🕘 Logboek"],["runs","▶ Runs"]].map(([id,label])=>(
          <button key={id} onClick={()=>setEditorTab(id)} style={{
            padding:".45rem .9rem", border:"none", cursor:"pointer", fontSize:".72rem",
            fontFamily:"var(--mono)", background:"transparent", transition:"all .15s",
            borderBottom: editorTab===id ? "2px solid var(--accent)" : "2px solid transparent",
            color: editorTab===id ? "var(--t1)" : "var(--t3)",
            fontWeight: editorTab===id ? 600 : 400,
          }}>{label}{id==="logboek" && auditLog.length>0 &&
            <span style={{ marginLeft:".35rem", fontSize:".6rem", background:"var(--accent)",
              color:"#fff", borderRadius:8, padding:".05rem .38rem" }}>{auditLog.length}</span>
          }{id==="runs" && runHistory.length>0 &&
            <span style={{ marginLeft:".35rem", fontSize:".6rem",
              background: runHistory.some(r=>r.totalFailed>0) ? "var(--neon-red)" : "var(--neon-green)",
              color:"#000", borderRadius:8, padding:".05rem .38rem", fontWeight:700 }}>{runHistory.length}</span>
          }</button>
        ))}
      </div>

      {/* Bulk banner */}
      {editorTab==="data" && selected.size>1 && (
        <div className="bulk-banner">
          <span className="bulk-cnt">{selected.size}</span> geselecteerd
          <div style={{ display:"flex", gap:".3rem", marginLeft:"auto" }}>
            <button className="btn btn-ghost" style={{ fontSize:".7rem" }} onClick={()=>setShowTx(true)}>⚡ Bulk-transformatie</button>
            <button className="btn btn-danger" style={{ fontSize:".7rem" }} onClick={deleteSelected}>🗑 Verwijder</button>
            <button className="btn btn-ghost" style={{ fontSize:".7rem" }} onClick={()=>setSelected(new Set())}>✕</button>
          </div>
        </div>
      )}

      {/* Runs tab */}
      {editorTab==="runs" && (
        <RunsTab runHistory={runHistory} onEnableConnector={onEnableConnector} />
      )}

      {/* Logboek tab */}
      {editorTab==="logboek" && (
        <div style={{ flex:1, overflowY:"auto", padding:"1rem 1.25rem" }}>
          {auditLog.length === 0 ? (
            <div style={{ textAlign:"center", padding:"3rem 1rem", color:"var(--t3)", fontSize:".8rem" }}>
              Nog geen acties geregistreerd. Sla wijzigingen op om ze hier te zien.
            </div>
          ) : auditLog.map((entry, i) => (
            <div key={i} style={{ marginBottom:"1rem", background:"var(--s2)",
              border:"1px solid var(--b1)", borderRadius:7, overflow:"hidden" }}>
              {/* Header */}
              <div style={{ display:"flex", alignItems:"center", gap:".6rem",
                padding:".45rem .75rem", borderBottom:"1px solid var(--b1)",
                background:"var(--s1)" }}>
                <span style={{ fontFamily:"var(--mono)", fontSize:".62rem", color:"var(--t3)" }}>
                  {entry.datum} {entry.t}
                </span>
                <span style={{ fontSize:".72rem", color:"var(--t1)", fontWeight:600 }}>{entry.msg}</span>
              </div>
              {/* Details per row */}
              {entry.details && entry.details.rows && entry.details.rows.map((r, ri) => (
                <div key={ri} style={{ padding:".55rem .75rem",
                  borderBottom: ri < entry.details.rows.length-1 ? "1px solid var(--b1)" : "none" }}>
                  {/* Row label + status */}
                  <div style={{ display:"flex", alignItems:"center", gap:".5rem", marginBottom:".4rem" }}>
                    <span style={{ fontFamily:"var(--mono)", fontSize:".65rem",
                      color: r.ok ? "var(--green)" : "var(--red)",
                      background: r.ok ? "rgba(34,197,94,.1)" : "rgba(239,68,68,.1)",
                      border: `1px solid ${r.ok ? "rgba(34,197,94,.25)" : "rgba(239,68,68,.25)"}`,
                      borderRadius:4, padding:".05rem .35rem" }}>
                      {r.ok ? "✓ opgeslagen" : "✕ mislukt"}
                    </span>
                    <span style={{ fontSize:".72rem", color:"var(--t1)", fontWeight:600 }}>{r.label}</span>
                    <span style={{ fontFamily:"var(--mono)", fontSize:".6rem", color:"var(--t3)" }}>{r.rowId}</span>
                  </div>
                  {/* Error */}
                  {r.err && (
                    <div style={{ fontSize:".65rem", color:"var(--red)", fontFamily:"var(--mono)",
                      background:"rgba(239,68,68,.07)", border:"1px solid rgba(239,68,68,.2)",
                      borderRadius:4, padding:".3rem .5rem", marginBottom:".4rem" }}>{r.err}</div>
                  )}
                  {/* Required fields */}
                  {r.required && r.required.length > 0 && (
                    <div style={{ marginBottom:".35rem" }}>
                      <div style={{ fontSize:".6rem", color:"var(--t3)", fontFamily:"var(--mono)",
                        textTransform:"uppercase", letterSpacing:".04em", marginBottom:".22rem" }}>
                        Verplichte velden
                      </div>
                      <div style={{ display:"flex", flexWrap:"wrap", gap:".3rem" }}>
                        {r.required.map((req,qi)=>(
                          <div key={qi} style={{ fontSize:".65rem", fontFamily:"var(--mono)",
                            background:"rgba(99,102,241,.08)", border:"1px solid rgba(99,102,241,.2)",
                            borderRadius:4, padding:".18rem .45rem", color:"var(--accent)" }}>
                            <span style={{ color:"var(--t3)" }}>{req.field}: </span>
                            <strong>{req.value || "—"}</strong>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                  {/* Changed fields */}
                  {r.changed && r.changed.length > 0 && (
                    <div>
                      <div style={{ fontSize:".6rem", color:"var(--t3)", fontFamily:"var(--mono)",
                        textTransform:"uppercase", letterSpacing:".04em", marginBottom:".22rem" }}>
                        Gewijzigde velden
                      </div>
                      <div style={{ display:"flex", flexDirection:"column", gap:".22rem" }}>
                        {r.changed.map((ch,ci)=>(
                          <div key={ci} style={{ display:"flex", alignItems:"center", gap:".45rem",
                            fontSize:".65rem", fontFamily:"var(--mono)" }}>
                            <span style={{ color:"var(--t2)", fontWeight:600, minWidth:120, flexShrink:0 }}>
                              {ch.updateField !== ch.field
                                ? <>{ch.field} <span style={{color:"var(--t3)"}}>→</span> {ch.updateField}</>
                                : ch.field}
                            </span>
                            <span style={{ color:"var(--t3)" }}>{ch.from || "—"}</span>
                            <span style={{ color:"var(--t3)" }}>→</span>
                            <span style={{ color:"var(--green)", fontWeight:600 }}>{ch.to || "—"}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                  {r.changed && r.changed.length === 0 && !r.err && (
                    <div style={{ fontSize:".62rem", color:"var(--t3)" }}>Geen veldwijzigingen (nieuw record of vaste waarden)</div>
                  )}
                </div>
              ))}
              {/* Simple log entries without row details */}
              {!entry.details && (
                <div style={{ padding:".4rem .75rem", fontSize:".67rem", color:"var(--t3)" }}>{entry.msg}</div>
              )}
            </div>
          ))}
        </div>
      )}

      {/* Table + panel */}
      {editorTab==="data" && <div className="table-area">
        <div className="tbl-scroll">
          {/* Error */}
          {fetchErr && !loading && (
            <div className="empty-state">
              <div className="es-icon">⚠️</div>
              <div className="es-title">Ophalen mislukt</div>
              <div className="es-sub" style={{ color:"var(--red)" }}>{fetchErr}</div>
              <button className="btn btn-ghost" style={{ marginTop:".5rem" }} onClick={()=>doFetch(skip)}>↻ Opnieuw</button>
            </div>
          )}

          {/* Not loaded yet */}
          {!fetchErr && rows.length===0 && !loading && (
            <div className="empty-state">
              <div className="es-icon">📭</div>
              <div className="es-title">Geen data geladen</div>
              <div className="es-sub">Klik op "↓ Ophalen uit Profit" om data te laden via <strong style={{ color:"var(--t1)" }}>{connector.name}</strong>.</div>
              <button className="btn btn-primary" style={{ marginTop:".5rem" }} onClick={()=>doFetch(0)}>↓ Ophalen uit Profit</button>
            </div>
          )}

          {/* Table */}
          {(rows.length>0||loading) && !fetchErr && (
            <table style={{ tableLayout:"fixed", width: Object.keys(colWidths).length ? 32 + fields.reduce((s,f) => s+(colWidths[f]||160), 0) + 52 : "100%" }}>
              <colgroup>
                <col style={{ width:32 }} />
                {fields.map(f => <col key={f} style={colWidths[f] ? { width: colWidths[f] } : {}} />)}
                <col style={{ width:52 }} />
              </colgroup>
              <thead ref={theadRef}>
                <tr>
                  <th className="th-chk">
                    <input type="checkbox" checked={selected.size===visible.length&&visible.length>0}
                      onChange={e=>setSelected(e.target.checked?new Set(visible.map(r=>r._id)):new Set())} />
                  </th>
                  {fields.map(f=>(
                    <th key={f}
                      data-field={f}
                      className={sortField===f?"sorted":""}
                      style={{ position:"relative", userSelect:"none" }}
                      onClick={()=>{if(sortField===f)setSortDir(d=>d==="asc"?"desc":"asc");else{setSortField(f);setSortDir("asc");}}}>
                      {f}{sortField===f?(sortDir==="asc"?" ↑":" ↓"):""}
                      <span
                        onMouseDown={e=>startResize(e,f)}
                        onClick={e=>e.stopPropagation()}
                        style={{
                          position:"absolute", right:0, top:0, bottom:0, width:6,
                          cursor:"col-resize", zIndex:5,
                          background:"transparent", transition:"background .12s",
                        }}
                        onMouseEnter={e=>e.currentTarget.style.background="rgba(200,168,75,.6)"}
                        onMouseLeave={e=>e.currentTarget.style.background="transparent"}
                      />
                    </th>
                  ))}
                  <th style={{ width:52 }} />
                </tr>
              </thead>
              <tbody>
                {loading
                  ? Array.from({length:6}).map((_,i)=>(
                    <tr key={i}>
                      <td><div className="td-chk"/></td>
                      {(fields.length>0?fields:Array.from({length:5})).map((_,j)=><td key={j}><div className="tdi shimmer"><span className="cval">——————</span></div></td>)}
                      <td/>
                    </tr>
                  ))
                  : visible.length===0
                  ? <tr><td colSpan={fields.length+2} style={{ textAlign:"center", padding:"2.5rem 0", color:"var(--t3)", fontStyle:"italic" }}>Geen records gevonden</td></tr>
                  : visible.map(row=>{
                      const orig=originals.find(r=>r._id===row._id)||row;
                      const isMod=!row._isNew&&fields.some(f=>String(row[f]??"")!==String(orig[f]??""));
                      const isSel=selected.has(row._id);
                      const isAct=activeRowData?._id===row._id;
                      const cls=[isSel||isAct?"r-sel":"",isMod?"r-mod":"",row._isNew?"r-new":""].filter(Boolean).join(" ");
                      return (
                        <tr key={row._id} className={cls} onClick={()=>setActiveRow(isAct?null:row)}>
                          <td><div className="td-chk"><input type="checkbox" checked={isSel} onChange={e=>toggleSel(row._id,e)} onClick={e=>e.stopPropagation()}/></div></td>
                          {fields.map(f=><td key={f}><Cell value={row[f]} original={orig[f]} rowId={row._id} field={f} onEdit={editCell}/></td>)}
                          <td><div className="tdi"><div className="row-acts">
                            <div className="ra" title="Bewerken" onClick={e=>{e.stopPropagation();setActiveRow(row);}}>✏</div>
                            {(isMod||row._isNew)&&connector.updateConn&&<div className="ra" title="Opslaan naar Profit" onClick={e=>saveSingleRow(row,e)} style={{color:"var(--green)"}}>↑</div>}
                            {isMod&&<div className="ra" title="Wijziging terugdraaien" onClick={e=>{e.stopPropagation();revertRow(row._id);}}>↩</div>}
                          </div></div></td>
                        </tr>
                      );
                    })
                }
              </tbody>
            </table>
          )}
        </div>

        <SidePanel row={activeRowData} original={activeRowOrig} fields={fields}
          onField={editCell} onRevert={()=>revertRow(activeRowData?._id)} onClose={()=>setActiveRow(null)}
          fieldMap={connector.fieldMap||null} />
      </div>}

      {showTx        && <TransformModal fields={fields} count={selected.size>0?selected.size:visible.length} rows={visible} onApply={applyTransform} onClose={()=>setShowTx(false)}/>}
      {showDiff      && <DiffModal rows={rows} originals={originals} fields={fields} connector={connector} selectedIds={selected} onConfirm={saveToProfit} onClose={()=>setShowDiff(false)}/>}
      {showSaveResult && <SaveResultModal result={showSaveResult} rows={rows} fields={fields} onRetry={ids=>{ setShowSaveResult(null); saveToProfit(ids); }} onReload={()=>{ setShowSaveResult(null); doFetch(skip); }} onClose={()=>setShowSaveResult(null)} />}
      {showFieldMap  && <FieldMappingModal connector={connector} getFields={fields} config={config} sampleRow={rows[0]||null} onSave={(fm, req)=>{ onUpdateConnector({ fieldMap: fm, requiredFields: req }); setShowFieldMap(false); showToast("Veldkoppeling opgeslagen","green"); }} onClose={()=>setShowFieldMap(false)} />}
      {toast         && <Toast key={toast.key} msg={toast.msg} type={toast.type} onDone={()=>setToast(null)}/>}
    </>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  componentDidCatch(error, info) { console.error("React error:", error, info); }
  render() {
    if (this.state.error) {
      return React.createElement('div', { style: { color:'#ff9500', fontFamily:'monospace', padding:'2rem', background:'#0a0e1a', minHeight:'100vh' } },
        React.createElement('div', { style: { color:'#ff2a4a', fontSize:'1.2rem', marginBottom:'1rem' } }, '⚠ React Render Error'),
        React.createElement('pre', { style: { color:'#fff', fontSize:'.8rem', whiteSpace:'pre-wrap' } }, String(this.state.error)),
        React.createElement('pre', { style: { color:'#00e5ff', fontSize:'.7rem', marginTop:'1rem' } }, this.state.error?.stack||'')
      );
    }
    return this.props.children;
  }
}
