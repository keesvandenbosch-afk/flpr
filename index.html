    } else if (tab === "file") {
      if (!fParsed || !fLabel.trim()) return;
      const linkedLocal = updateConns.find(c => c.id === fLinked || c.name === fLinked);
      const linkedName  = linkedLocal?.name || fLinked || null;
      const keyF = fKeyField.trim() || (fParsed.fields[0] ?? null);
      // Re-key rows by keyField
      const rows = fParsed.rows.map((r,i) => ({ ...r, _id: String(r[keyF] ?? `ROW-${i}`) }));
      const data = {
        connType:   "file",
        name:       fLabel.trim(),
        label:      fLabel.trim(),
        icon:       "📂",
        take:       rows.length,
        filter:     null,
        updateConn: linkedName,
        keyField:   keyF,
        fileData:   { fields: fParsed.fields, rows, rawText: fRawText, delimiter: fParsed.detectedDelim || fDelimiter },
        fileName:   fFile?.name || "bestand",
      };
      if (isEdit) onUpdate(editConnector.id, data);
      else        onAdd({ id: uid(), ...data });
    } else {
      if (!uName.trim()) return;
      const data = {
        connType:   "update",
        name:       uName.trim(),
        label:      uLabel.trim() || uName.trim(),
        icon:       "✏️",
        take:       0,
        filter:     null,
        updateConn: uName.trim(),
        keyField:   uKey.trim() || null,
      };
      if (isEdit) onUpdate(editConnector.id, data);
      else        onAdd({ id: uid(), ...data });
    }
    onClose();
  };

  const previewFields = previewRows?.length > 0 ? Object.keys(previewRows[0]).slice(0, 8) : [];
  const canSave = tab==="get" ? !!gName.trim() : tab==="file" ? (!!fParsed && !!fLabel.trim()) : !!uName.trim();

  const tabStyle = (t) => {
    const colors = { get:["rgba(59,130,246,.15)","var(--accent)","rgba(59,130,246,.35)"], update:["rgba(245,158,11,.12)","var(--amber)","rgba(245,158,11,.3)"], file:["rgba(34,197,94,.12)","var(--green)","rgba(34,197,94,.3)"] };
    const [bg, fg, br] = colors[t] || colors.get;
    return { padding:".3rem .85rem", borderRadius:4, cursor:"pointer", fontSize:".78rem",
      fontWeight: tab===t ? 600 : 400,
      background: tab===t ? bg : "transparent",
      color: tab===t ? fg : "var(--t3)",
      border: `1px solid ${tab===t ? br : "transparent"}`,
      transition:"all .12s", userSelect:"none" };
  };

  return (
    <div className="overlay" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="modal wide">
        <div className="mh">
          <div>
            <div className="mtitle">{isEdit ? "Connector bewerken" : "Connector toevoegen"}</div>
            {isEdit && (
              <div style={{ fontSize:".7rem", color:"var(--t3)", marginTop:".1rem", fontFamily:"var(--mono)" }}>
                {editConnector.name}
              </div>
            )}
          </div>
          <div className="mclose" onClick={onClose}>✕</div>
        </div>

        {/* Tab switch — only shown when adding (not editing, type is fixed) */}
        {!isEdit && (
          <div style={{ display:"flex", gap:".4rem", padding:".6rem 1.15rem", borderBottom:"1px solid var(--b1)", background:"var(--s2)" }}>
            <div style={tabStyle("get")} onClick={()=>setTab("get")}>📋 GetConnector</div>
            <div style={tabStyle("update")} onClick={()=>setTab("update")}>✏️ UpdateConnector</div>
            <div style={tabStyle("file")} onClick={()=>setTab("file")}>📂 Bestand</div>
            <div style={{ marginLeft:"auto", fontSize:".7rem", color:"var(--t3)", display:"flex", alignItems:"center" }}>
              {tab==="get" ? "Leest data uit AFAS Profit" : tab==="file" ? "Importeert data uit CSV of Excel" : "Schrijft data terug naar AFAS Profit"}
            </div>
          </div>
        )}
        {isEdit && (
          <div style={{ padding:".45rem 1.15rem", borderBottom:"1px solid var(--b1)", background:"var(--s2)", display:"flex", alignItems:"center", gap:".5rem" }}>
            <span style={{ fontSize:".72rem", fontFamily:"var(--mono)",
              color: tab==="get" ? "var(--accent)" : "var(--amber)",
              background: tab==="get" ? "rgba(59,130,246,.12)" : "rgba(245,158,11,.12)",
              border: `1px solid ${tab==="get" ? "rgba(59,130,246,.3)" : "rgba(245,158,11,.3)"}`,
              padding:".1rem .45rem", borderRadius:3 }}>
              {tab==="get" ? "📋 GetConnector" : "✏️ UpdateConnector"}
            </span>
            <span style={{ fontSize:".72rem", color:"var(--t3)" }}>
              {tab==="get" ? "Leest data uit AFAS Profit" : "Schrijft data terug naar AFAS Profit"}
            </span>
          </div>
        )}

        <div className="mb">
          {/* ── GET TAB ── */}
          {tab === "get" && <>
            <div style={{ display:"grid", gridTemplateColumns:"62px 1fr 1fr", gap:".7rem", alignItems:"end" }}>
              <div className="fgrp"><div className="flbl">Icoon</div>
                <select className="finp" value={gIcon} onChange={e=>setGIcon(e.target.value)} style={{ textAlign:"center" }}>
                  {ICONS.map(i=><option key={i} value={i}>{i}</option>)}
                </select>
              </div>
              <div className="fgrp">
                <div className="flbl">Connectornaam (AFAS) <span>*</span></div>
                {liveGet.length > 0 ? (
                  <select className="finp" value={gName} onChange={e=>{ setGName(e.target.value); if(!gLabel.trim()) setGLabel(e.target.value); }}>
                    <option value="">— kies een GetConnector —</option>
                    {liveGet.map(c => <option key={c.id} value={c.id}>{c.id}{c.description ? ` — ${c.description}` : ""}</option>)}
                  </select>
                ) : (
                  <div style={{ position:"relative" }}>
                    <input className="finp" value={gName} onChange={e=>setGName(e.target.value)}
                      placeholder={liveFetching ? "Connectoren ophalen…" : liveErr ? "Typ connectornaam" : "bv. Medewerkers"} autoFocus={!isEdit} />
                    {liveFetching && <span style={{ position:"absolute", right:8, top:"50%", transform:"translateY(-50%)", fontSize:".7rem", color:"var(--t3)" }}>⟳</span>}
                  </div>
                )}
                {liveErr && <div className="help-text" style={{ color:"var(--amber)" }}>⚠ Kon connectoren niet ophalen: {liveErr}</div>}
              </div>
              <div className="fgrp"><div className="flbl">Weergavenaam</div>
                <input className="finp" value={gLabel} onChange={e=>setGLabel(e.target.value)} placeholder="Optioneel label" />
              </div>
            </div>

            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr 80px", gap:".7rem", alignItems:"end" }}>
              <div className="fgrp"><div className="flbl">Max. records</div>
                <input className="finp" type="number" min="1" max="10000" value={gTake} onChange={e=>setGTake(e.target.value)} />
              </div>
              <div className="fgrp"><div className="flbl">Filter veld</div>
                <input className="finp" value={gFf} onChange={e=>setGFf(e.target.value)} placeholder="bv. Afdeling" />
              </div>
              <div className="fgrp"><div className="flbl">Filter waarde</div>
                <input className="finp" value={gFv} onChange={e=>setGFv(e.target.value)} placeholder="bv. IT" />
              </div>
              <div className="fgrp"><div className="flbl">Operator</div>
                <select className="finp" value={gFo} onChange={e=>setGFo(e.target.value)}>
                  <option value="1">= (gelijk)</option>
                  <option value="2">≥</option>
                  <option value="3">≤</option>
                  <option value="6">bevat</option>
                </select>
              </div>
            </div>

            <div className="fgrp">
              <div className="flbl">Koppel UpdateConnector <span style={{ color:"var(--t3)", fontWeight:400 }}>(optioneel)</span></div>
              <select className="finp" value={gLinked} onChange={e=>setGLinked(e.target.value)}>
                <option value="">— geen koppeling —</option>
                {liveUpdate.length > 0
                  ? liveUpdate.map(c => {
                      const existing = connectors.find(lc => lc.connType==="update" && lc.name===c.id);
                      return <option key={c.id} value={c.id}>{c.id}{c.description ? ` — ${c.description}` : ""}{existing?.keyField ? ` (sleutel: ${existing.keyField})` : ""}</option>;
                    })
                  : updateConns.map(c => (
                      <option key={c.id} value={c.id}>{c.label||c.name}{c.keyField ? ` (sleutel: ${c.keyField})` : ""}</option>
                    ))
                }
              </select>
              {liveUpdate.length === 0 && updateConns.length === 0 && !liveFetching && (
                <div className="help-text" style={{ color:"var(--amber)" }}>Nog geen UpdateConnectoren beschikbaar.</div>
              )}
              {gLinked && <div className="help-text">Wijzigingen worden via <strong style={{ color:"var(--amber)" }}>{gLinked}</strong> teruggeschreven naar Profit.</div>}
            </div>

            <div className="notice n-blue" style={{ fontSize:".72rem" }}>
              Endpoint: <code style={{ fontFamily:"var(--mono)", fontSize:".67rem" }}>GET https://{config.env}.{envSub}.afas.online/profitrestservices/connectors/<strong>{gName||"[naam]"}</strong></code>
            </div>

            {testResult && <div className={`notice ${testResult.ok?"n-green":"n-red"}`}>{testResult.msg}</div>}

            {previewRows && previewRows.length > 0 && (
              <div>
                <div className="flbl" style={{ marginBottom:".4rem" }}>Preview — eerste {previewRows.length} record(s)</div>
                <div style={{ overflowX:"auto", border:"1px solid var(--b1)", borderRadius:5, maxHeight:150 }}>
                  <table className="prev-tbl">
                    <thead><tr>{previewFields.map(k=><th key={k}>{k}</th>)}</tr></thead>
                    <tbody>{previewRows.map((row,i)=>(
                      <tr key={i}>{previewFields.map((k,j)=><td key={j} title={String(row[k]??"")}>{String(row[k]??"")}</td>)}</tr>
                    ))}</tbody>
                  </table>
                </div>
              </div>
            )}
          </>}

          {/* ── UPDATE TAB ── */}
          {tab === "update" && <>
            {!isEdit && (
              <div className="notice n-amber" style={{ fontSize:".72rem", lineHeight:1.65 }}>
                Een <strong>UpdateConnector</strong> definieert hoe data teruggeschreven wordt naar AFAS Profit (PUT/POST).
              </div>
            )}
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:".7rem" }}>
              <div className="fgrp"><div className="flbl">UpdateConnector naam (AFAS) <span>*</span></div>
                {liveUpdate.length > 0 ? (
                  <select className="finp" value={uName} onChange={e=>{ setUName(e.target.value); if(!uLabel.trim()) setULabel(e.target.value); }}>
                    <option value="">— kies een UpdateConnector —</option>
                    {liveUpdate.map(c => <option key={c.id} value={c.id}>{c.id}{c.description ? ` — ${c.description}` : ""}</option>)}
                  </select>
                ) : (
                  <div style={{ position:"relative" }}>
                    <input className="finp" value={uName} onChange={e=>setUName(e.target.value)}
                      placeholder={liveFetching ? "Connectoren ophalen…" : liveErr ? "Typ connectornaam" : "bv. KnEmployee"} autoFocus={!isEdit} />
                    {liveFetching && <span style={{ position:"absolute", right:8, top:"50%", transform:"translateY(-50%)", fontSize:".7rem", color:"var(--t3)" }}>⟳</span>}
                  </div>
                )}
                {!liveErr && !liveFetching && liveUpdate.length === 0 && <div className="help-text">Exacte naam zoals gedefinieerd in AFAS Profit.</div>}
                {liveErr && <div className="help-text" style={{ color:"var(--amber)" }}>⚠ Kon connectoren niet ophalen: {liveErr}</div>}
              </div>
              <div className="fgrp"><div className="flbl">Weergavenaam</div>
                <input className="finp" value={uLabel} onChange={e=>setULabel(e.target.value)} placeholder="Optioneel label" />
              </div>
            </div>
            <div className="fgrp">
              <div className="flbl">Sleutelveld (primaire sleutel voor PUT)</div>
              {liveUpdate.length > 0 && uName ? (() => {
                // Try to find primary key from live schema
                const ucMeta = liveUpdate.find(c => c.id === uName || c.name === uName);
                return null; // schema loaded separately in FieldMappingModal
              })() : null}
              <input className="finp" value={uKey} onChange={e=>setUKey(e.target.value)}
                placeholder="bv. BcCo of EmId" />
              <div className="help-text">
                Het UC-veldnaam dat als primaire sleutel wordt meegestuurd in de PUT-URL. 
                Kijk in ⇄ Veldkoppeling bij het veld met de <strong>sleutel</strong>-badge voor de juiste naam.
              </div>
            </div>
            <div className="notice n-blue" style={{ fontSize:".72rem" }}>
              Endpoint: <code style={{ fontFamily:"var(--mono)", fontSize:".67rem" }}>PUT/POST https://{config.env}.{envSub}.afas.online/profitrestservices/connectors/<strong>{uName||"[naam]"}</strong></code>
            </div>
          </>}

          {/* ── FILE TAB ── */}
          {tab === "file" && <>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:".7rem" }}>
              <div className="fgrp">
                <div className="flbl">Naam / label <span>*</span></div>
                <input className="finp" value={fLabel} onChange={e=>setFLabel(e.target.value)} placeholder="bv. Medewerkers import" />
              </div>
              <div className="fgrp">
                <div className="flbl">Sleutelveld (voor koppeling)</div>
                <input className="finp" value={fKeyField} onChange={e=>setFKeyField(e.target.value)}
                  placeholder={fParsed ? `standaard: ${fParsed.fields[0]||"eerste kolom"}` : "bv. MedewerkerNr"} />
                <div className="help-text">Wordt gebruikt als unieke ID bij opslaan naar AFAS.</div>
              </div>
            </div>

            <div className="fgrp">
              <div className="flbl">Bestand uploaden <span>*</span></div>
              <div style={{ display:"flex", gap:".5rem", alignItems:"center" }}>
                <label style={{ flex:1, display:"flex", alignItems:"center", gap:".6rem", padding:".55rem .85rem",
                  border:"1px dashed var(--b2)", borderRadius:6, cursor:"pointer",
                  background:"var(--s2)", transition:"border-color .15s",
                  borderColor: fParsed ? "rgba(34,197,94,.5)" : fParseErr ? "rgba(239,68,68,.5)" : "var(--b2)" }}>
                  <span style={{ fontSize:"1.3rem" }}>📂</span>
                  <div>
                    <div style={{ fontSize:".75rem", color:"var(--t1)", fontWeight:600 }}>
                      {fFile ? fFile.name : "Klik om bestand te kiezen"}
                    </div>
                    <div style={{ fontSize:".65rem", color:"var(--t3)" }}>CSV, Excel (.xlsx / .xls)</div>
                  </div>
                  <input type="file" accept=".csv,.xlsx,.xls,.txt,.ods" onChange={handleFileChange}
                    style={{ display:"none" }} />
                </label>
                {fFile && (
                  <div style={{ fontSize:".65rem", color:"var(--t3)", fontFamily:"var(--mono)", whiteSpace:"nowrap" }}>
                    {(fFile.size/1024).toFixed(0)} KB
                  </div>
                )}
              </div>
            </div>

            {fFile && fFile.name.match(/\.csv$/i) && (
              <div className="fgrp">
                <div className="flbl">CSV scheidingsteken</div>
                <select className="finp" value={fDelimiter} onChange={e=>{ const v=e.target.value; setFDelimiter(v); if(fRawText) parseFile(fRawText, v); else if(fFile) parseFile(fFile, v); }}>
                  <option value=",">Komma (,)</option>
                  <option value=";">Puntkomma (;)</option>
                  <option value="	">Tab</option>
                  <option value="auto">Automatisch detecteren</option>
                </select>
              </div>
            )}

            {fParsing && <div className="notice n-blue">⟳ Bestand verwerken…</div>}
            {fParseErr && <div className="notice n-red">✕ {fParseErr}</div>}

            {fParsed && !fParseErr && (
              <>
                <div className="notice n-green" style={{ fontSize:".72rem" }}>
                  ✓ {fParsed.rows.length} records · {fParsed.fields.length} kolommen:{fParsed.detectedDelim && fDelimiter==="auto" && <span style={{marginLeft:".3rem",fontFamily:"var(--mono)",opacity:.7}}>scheidingsteken: "{fParsed.detectedDelim}"</span>} <span style={{ fontFamily:"var(--mono)" }}>{fParsed.fields.slice(0,6).join(", ")}{fParsed.fields.length>6 ? ` +${fParsed.fields.length-6} meer` : ""}</span>
                </div>
                <div>
                  <div className="flbl" style={{ marginBottom:".4rem" }}>Preview — eerste {Math.min(3,fParsed.rows.length)} record(s)</div>
                  <div style={{ overflowX:"auto", border:"1px solid var(--b1)", borderRadius:5, maxHeight:140 }}>
                    <table className="prev-tbl">
                      <thead><tr>{fParsed.fields.slice(0,8).map(k=><th key={k}>{k}</th>)}</tr></thead>
                      <tbody>{fParsed.rows.slice(0,3).map((row,i)=>(
                        <tr key={i}>{fParsed.fields.slice(0,8).map((k,j)=><td key={j} title={String(row[k]??"")}>{String(row[k]??"")}</td>)}</tr>
                      ))}</tbody>
                    </table>
                  </div>
                </div>
              </>
            )}

            <div className="fgrp">
              <div className="flbl">Koppel UpdateConnector <span style={{ color:"var(--t3)", fontWeight:400 }}>(optioneel)</span></div>
              <select className="finp" value={fLinked} onChange={e=>setFLinked(e.target.value)}>
                <option value="">— geen koppeling —</option>
                {liveUpdate.length > 0
                  ? liveUpdate.map(c => {
                      const ex = connectors.find(lc => lc.connType==="update" && lc.name===c.id);
                      return <option key={c.id} value={c.id}>{c.id}{c.description ? ` — ${c.description}` : ""}{ex?.keyField ? ` (sleutel: ${ex.keyField})` : ""}</option>;
                    })
                  : updateConns.map(c => (
                      <option key={c.id} value={c.id}>{c.label||c.name}{c.keyField ? ` (sleutel: ${c.keyField})` : ""}</option>
                    ))
                }
              </select>
              {fLinked && <div className="help-text">Wijzigingen worden via <strong style={{ color:"var(--amber)" }}>{fLinked}</strong> teruggeschreven naar Profit.</div>}
            </div>
          </>}

          <div className="notice n-amber" style={{ fontSize:".72rem" }}>
            <strong>Let op CORS:</strong> gebruik <code>npx serve .</code> of <code>python -m http.server</code> — browsers blokkeren API-calls vanuit lokale bestanden.
          </div>
        </div>

        <div className="mf">
          <button className="btn btn-ghost" onClick={onClose}>Annuleren</button>
          {tab === "get" && (
            <button className="btn btn-ghost" onClick={runTest} disabled={testing||!gName.trim()}>
              {testing ? <><Spin /> Testen…</> : "▶ Test connector"}
            </button>
          )}
          <button
            className={`btn ${tab==="get" || tab==="file" ? "btn-primary" : "btn-ghost"}`}
            style={tab==="update" ? { background:"rgba(245,158,11,.15)", borderColor:"rgba(245,158,11,.35)", color:"var(--amber)" } : tab==="file" ? { background:"rgba(34,197,94,.15)", borderColor:"rgba(34,197,94,.35)", color:"var(--green)" } : {}}
            onClick={handleSave} disabled={!canSave}>
            {isEdit ? "✓ Wijzigingen opslaan" : tab==="get" ? "+ GetConnector toevoegen" : tab==="file" ? `+ Bestand importeren${fParsed?` (${fParsed.rows.length} records)`:""}` : "+ UpdateConnector toevoegen"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── SETUP SCREEN ──────────────────────────────────────────────────────────────
function ConnectorPicker({ connList, sel, setSel }) {
  const [search, setSearch] = useState("");

  const norm = c => c.id || c.connectorId || (typeof c === "string" ? c : JSON.stringify(c));

  const filterFn = c => {
    if (!search.trim()) return true;
    const q = search.toLowerCase();
    return norm(c).toLowerCase().includes(q) || (c.description||"").toLowerCase().includes(q);
  };

  const filteredGet    = (connList.getConnectors    || []).filter(filterFn);
  const filteredUpdate = (connList.updateConnectors || []).filter(filterFn);
  const total = (connList.getConnectors||[]).length + (connList.updateConnectors||[]).length;

  const isSelected = (name, type) => sel.has(`${type}:${name}`);
  const toggle = (name, type) => setSel(s => { const n = new Set(s); n.has(`${type}:${name}`) ? n.delete(`${type}:${name}`) : n.add(`${type}:${name}`); return n; });

  const selectGroup = (list, type) => setSel(s => { const n = new Set(s); list.forEach(c => n.add(`${type}:${norm(c)}`)); return n; });
  const deselectAll = () => setSel(new Set());
  const selectAll   = () => {
    const n = new Set();
    (connList.getConnectors||[]).forEach(c => n.add(`get:${norm(c)}`));
    (connList.updateConnectors||[]).forEach(c => n.add(`update:${norm(c)}`));
    setSel(n);
  };

  const ConnRow = ({ c, type }) => {
    const name = norm(c);
    const desc = c.description || "";
    const active = isSelected(name, type);
    const isGet = type === "get";
    const color = isGet ? "var(--accent)" : "var(--amber)";
    const bg    = isGet ? "rgba(59,130,246,.08)" : "rgba(245,158,11,.08)";
    return (
      <div onClick={() => toggle(name, type)}
        style={{ display:"flex", alignItems:"center", gap:".6rem", padding:".42rem .8rem",
          borderBottom:"1px solid var(--b1)", cursor:"pointer",
          background: active ? bg : "transparent", transition:"background .1s" }}>
        <input type="checkbox" readOnly checked={active}
          style={{ pointerEvents:"none", accentColor:color, flexShrink:0, width:13, height:13 }} />
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ fontFamily:"var(--mono)", fontSize:".74rem", overflow:"hidden",
            textOverflow:"ellipsis", whiteSpace:"nowrap",
            color: active ? color : "var(--t1)" }}>{name}</div>
          {desc && <div style={{ fontSize:".67rem", color:"var(--t3)", marginTop:".06rem",
            overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{desc}</div>}
        </div>
        <span style={{ fontSize:".58rem", fontFamily:"var(--mono)", color:color, flexShrink:0,
          background: isGet ? "rgba(59,130,246,.12)" : "rgba(245,158,11,.12)",
          border: `1px solid ${isGet?"rgba(59,130,246,.25)":"rgba(245,158,11,.25)"}`,
          padding:".08rem .35rem", borderRadius:3 }}>
          {isGet ? "GET" : "UPDATE"}
        </span>
      </div>
    );
  };

  const SectionHeader = ({ label, count, color, list, type }) => (
    <div style={{ background:"var(--s3)", padding:".3rem .8rem",
      borderBottom:"1px solid var(--b1)", display:"flex", justifyContent:"space-between",
      alignItems:"center", position:"sticky", top:0, zIndex:2 }}>
      <span style={{ fontFamily:"var(--mono)", fontSize:".58rem", color, letterSpacing:".1em", textTransform:"uppercase" }}>
        {label} <span style={{ opacity:.6 }}>({count})</span>
      </span>
      <span onClick={() => selectGroup(list, type)}
        style={{ fontSize:".62rem", color, cursor:"pointer", opacity:.8 }}>
        Alles aan
      </span>
    </div>
  );

  return (
    <div>
      {/* Toolbar */}
      <div style={{ display:"flex", gap:".45rem", marginBottom:".55rem", alignItems:"center" }}>
        <div className="search-w" style={{ flex:1 }}>
          <span style={{ color:"var(--t3)", fontSize:".9rem" }}>⌕</span>
          <input placeholder={`Zoek in ${total} connectoren…`} value={search}
            onChange={e => setSearch(e.target.value)} style={{ width:"100%" }} />
          {search && <span onClick={() => setSearch("")} style={{ cursor:"pointer", color:"var(--t3)" }}>✕</span>}
        </div>
        <button className="btn btn-ghost" style={{ fontSize:".7rem", whiteSpace:"nowrap" }} onClick={selectAll}>Alles ✓</button>
        <button className="btn btn-ghost" style={{ fontSize:".7rem", whiteSpace:"nowrap" }} onClick={deselectAll}>Alles ✗</button>
      </div>

      {/* List */}
      <div style={{ maxHeight:340, overflowY:"auto", border:"1px solid var(--b1)", borderRadius:6 }}>
        {filteredGet.length > 0 && (
          <>
            <SectionHeader label="GetConnectoren" count={filteredGet.length}
              color="var(--accent)" list={filteredGet} type="get" />
            {filteredGet.map((c,i) => <ConnRow key={`g${i}`} c={c} type="get" />)}
          </>
        )}
        {filteredUpdate.length > 0 && (
          <>
            <SectionHeader label="UpdateConnectoren" count={filteredUpdate.length}
              color="var(--amber)" list={filteredUpdate} type="update" />
            {filteredUpdate.map((c,i) => <ConnRow key={`u${i}`} c={c} type="update" />)}
          </>
        )}
        {filteredGet.length === 0 && filteredUpdate.length === 0 && (
          <div style={{ padding:"1.2rem", color:"var(--t3)", textAlign:"center",
            fontSize:".8rem", fontStyle:"italic" }}>
            {search ? `Geen resultaten voor "${search}"` : "Geen connectoren beschikbaar"}
          </div>
        )}
      </div>
    </div>
  );
}

// ── RUN CONFIRM MODAL ─────────────────────────────────────────────────────────
function RunConfirmModal({ werkset, config, onConfirm, onDryRun, onClose }) {
  const [phase, setPhase]     = React.useState("loading"); // loading | preview | error
  const [preview, setPreview] = React.useState(null);
  const [error, setError]     = React.useState(null);
  const [expanded, setExpanded] = React.useState({});

  React.useEffect(() => {
    previewWerkset(werkset, config)
      .then(p => { setPreview(p); setPhase("preview"); })
      .catch(e => { setError(e.message); setPhase("error"); });
  }, []);

  const totalRows = (preview?.connectors || []).reduce((s,c) => s + c.totalRows, 0);
  const hasFetchError = (preview?.connectors || []).some(c => c.fetchError);
  const skippedVisible = (preview?.skipped || []).filter(s => s.reden !== "update-connector");

  return (
    <div style={{ position:"fixed", inset:0, zIndex:900, background:"rgba(0,0,0,.75)",
      display:"flex", alignItems:"center", justifyContent:"center" }}
      onClick={e => e.target===e.currentTarget && onClose()}>
      <div style={{ width:560, maxHeight:"88vh", display:"flex", flexDirection:"column",
        background:"var(--rail-light)", border:"2px solid var(--chrome)", borderRadius:6,
        boxShadow:"0 0 40px rgba(255,149,0,.2), 0 24px 64px rgba(0,0,0,.9)" }}>

        {/* Header */}
        <div style={{ padding:".65rem 1rem", background:"linear-gradient(180deg,#000,#0a0e1a)",
          borderBottom:"1px solid var(--chrome-dim)", flexShrink:0,
          display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <div style={{ fontFamily:"'Bungee Inline',sans-serif", fontSize:"1rem",
            color:"var(--neon-amber)", textShadow:"0 0 10px rgba(255,149,0,.4)", letterSpacing:".04em" }}>
            ▶ WERKSET UITVOEREN
          </div>
          <span onClick={onClose} style={{ cursor:"pointer", color:"var(--chrome-dim)",
            fontFamily:"var(--mono)", border:"1px solid var(--chrome-dim)", borderRadius:2,
            padding:".08rem .32rem", fontSize:".8rem", transition:"all .12s" }}
            onMouseEnter={e=>{ e.currentTarget.style.color="var(--neon-red)"; e.currentTarget.style.borderColor="var(--neon-red)"; }}
            onMouseLeave={e=>{ e.currentTarget.style.color="var(--chrome-dim)"; e.currentTarget.style.borderColor="var(--chrome-dim)"; }}>✕</span>
        </div>

        {/* Body */}
        <div style={{ flex:1, overflowY:"auto", padding:".85rem 1rem",
          display:"flex", flexDirection:"column", gap:".65rem" }}>

          {phase === "loading" && (
            <div style={{ display:"flex", alignItems:"center", gap:".6rem",
              color:"var(--chrome-dim)", fontFamily:"var(--mono)", fontSize:".75rem" }}>
              <span style={{ display:"inline-block", animation:"spin .7s linear infinite" }}>⟳</span>
              Data ophalen uit Profit…
            </div>
          )}

          {phase === "error" && (
            <div style={{ color:"var(--neon-red)", fontFamily:"var(--mono)", fontSize:".72rem",
              background:"rgba(255,42,74,.08)", border:"1px solid rgba(255,42,74,.3)",
              borderRadius:4, padding:".6rem .8rem" }}>
              ✕ Fout bij ophalen: {error}
            </div>
          )}

          {phase === "preview" && preview && (<>

            {/* Summary */}
            <div style={{ display:"flex", gap:".6rem" }}>
              {[
                { lbl:"connectors", val:(preview.connectors||[]).length, col:"var(--neon-amber)" },
                { lbl:"records totaal", val:totalRows, col:"var(--neon-cyan)" },
                { lbl:"overgeslagen", val:skippedVisible.length, col:skippedVisible.length>0?"var(--neon-amber)":"var(--chrome-dim)" },
              ].map((d,i) => (
                <div key={i} style={{ flex:1, background:"#000", border:"1px solid var(--chrome-dim)",
                  borderRadius:3, padding:".35rem .5rem", textAlign:"center" }}>
                  <div style={{ fontFamily:"var(--mono)", fontSize:".4rem", color:"var(--chrome-dim)",
                    letterSpacing:".1em", textTransform:"uppercase" }}>{d.lbl}</div>
                  <div style={{ fontFamily:"var(--mono)", fontSize:".85rem", color:d.col,
                    textShadow:`0 0 6px ${d.col}55` }}>{d.val}</div>
                </div>
              ))}
            </div>

            {/* Per connector preview */}
            {(preview.connectors||[]).map((c, ci) => {
              const isOpen = expanded[ci] !== false;
              const fieldEntries = Object.entries(c.sampleFields||{});
              return (
                <div key={ci} style={{ border:`1px solid ${c.fetchError?"rgba(255,42,74,.3)":"rgba(200,168,75,.2)"}`,
                  borderRadius:4, overflow:"hidden" }}>
                  <div onClick={()=>setExpanded(p=>({...p,[ci]:!isOpen}))}
                    style={{ padding:".38rem .7rem", display:"flex", alignItems:"center", gap:".5rem",
                      cursor:"pointer", background:"rgba(0,0,0,.3)" }}>
                    <span style={{ fontFamily:"var(--sans)", fontSize:".82rem", color:"var(--text-bright)", flex:1 }}>
                      {c.fetchError ? "✕" : "✓"} {c.name}
                    </span>
                    <span style={{ fontFamily:"var(--mono)", fontSize:".58rem", color:"var(--neon-cyan)" }}>
                      → {c.updateConn}
                    </span>
                    <span style={{ fontFamily:"var(--mono)", fontSize:".62rem",
                      color: c.fetchError?"var(--neon-red)":"var(--neon-green)" }}>
                      {c.fetchError ? "fout" : `${c.totalRows} records`}
                    </span>
                    <span style={{ fontFamily:"var(--mono)", fontSize:".52rem", color:"var(--chrome-dim)" }}>
                      {isOpen?"▲":"▼"}
                    </span>
                  </div>
                  {isOpen && (
                    <div style={{ padding:".45rem .7rem", borderTop:"1px solid rgba(200,168,75,.1)" }}>
                      {c.fetchError ? (
                        <div style={{ fontFamily:"var(--mono)", fontSize:".62rem", color:"var(--neon-red)" }}>
                          {c.fetchError}
                        </div>
                      ) : fieldEntries.length > 0 ? (<>
                        <div style={{ fontFamily:"var(--mono)", fontSize:".48rem", color:"var(--chrome-dim)",
                          letterSpacing:".1em", textTransform:"uppercase", marginBottom:".3rem" }}>
                          Voorbeeld payload — record {c.sampleId}
                        </div>
                        <div style={{ display:"flex", flexWrap:"wrap", gap:".25rem" }}>
                          {fieldEntries.map(([k,v]) => (
                            <div key={k} style={{ background:"rgba(0,0,0,.4)",
                              border:"1px solid rgba(200,168,75,.2)", borderRadius:3,
                              padding:".18rem .4rem", fontFamily:"var(--mono)", fontSize:".6rem" }}>
                              <span style={{ color:"var(--neon-amber)" }}>{k}</span>
                              <span style={{ color:"var(--chrome-dim)" }}> = </span>
                              <span style={{ color:"var(--text-bright)" }}>
                                {String(v).length > 30 ? String(v).slice(0,30)+"…" : String(v)}
                              </span>
                            </div>
                          ))}
                        </div>
                      </>) : (
                        <div style={{ fontFamily:"var(--mono)", fontSize:".62rem", color:"var(--chrome-dim)" }}>
                          Geen velden in payload — controleer de veldkoppeling.
                        </div>
                      )}
                    </div>
                  )}
                </div>
              );
            })}

            {/* Skipped */}
            {skippedVisible.length > 0 && (
              <div style={{ padding:".4rem .7rem", background:"rgba(255,149,0,.05)",
                border:"1px dashed rgba(255,149,0,.25)", borderRadius:4,
                fontFamily:"var(--mono)", fontSize:".6rem", color:"var(--neon-amber)" }}>
                <div style={{ fontSize:".48rem", letterSpacing:".1em", textTransform:"uppercase",
                  opacity:.6, marginBottom:".2rem" }}>Overgeslagen</div>
                {skippedVisible.map((s,i) => (
                  <div key={i}><span style={{ color:"var(--text-bright)" }}>{s.name}</span> — {s.reden}</div>
                ))}
              </div>
            )}

            {/* Warning */}
            <div style={{ padding:".45rem .7rem", background:"rgba(255,42,74,.06)",
              border:"1px solid rgba(255,42,74,.25)", borderRadius:4,
              fontFamily:"var(--mono)", fontSize:".62rem", color:"var(--chrome-dim)", lineHeight:1.7 }}>
              <span style={{ color:"var(--neon-red)", fontWeight:700 }}>⚠ Let op: </span>
              Dit schrijft <span style={{ color:"var(--text-bright)", fontWeight:700 }}>{totalRows} records</span> naar{" "}
              <span style={{ color:"var(--neon-amber)" }}>{config?.envType === "test" ? "TEST" : "PRODUCTIE"}</span>.
              Gebruik <em>Dry run</em> om de payloads te controleren zonder te schrijven.
            </div>
          </>)}
        </div>

        {/* Footer */}
        <div style={{ padding:".65rem 1rem", borderTop:"1px solid var(--chrome-dim)", flexShrink:0,
          display:"flex", gap:".5rem", justifyContent:"flex-end",
          background:"linear-gradient(0deg,#000,#0a0e1a)" }}>
          <button onClick={onClose}
            style={{ fontFamily:"var(--mono)", fontSize:".65rem", cursor:"pointer", padding:".3rem .75rem",
              background:"transparent", border:"1px solid var(--chrome-dim)", borderRadius:3,
              color:"var(--chrome-dim)", transition:"all .12s" }}
            onMouseEnter={e=>e.currentTarget.style.borderColor="var(--text-bright)"}
            onMouseLeave={e=>e.currentTarget.style.borderColor="var(--chrome-dim)"}>
            Annuleren
          </button>
          {phase === "preview" && !hasFetchError && (
            <button onClick={() => onDryRun(preview)}
              style={{ fontFamily:"var(--mono)", fontSize:".65rem", cursor:"pointer", padding:".3rem .75rem",
                background:"rgba(0,229,255,.08)", border:"1px solid rgba(0,229,255,.4)", borderRadius:3,
                color:"var(--neon-cyan)", transition:"all .12s" }}
              onMouseEnter={e=>e.currentTarget.style.background="rgba(0,229,255,.16)"}
              onMouseLeave={e=>e.currentTarget.style.background="rgba(0,229,255,.08)"}>
              🔍 Dry run (geen schrijven)
            </button>
          )}
          {phase === "preview" && !hasFetchError && totalRows > 0 && (
            <button onClick={() => onConfirm(preview)}
              style={{ fontFamily:"var(--mono)", fontSize:".65rem", cursor:"pointer", padding:".3rem .85rem",
                background:"rgba(255,149,0,.12)", border:"1px solid var(--neon-amber)", borderRadius:3,
                color:"var(--neon-amber)", fontWeight:700, transition:"all .12s",
                textShadow:"0 0 8px rgba(255,149,0,.4)" }}
              onMouseEnter={e=>e.currentTarget.style.background="rgba(255,149,0,.22)"}
              onMouseLeave={e=>e.currentTarget.style.background="rgba(255,149,0,.12)"}>
              ▶ Uitvoeren — {totalRows} records
            </button>
          )}
        </div>
      </div>
    </div>
  );
}


function RunDetailTable({ rows, name }) {
  const cols = [...new Set((rows||[]).flatMap(r => Object.keys(r.fields||{})))];
  const exportCsv = () => {
    const hdr = ["ID","Status",...cols].map(h => '"'+h+'"').join(",");
    const body = (rows||[]).map(r =>
      ['"'+r.id+'"', '"'+(r.status==="ok"?"ok":"fout")+'"',
        ...cols.map(col => {
          const v = r.fields?.[col] ?? "";
          return '"'+String(v).replace(/"/g,'""')+'"';
        })
      ].join(",")
    ).join("\n");
    const blob = new Blob([hdr+"\n"+body], {type:"text/csv;charset=utf-8;"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = name+"_"+new Date().toISOString().slice(0,10)+".csv";
    a.click();
  };
  return (
    <div style={{ borderTop:"1px solid rgba(255,255,255,.06)" }}>
      <div style={{ padding:".3rem .65rem", display:"flex", alignItems:"center",
        justifyContent:"space-between", background:"rgba(0,0,0,.2)" }}>
        <span style={{ fontFamily:"var(--mono)", fontSize:".52rem",
          color:"var(--chrome-dim)", letterSpacing:".08em", textTransform:"uppercase" }}>
          {(rows||[]).length} verwerkte records
        </span>
        <span onClick={exportCsv}
          style={{ cursor:"pointer", fontFamily:"var(--mono)", fontSize:".55rem",
            color:"var(--neon-cyan)", border:"1px solid rgba(0,229,255,.3)",
            borderRadius:3, padding:".15rem .4rem", background:"rgba(0,229,255,.05)",
            display:"flex", alignItems:"center", gap:".25rem", transition:"all .12s" }}
          onMouseEnter={e=>{ e.currentTarget.style.background="rgba(0,229,255,.12)"; e.currentTarget.style.boxShadow="0 0 8px rgba(0,229,255,.2)"; }}
          onMouseLeave={e=>{ e.currentTarget.style.background="rgba(0,229,255,.05)"; e.currentTarget.style.boxShadow="none"; }}>
          ↓ CSV exporteren
        </span>
      </div>
      <div style={{ overflowX:"auto", maxHeight:220 }}>
        <table style={{ width:"100%", borderCollapse:"collapse", fontFamily:"var(--mono)", fontSize:".6rem" }}>
          <thead>
            <tr style={{ background:"rgba(0,0,0,.4)", position:"sticky", top:0, zIndex:1 }}>
              <th style={{ padding:".2rem .4rem", textAlign:"left", color:"var(--chrome)",
                borderBottom:"1px solid rgba(200,168,75,.2)", fontWeight:700, whiteSpace:"nowrap", minWidth:80 }}>ID</th>
              <th style={{ padding:".2rem .4rem", textAlign:"center", color:"var(--chrome)",
                borderBottom:"1px solid rgba(200,168,75,.2)", fontWeight:700, width:36 }}>✓</th>
              {cols.map(col => (
                <th key={col} style={{ padding:".2rem .4rem", textAlign:"left", color:"var(--neon-amber)",
                  borderBottom:"1px solid rgba(200,168,75,.2)", fontWeight:400, whiteSpace:"nowrap",
                  letterSpacing:".04em" }}>{col}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {(rows||[]).map((r, ri) => (
              <tr key={ri} style={{ background: ri%2===0?"transparent":"rgba(255,255,255,.02)",
                borderBottom:"1px solid rgba(255,255,255,.04)" }}>
                <td style={{ padding:".18rem .4rem", color:"var(--text-dim)", whiteSpace:"nowrap" }}>{r.id}</td>
                <td style={{ padding:".18rem .4rem", textAlign:"center",
                  color: r.status==="ok"?"var(--neon-green)":r.status==="dry"?"var(--neon-cyan)":"var(--neon-red)" }}>
                  {r.status==="ok" ? "✓" : "✕"}
                </td>
                {cols.map(col => (
                  <td key={col} style={{ padding:".18rem .4rem", color:"var(--text-bright)",
                    maxWidth:200, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}
                    title={String(r.fields?.[col]??"")}>
                    {String(r.fields?.[col]??"")}
                  </td>
                ))}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function RunsTab({ runHistory, onEnableConnector }) {
  const [expanded, setExpanded] = React.useState({});

  if (!runHistory || runHistory.length === 0) {
    return (
      <div style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center",
        flexDirection:"column", gap:".75rem", color:"var(--chrome-dim)" }}>
        <div style={{ fontSize:"2rem", opacity:.3 }}>▶</div>
        <div style={{ fontFamily:"var(--mono)", fontSize:".72rem", letterSpacing:".08em" }}>
          GEEN RUNS — START EEN WERKSET OM HIER RESULTATEN TE ZIEN
        </div>
      </div>
    );
  }

  const fmtDur = (a, b) => {
    if (!a || !b) return "—";
    const s = Math.round((new Date(b) - new Date(a)) / 1000);
    return s < 60 ? `${s}s` : `${Math.floor(s/60)}m ${s%60}s`;
  };
  const fmtTs = iso => new Date(iso).toLocaleString("nl-NL",{
    day:"numeric", month:"short", year:"numeric",
    hour:"2-digit", minute:"2-digit", second:"2-digit"
  });

  return (
    <div style={{ flex:1, overflowY:"auto", padding:".85rem 1.1rem",
      display:"flex", flexDirection:"column", gap:".65rem" }}>
      {[...runHistory].reverse().map((log, ri) => {
        const runKey = `run-${ri}`;
        const isRunOpen = expanded[runKey] !== false;
        const ok = log.totalFailed === 0;
        const isDry = !!log.isDryRun;
        const dur = fmtDur(log.startedAt, log.finishedAt);

        return (
          <div key={runKey} style={{
            border: `1px solid ${log.cancelled ? "rgba(255,149,0,.3)" : ok ? "rgba(57,255,20,.2)" : "rgba(255,42,74,.3)"}`,
            borderRadius:5, overflow:"hidden", background:"var(--rail-light)",
          }}>
            {/* Run header */}
            <div onClick={() => setExpanded(p => ({ ...p, [runKey]: !isRunOpen }))}
              style={{ padding:".45rem .85rem", display:"flex", alignItems:"center",
                gap:".7rem", cursor:"pointer",
                background: log.cancelled ? "rgba(255,149,0,.04)" : isDry ? "rgba(0,229,255,.04)" : ok ? "rgba(57,255,20,.04)" : "rgba(255,42,74,.06)",
                borderBottom: isRunOpen ? `1px solid ${isDry?"rgba(0,229,255,.15)":ok?"rgba(57,255,20,.12)":"rgba(255,42,74,.18)"}` : "none" }}>

              <span style={{ fontFamily:"var(--mono)", fontSize:".78rem", fontWeight:700,
                color: log.cancelled ? "var(--neon-amber)" : isDry ? "var(--neon-cyan)" : ok ? "var(--neon-green)" : "var(--neon-red)",
                textShadow: isDry ? "0 0 6px rgba(0,229,255,.5)" : ok ? "0 0 6px rgba(57,255,20,.5)" : "0 0 6px rgba(255,42,74,.5)" }}>
                {log.cancelled ? "⏹" : isDry ? "🔍" : ok ? "✓" : "✕"}
              </span>

              <span style={{ fontFamily:"var(--mono)", fontSize:".68rem", color:"var(--text-bright)", flex:1,
                display:"flex", alignItems:"center", gap:".4rem" }}>
                {fmtTs(log.startedAt)}
                {isDry && <span style={{ fontSize:".52rem", color:"var(--neon-cyan)",
                  background:"rgba(0,229,255,.1)", border:"1px solid rgba(0,229,255,.3)",
                  borderRadius:2, padding:".02rem .25rem", letterSpacing:".06em" }}>DRY RUN</span>}
                {log.cancelled && <span style={{ fontSize:".52rem", color:"var(--neon-amber)",
                  background:"rgba(255,149,0,.1)", border:"1px solid rgba(255,149,0,.35)",
                  borderRadius:2, padding:".02rem .25rem", letterSpacing:".06em" }}>GEANNULEERD</span>}
                {log.tokenExpired && <span style={{ fontSize:".52rem", color:"var(--neon-red)",
                  background:"rgba(255,42,74,.1)", border:"1px solid rgba(255,42,74,.4)",
                  borderRadius:2, padding:".02rem .25rem", letterSpacing:".06em" }}>TOKEN VERLOPEN</span>}
              </span>

              <span style={{ fontFamily:"var(--mono)", fontSize:".62rem", color:"var(--chrome-dim)" }}>
                {dur}
              </span>

              {/* Mini DMD */}
              {[
                { lbl:"connectors", val: log.connectors.length, col:"var(--neon-amber)" },
                { lbl:"opgeslagen", val: log.totalSaved,  col:"var(--neon-green)" },
                { lbl:"mislukt",    val: log.totalFailed, col: log.totalFailed>0?"var(--neon-red)":"var(--chrome-dim)" },
              ].map((d,i) => (
                <div key={i} style={{ background:"#000", border:"1px solid var(--chrome-dim)",
                  borderRadius:2, padding:".1rem .4rem", textAlign:"center", minWidth:52 }}>
                  <div style={{ fontFamily:"var(--mono)", fontSize:".38rem", color:"var(--chrome-dim)",
                    letterSpacing:".08em", textTransform:"uppercase" }}>{d.lbl}</div>
                  <div style={{ fontFamily:"var(--mono)", fontSize:".65rem", color:d.col }}>{d.val}</div>
                </div>
              ))}

              <span style={{ fontFamily:"var(--mono)", fontSize:".58rem", color:"var(--chrome-dim)" }}>
                {isRunOpen ? "▲" : "▼"}
              </span>
            </div>

            {/* Connectors */}
            {isRunOpen && (
              <div style={{ padding:".5rem .85rem", display:"flex", flexDirection:"column", gap:".4rem" }}>
                {(log.skipped||[]).filter(s => s.reden !== "update-connector").length > 0 && (
                  <div style={{ marginBottom:".35rem", padding:".4rem .75rem",
                    background:"rgba(255,149,0,.06)", border:"1px dashed rgba(255,149,0,.3)",
                    borderRadius:4, fontFamily:"var(--mono)", fontSize:".62rem", color:"var(--neon-amber)",
                    display:"flex", flexDirection:"column", gap:".3rem" }}>
                    <span style={{ fontSize:".5rem", letterSpacing:".1em", textTransform:"uppercase", opacity:.6 }}>⚠ Overgeslagen connectors</span>
                    {(log.skipped||[]).filter(s => s.reden !== "update-connector").map((s,i) => (
                      <div key={i} style={{ display:"flex", alignItems:"center", gap:".5rem" }}>
                        <span style={{ color:"var(--text-bright)" }}>{s.name}</span>
                        <span style={{ color:"var(--chrome-dim)" }}>—</span>
                        <span style={{ color: s.reden==="uitgeschakeld" ? "var(--neon-red)" : "var(--chrome-dim)" }}>{s.reden}</span>
                        {s.reden === "uitgeschakeld" && onEnableConnector && (
                          <span onClick={() => onEnableConnector(s.name)}
                            style={{ marginLeft:"auto", cursor:"pointer", fontSize:".55rem",
                              color:"var(--neon-green)", border:"1px solid rgba(57,255,20,.3)",
                              borderRadius:2, padding:".05rem .3rem", background:"rgba(57,255,20,.06)" }}
                            onMouseEnter={e=>e.currentTarget.style.background="rgba(57,255,20,.15)"}
                            onMouseLeave={e=>e.currentTarget.style.background="rgba(57,255,20,.06)"}>
                            ▶ Aanzetten
                          </span>
                        )}
                      </div>
                    ))}
                  </div>
                )}
                {log.connectors.map((c, ci) => {
                  const cKey = `${runKey}-c${ci}`;
                  const cOk  = c.errors.length === 0;
                  const isOpen = cKey in expanded ? expanded[cKey] : ((c.rows||[]).length > 0 || c.errors.length > 0);
                  const pct  = c.fetched > 0 ? Math.round((c.saved / c.fetched) * 100) : 100;

                  return (
                    <div key={cKey} style={{ border:`1px solid ${cOk?"rgba(57,255,20,.15)":"rgba(255,42,74,.25)"}`,
                      borderRadius:4, overflow:"hidden" }}>

                      {/* Connector header */}
                      <div onClick={() => setExpanded(p => ({ ...p, [cKey]: !isOpen }))}
                        style={{ padding:".32rem .65rem", display:"flex", alignItems:"center",
                          gap:".5rem", cursor:"pointer",
                          background: cOk ? "rgba(57,255,20,.03)" : "rgba(255,42,74,.05)",
                          borderBottom: isOpen
                            ? "1px solid rgba(255,255,255,.06)" : "none" }}>

                        <span style={{ fontFamily:"var(--mono)", fontSize:".65rem",
                          color: cOk ? "var(--neon-green)" : "var(--neon-red)" }}>
                          {cOk ? "✓" : "✕"}
                        </span>
                        <span style={{ fontFamily:"var(--sans)", fontSize:".8rem",
                          color:"var(--text-bright)", flex:1 }}>{c.name}</span>

                        {/* Progress bar */}
                        <div style={{ width:55, height:4, background:"rgba(255,255,255,.06)",
                          borderRadius:2, overflow:"hidden", flexShrink:0 }}>
                          <div style={{ height:"100%", width:`${pct}%`, borderRadius:2,
                            background: cOk ? "var(--neon-green)" : "var(--neon-amber)",
                            boxShadow: cOk ? "0 0 4px rgba(57,255,20,.5)" : "0 0 4px rgba(255,149,0,.5)" }} />
                        </div>

                        <span style={{ fontFamily:"var(--mono)", fontSize:".58rem", color:"var(--chrome-dim)" }}>
                          {c.fetched} gehaald
                        </span>
                        <span style={{ fontFamily:"var(--mono)", fontSize:".58rem", color:"var(--neon-green)" }}>
                          ✓{c.saved}
                        </span>
                        {c.failed > 0 && (
                          <span style={{ fontFamily:"var(--mono)", fontSize:".58rem", color:"var(--neon-red)" }}>
                            ✕{c.failed}
                          </span>
                        )}
                        <span style={{ fontFamily:"var(--mono)", fontSize:".55rem", color:"var(--chrome-dim)" }}>
                          {isOpen ? "▲" : "▼"}
                        </span>
                      </div>

                      {/* Detail: rows table + CSV export */}
                      {isOpen && (c.rows||[]).length > 0 && (
                        <RunDetailTable rows={c.rows} name={c.name} />
                      )}

                      {/* Errors */}
                      {isOpen && c.errors.length > 0 && (
                        <div style={{ padding:".4rem .65rem", display:"flex",
                          flexDirection:"column", gap:".25rem" }}>
                          {c.errors.map((e, ei) => (
                            <div key={ei} style={{ fontFamily:"var(--mono)", fontSize:".63rem",
                              color:"var(--neon-red)", background:"rgba(255,42,74,.07)",
                              border:"1px solid rgba(255,42,74,.22)", borderRadius:3,
                              padding:".28rem .5rem", lineHeight:1.6, whiteSpace:"pre-wrap" }}>
                              {e.id !== "fetch" && (
                                <span style={{ color:"var(--chrome-dim)", marginRight:".35rem" }}>
                                  ID {e.id}:
                                </span>
                              )}
                              {e.err}
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}


function Toggle({ value, onChange, label }) {

    <div style={{ display:"flex", alignItems:"center", gap:".55rem", cursor:"pointer" }} onClick={()=>onChange(!value)}>
      {/* Housing */}
      <div style={{
        width:42, height:22, borderRadius:5, flexShrink:0, position:"relative",
        background: value ? "#0c1a12" : "#141824",
        border: value ? "1px solid rgba(34,197,94,.35)" : "1px solid rgba(255,255,255,.1)",
        boxShadow: value ? "0 0 8px rgba(34,197,94,.12), inset 0 2px 3px rgba(0,0,0,.4)" : "inset 0 2px 3px rgba(0,0,0,.4)",
        transition:"all .18s",
        perspective:60,
      }}>
        {/* Lever */}
        <div style={{
          position:"absolute",
          left:5, right:5, top:3, bottom:3,
          borderRadius:3,
          background: value
            ? "linear-gradient(180deg,#1a3325 0%,#0d2a1a 100%)"
            : "linear-gradient(180deg,#2d3550 0%,#252d3d 100%)",

          transform: value ? "rotateX(15deg)" : "rotateX(-15deg)",
          transition:"transform .16s cubic-bezier(.34,1.4,.64,1), background .18s",
          boxShadow: value ? "0 -2px 4px rgba(0,0,0,.3)" : "0 2px 4px rgba(0,0,0,.4)",
          display:"flex", alignItems:"center", justifyContent:"center",
        }}>
          {/* Knob */}
          <div style={{
            width:10, height:4, borderRadius:2,
            background: value ? "var(--green)" : "#374060",
            boxShadow: value ? "0 0 4px rgba(34,197,94,.7)" : "none",
            transition:"background .18s, box-shadow .18s",
          }} />
        </div>
        {/* Indicator dot */}
        <div style={{
          position:"absolute", top:2, right:3, width:4, height:4, borderRadius:"50%",
          background: value ? "var(--green)" : "rgba(255,255,255,.1)",
          boxShadow: value ? "0 0 4px rgba(34,197,94,.8)" : "none",
          transition:"all .18s",
        }} />
      </div>
      {label && <span style={{ fontSize:".75rem", fontWeight:600, color: value ? "var(--t1)" : "var(--t3)", transition:"color .18s" }}>{label}</span>}
    </div>
  );
}

function WerksetModal({ werkset, onSave, onClose }) {
  const isNew = !werkset?.id;
  const sched = werkset?.schedule || {};

  const [name,         setName]         = useState(werkset?.name || "");
  const [enabled,      setEnabled]      = useState(sched.enabled      ?? false);
  const [freq,         setFreq]         = useState(sched.freq         || "weekly");
  const [days,         setDays]         = useState(sched.days         || [1]);
  // mode: "fixed" = vaste tijdstippen, "interval" = realtime polling met tijdvenster
  const [mode,         setMode]         = useState(sched.mode         || "fixed");
  const [times,        setTimes]        = useState(sched.times        || ["08:00"]);
  const [newTime,      setNewTime]      = useState("08:00");
  const [windowFrom,   setWindowFrom]   = useState(sched.windowFrom   || "08:00");
  const [windowTo,     setWindowTo]     = useState(sched.windowTo     || "17:00");
  const [intervalSec,  setIntervalSec]  = useState(sched.intervalSec  || 300);

  const DAY_LABELS = ["Zo","Ma","Di","Wo","Do","Vr","Za"];
  const toggleDay = d => setDays(p => p.includes(d) ? p.filter(x=>x!==d) : [...p,d].sort((a,b)=>a-b));
  const addTime = () => { if (!times.includes(newTime)) setTimes(p => [...p, newTime].sort()); };
  const removeTime = t => setTimes(p => p.filter(x => x !== t));

  const INTERVALS = [
    { label:"30 sec",  val:30 },
    { label:"1 min",   val:60 },
    { label:"5 min",   val:300 },
    { label:"15 min",  val:900 },
    { label:"30 min",  val:1800 },
    { label:"1 uur",   val:3600 },
  ];

  const nextRun = () => {
    if (!enabled) return null;
    const now = new Date();
    if (mode === "interval") {
      // Next run: now if within window, else start of window tomorrow/today
      const [fh, fm] = windowFrom.split(":").map(Number);
      const [th, tm] = windowTo.split(":").map(Number);
      for (let d = 0; d < 35; d++) {
        const date = new Date(now); date.setDate(now.getDate() + d);
        const dow = date.getDay(), dom = date.getDate();
        const matches = freq==="daily" ? true : freq==="weekly" ? days.includes(dow) : days.includes(dom);
        if (!matches) continue;
        const from = new Date(date); from.setHours(fh, fm, 0, 0);
        const to   = new Date(date); to.setHours(th, tm, 0, 0);
        if (d === 0 && now >= from && now < to) return "Nu actief (loopt al)";
        if (from > now) return from.toLocaleString("nl-NL", { weekday:"short", day:"numeric", month:"short", hour:"2-digit", minute:"2-digit" });
      }
      return null;
    }
    // fixed times
    const candidates = [];
    for (let d = 0; d < 35; d++) {
      const date = new Date(now); date.setDate(now.getDate() + d);
      const dow = date.getDay(), dom = date.getDate();
      const matches = freq==="daily" ? true : freq==="weekly" ? days.includes(dow) : days.includes(dom);
      if (!matches) continue;
      for (const t of times) {
        const [h, m] = t.split(":").map(Number);
        const run = new Date(date); run.setHours(h, m, 0, 0);
        if (run > now) candidates.push(run);
      }
    }
    if (!candidates.length) return null;
    candidates.sort((a,b)=>a-b);
    return candidates[0].toLocaleString("nl-NL", { weekday:"short", day:"numeric", month:"short", hour:"2-digit", minute:"2-digit" });
  };

  const isValid = name.trim() &&
    (freq==="daily" || days.length > 0) &&
    (!enabled || mode==="interval" || times.length > 0) &&
    (!enabled || mode!=="interval" || windowFrom < windowTo);

  const handleSave = () => {
    if (!isValid) return;
    onSave(name.trim(), { enabled, freq, days, mode, times, windowFrom, windowTo, intervalSec });
    onClose();
  };

  const next = nextRun();

  return (
    <div className="overlay" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="modal" style={{ width:540, maxHeight:"90vh", display:"flex", flexDirection:"column" }}>
        <div className="mh" style={{ flexShrink:0 }}>
          <div className="mtitle">{isNew ? "Nieuwe werkset" : "Werkset bewerken"}</div>
          <div className="mclose" onClick={onClose}>✕</div>
        </div>
        <div className="mb" style={{ display:"flex", flexDirection:"column", gap:".8rem", overflowY:"auto" }}>

          {/* Name */}
          <div className="fgrp">
            <div className="flbl">Naam <span>*</span></div>
            <input className="finp" value={name} onChange={e=>setName(e.target.value)}
              placeholder="bv. Medewerkers import" autoFocus />
          </div>

          {/* Schedule toggle */}
          <div style={{ borderTop:"1px solid var(--b1)", paddingTop:".75rem", display:"flex", flexDirection:"column", gap:".7rem" }}>
            <div style={{ display:"flex", alignItems:"center", gap:".65rem" }}>
              <Toggle value={enabled} onChange={setEnabled} label="Automatisch uitvoeren" />
              {next && <span style={{ fontSize:".63rem", color:"var(--green)", marginLeft:"auto" }}>⏱ {next}</span>}
            </div>

            {enabled && <>
              {/* Frequency (days) */}
              <div className="fgrp">
                <div className="flbl">Herhaling</div>
                <div style={{ display:"flex", gap:".4rem" }}>
                  {["daily","weekly","monthly"].map(f => (
                    <button key={f} onClick={()=>{ setFreq(f); setDays(f==="weekly"?[1,2,3,4,5]:f==="monthly"?[1]:[]); }}
                      className={`btn ${freq===f?"btn-primary":"btn-ghost"}`}
                      style={{ fontSize:".72rem", padding:".25rem .7rem" }}>
                      {f==="daily"?"Dagelijks":f==="weekly"?"Wekelijks":"Maandelijks"}
                    </button>
                  ))}
                </div>
              </div>

              {freq === "weekly" && (
                <div className="fgrp">
                  <div className="flbl">Dag(en) van de week</div>
                  <div style={{ display:"flex", gap:".3rem" }}>
                    {DAY_LABELS.map((lbl,i) => (
                      <div key={i} onClick={()=>toggleDay(i)}
                        style={{ width:34, height:34, borderRadius:5, display:"flex", alignItems:"center",
                          justifyContent:"center", cursor:"pointer", fontSize:".7rem", fontWeight:600,
                          background: days.includes(i) ? "var(--accent)" : "var(--s3)",
                          color: days.includes(i) ? "white" : "var(--t2)",
                          border:`1px solid ${days.includes(i)?"var(--accent)":"var(--b1)"}`,
                          transition:"all .15s" }}>
                        {lbl}
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {freq === "monthly" && (
                <div className="fgrp">
                  <div className="flbl">Dag(en) van de maand</div>
                  <div style={{ display:"flex", flexWrap:"wrap", gap:".25rem" }}>
                    {Array.from({length:31},(_,i)=>i+1).map(d => (
                      <div key={d} onClick={()=>toggleDay(d)}
                        style={{ width:30, height:30, borderRadius:4, display:"flex", alignItems:"center",
                          justifyContent:"center", cursor:"pointer", fontSize:".7rem", fontWeight:600,
                          background: days.includes(d) ? "var(--accent)" : "var(--s3)",
                          color: days.includes(d) ? "white" : "var(--t2)",
                          border:`1px solid ${days.includes(d)?"var(--accent)":"var(--b1)"}`,
                          transition:"all .15s" }}>
                        {d}
                      </div>
                    ))}
                  </div>
                  <div className="help-text">Als de dag niet bestaat (bv. 31 in april) wordt de laatste dag gebruikt.</div>
                </div>
              )}

              {/* Divider */}
              <div style={{ borderTop:"1px solid var(--b1)", paddingTop:".6rem" }}>
                <div className="flbl" style={{ marginBottom:".5rem" }}>Uitvoermodus</div>
                <div style={{ display:"flex", gap:".4rem" }}>
                  {[["fixed","🕐 Vaste tijdstippen"],["interval","🔄 Tijdvenster + interval"]].map(([m,lbl]) => (
                    <button key={m} onClick={()=>setMode(m)}
                      className={`btn ${mode===m?"btn-primary":"btn-ghost"}`}
                      style={{ fontSize:".72rem", padding:".25rem .7rem" }}>{lbl}</button>
                  ))}
                </div>
              </div>

              {/* Fixed times */}
              {mode === "fixed" && (
                <div className="fgrp">
                  <div className="flbl">Tijdstip(pen)</div>
                  <div style={{ display:"flex", gap:".4rem", marginBottom:".4rem", flexWrap:"wrap" }}>
                    {times.map(t => (
                      <div key={t} style={{ display:"flex", alignItems:"center", gap:".3rem",
                        background:"var(--s3)", border:"1px solid var(--b1)", borderRadius:4,
                        padding:".2rem .5rem", fontSize:".75rem", fontFamily:"var(--mono)" }}>
                        🕐 {t}
                        <span onClick={()=>removeTime(t)} style={{ cursor:"pointer", color:"var(--t3)", fontSize:".7rem" }}>✕</span>
                      </div>
                    ))}
                    {times.length === 0 && <span style={{ fontSize:".7rem", color:"var(--red)" }}>⚠ Geen tijdstip ingesteld</span>}
                  </div>
                  <div style={{ display:"flex", gap:".4rem", alignItems:"center" }}>
                    <input type="time" className="finp" value={newTime} onChange={e=>setNewTime(e.target.value)}
                      style={{ width:"auto", fontFamily:"var(--mono)" }} />
                    <button className="btn btn-ghost" style={{ fontSize:".72rem" }} onClick={addTime}>+ Toevoegen</button>
                  </div>
                </div>
              )}

              {/* Interval + time window */}
              {mode === "interval" && (
                <>
                  <div className="fgrp">
                    <div className="flbl">Tijdvenster</div>
                    <div style={{ display:"flex", alignItems:"center", gap:".6rem" }}>
                      <div style={{ display:"flex", alignItems:"center", gap:".4rem" }}>
                        <span style={{ fontSize:".72rem", color:"var(--t3)" }}>Van</span>
                        <input type="time" className="finp" value={windowFrom} onChange={e=>setWindowFrom(e.target.value)}
                          style={{ width:"auto", fontFamily:"var(--mono)" }} />
                      </div>
                      <div style={{ display:"flex", alignItems:"center", gap:".4rem" }}>
                        <span style={{ fontSize:".72rem", color:"var(--t3)" }}>tot</span>
                        <input type="time" className="finp" value={windowTo} onChange={e=>setWindowTo(e.target.value)}
                          style={{ width:"auto", fontFamily:"var(--mono)" }} />
                      </div>
                    </div>
                    {windowFrom >= windowTo && (
                      <div style={{ fontSize:".68rem", color:"var(--red)", marginTop:".3rem" }}>
                        ⚠ Eindtijd moet na begintijd liggen
                      </div>
                    )}
                  </div>
                  <div className="fgrp">
                    <div className="flbl">Interval</div>
                    <div style={{ display:"flex", gap:".35rem", flexWrap:"wrap" }}>
                      {INTERVALS.map(({label,val}) => (
                        <button key={val} onClick={()=>setIntervalSec(val)}
                          className={`btn ${intervalSec===val?"btn-primary":"btn-ghost"}`}
                          style={{ fontSize:".72rem", padding:".25rem .6rem" }}>{label}</button>
                      ))}
                    </div>
                    <div className="help-text">
                      Actief {freq==="daily"?"elke dag":freq==="weekly"?`op ${days.map(d=>DAY_LABELS[d]).join(", ")}`:
                      `op dag ${days.join(", ")} van de maand`} van {windowFrom} tot {windowTo},
                      elke {INTERVALS.find(x=>x.val===intervalSec)?.label || intervalSec+"s"}.
                    </div>
                  </div>
                </>
              )}
            </>}
          </div>
        </div>

        <div className="mf" style={{ flexShrink:0 }}>
          <button className="btn btn-ghost" onClick={onClose}>Annuleren</button>
          <button className="btn btn-primary" disabled={!isValid} onClick={handleSave}>
            {isNew ? "+ Aanmaken" : "✓ Opslaan"}
          </button>
        </div>
      </div>
    </div>
  );
}

function EditProfileModal({ profile, onSave, onClose }) {
  const [name,    setName]    = useState(profile.name    || "");
  const [env,     setEnv]     = useState(profile.config?.env     || "");
  const [envType, setEnvType] = useState(profile.config?.envType || "production");
  const [token,   setToken]   = useState(profile.config?.token   || "");
  const [showTok, setShowTok] = useState(false);
  const [testing, setTesting] = useState(false);
  const [testResult, setTestResult] = useState(null);

  const envSub = { production:"rest", test:"resttest", acceptance:"restaccept" }[envType];
  const canSave = !!name.trim() && !!env.trim() && !!token.trim();

  const runTest = async () => {
    setTesting(true); setTestResult(null);
    try {
      await afasFetch(env.trim(), token.trim(), "/metainfo", {}, envType);
      setTestResult({ ok: true, msg: "✓ Verbinding OK" });
    } catch(e) {
      setTestResult({ ok: false, msg: "✕ " + e.message });
    } finally { setTesting(false); }
  };

  const handleSave = () => {
    if (!canSave) return;
    onSave({
      name: name.trim(),
      config: { ...profile.config, env: env.trim(), envType, token: token.trim() },
    });
    onClose();
  };

  return (
    <div className="overlay" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="modal" style={{ width:480 }}>
        <div className="mh">
          <div className="mtitle">Profiel bewerken</div>
          <div className="mclose" onClick={onClose}>✕</div>
        </div>
        <div className="mb" style={{ display:"flex", flexDirection:"column", gap:".7rem" }}>
          <div className="fgrp">
            <div className="flbl">Profielnaam <span>*</span></div>
            <input className="finp" value={name} onChange={e=>setName(e.target.value)}
              placeholder="bv. Klant A – Productie" autoFocus />
          </div>

          <div style={{ display:"grid", gridTemplateColumns:"80px 1fr", gap:".7rem" }}>
            <div className="fgrp">
              <div className="flbl">Type</div>
              <select className="finp" value={envType} onChange={e=>setEnvType(e.target.value)}>
                <option value="production">Productie</option>
                <option value="test">Test</option>
                <option value="acceptance">Acceptatie</option>
              </select>
            </div>
            <div className="fgrp">
              <div className="flbl">Omgevingsnummer <span>*</span></div>
              <input className="finp" value={env} onChange={e=>setEnv(e.target.value.replace(/\D/g,""))}
                placeholder="bv. 12345" maxLength={6} />
            </div>
          </div>

          <div className="fgrp">
            <div className="flbl">App token <span>*</span></div>
            <div style={{ position:"relative" }}>
              <input className="finp" type={showTok ? "text" : "password"}
                value={token} onChange={e=>setToken(e.target.value)}
                placeholder="Plak hier het App token"
                style={{ paddingRight:"2.2rem", fontFamily:"var(--mono)", fontSize:".7rem" }} />
              <span onClick={()=>setShowTok(v=>!v)} style={{ position:"absolute", right:8,
                top:"50%", transform:"translateY(-50%)", cursor:"pointer",
                fontSize:".8rem", color:"var(--t3)" }}>{showTok?"🙈":"👁"}</span>
            </div>
          </div>

          <div className="notice n-blue" style={{ fontSize:".68rem" }}>
            Endpoint: <code style={{ fontFamily:"var(--mono)", fontSize:".63rem" }}>
              https://{env||"[nr]"}.{envSub}.afas.online/profitrestservices/
            </code>
          </div>

          {testResult && <div className={`notice ${testResult.ok?"n-green":"n-red"}`} style={{ fontSize:".72rem" }}>{testResult.msg}</div>}
        </div>
        <div className="mf">
          <button className="btn btn-ghost" onClick={onClose}>Annuleren</button>
          <button className="btn btn-ghost" onClick={runTest} disabled={testing||!env.trim()||!token.trim()}>
            {testing ? <><Spin/> Testen…</> : "▶ Verbinding testen"}
          </button>
          <button className="btn btn-primary" onClick={handleSave} disabled={!canSave}>
            ✓ Opslaan
          </button>
        </div>
      </div>
    </div>
  );
}

function SetupScreen({ onConnect, onCancel }) {
  const [step, setStep]         = useState(1);
  const [env, setEnv]           = useState("");
  const [envType, setEnvType]   = useState("production");
  const [token, setToken]       = useState("");
  const [showToken, setShowToken] = useState(false);
  const [testing, setTesting]   = useState(false);
  const [err, setErr]           = useState(null);
  const [metaInfo, setMetaInfo] = useState(null); // { getConnectors, updateConnectors, info }
  const [sel, setSel]           = useState(new Set());

  const ENV_DOMAINS = { production:"rest", test:"resttest", acceptance:"restaccept" };
  const ENV_LABELS  = { production:"Productie", test:"Test", acceptance:"Acceptatie" };
  const ENV_PREFIX  = { production:"O", test:"T", acceptance:"A" };
  const domain = `${env||"#####"}.${ENV_DOMAINS[envType]}.afas.online`;

  const handleTest = async () => {
    if (!env.trim() || !token.trim()) { setErr("Vul omgevingsnummer en token in."); return; }
    setTesting(true); setErr(null);
    try {
      // /metainfo returns { getConnectors:[{id,description}], updateConnectors:[{id,description}], info:{envid,appName,group,tokenExpiry} }
      const data = await afasFetch(env.trim(), token.trim(), "/metainfo", {}, envType);
      setMetaInfo({
        getConnectors:    data.getConnectors    || [],
        updateConnectors: data.updateConnectors || [],
        info:             data.info             || {},
      });
      setSel(new Set()); // reset selection on new connection
      setStep(2);
    } catch(e) {
      setErr(`Verbinding mislukt: ${e.message}`);
    } finally { setTesting(false); }
  };

  const handleFinish = () => {
    const conns = [...sel].map(key => {
      const colon = key.indexOf(":");
      const type  = key.slice(0, colon);
      const name  = key.slice(colon + 1);
      const isGet = type === "get";
      return {
        id: uid(), name, label: name, connType: type,
        icon: isGet ? "📋" : "✏️",
        take: isGet ? 100 : 0,
        filter: null,
        updateConn: isGet ? null : name,
        keyField: null,
      };
    });
    onConnect({ env:env.trim(), token:token.trim(), envType }, conns);
  };

  const StepDot = ({ n }) => {
    const s = step > n ? "done" : step === n ? "active" : "idle";
    return <div className={`step-n ${s}`}>{step > n ? "✓" : n}</div>;
  };

  const totalConns = metaInfo ? (metaInfo.getConnectors.length + metaInfo.updateConnectors.length) : 0;

  return (
    <div className="setup-screen">
      <div className="setup-card" style={{ width:560 }}>
        <div className="setup-head">
          <div className="setup-title">{onCancel ? "Nieuw profiel toevoegen" : "Verbinden met AFAS Profit"}</div>
          <div className="setup-sub">Voer je omgevingstype, nummer en App token in. Na het testen worden alle beschikbare connectoren automatisch opgehaald.</div>
          <div className="steps">
            <div className="step-item"><StepDot n={1} /><div className="step-lbl">Verbinding</div></div>
            <div className="step-line" />
            <div className="step-item"><StepDot n={2} /><div className="step-lbl">Connectoren kiezen</div></div>
          </div>
        </div>

        {/* ── STAP 1: Verbinding ── */}
        {step === 1 && <>
          <div className="setup-body">

            {/* Omgevingstype tiles */}
            <div className="fgrp">
              <div className="flbl">Omgevingstype <span>*</span></div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:".5rem" }}>
                {[
                  { value:"production", label:"Productie", prefix:"O", color:"var(--green)",  bg:"var(--gb)", border:"rgba(34,197,94,.3)" },
                  { value:"test",       label:"Test",       prefix:"T", color:"var(--amber)",  bg:"var(--ab)", border:"rgba(245,158,11,.3)" },
                  { value:"acceptance", label:"Acceptatie", prefix:"A", color:"var(--accent)", bg:"var(--ag)", border:"rgba(59,130,246,.3)" },
                ].map(opt => (
                  <div key={opt.value} onClick={() => setEnvType(opt.value)} style={{
                    padding:".55rem .7rem", borderRadius:6, cursor:"pointer", transition:"all .12s",
                    border:`1px solid ${envType===opt.value ? opt.border : "var(--b1)"}`,
                    background: envType===opt.value ? opt.bg : "var(--s2)",
                  }}>
                    <div style={{ fontFamily:"var(--mono)", fontSize:".62rem", fontWeight:700, marginBottom:".15rem",
                      color: envType===opt.value ? opt.color : "var(--t3)" }}>{opt.prefix}####
                    </div>
                    <div style={{ fontSize:".78rem", fontWeight: envType===opt.value ? 500 : 400,
                      color: envType===opt.value ? "var(--t1)" : "var(--t2)" }}>{opt.label}
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* Omgevingsnummer */}
            <div className="fgrp">
              <div className="flbl">Omgevingsnummer <span>*</span></div>
              <div style={{ display:"flex", gap:0 }}>
                <div style={{ padding:".42rem .65rem", background:"var(--s3)", border:"1px solid var(--b1)",
                  borderRight:"none", borderRadius:"5px 0 0 5px", fontFamily:"var(--mono)",
                  fontSize:".78rem", color:"var(--t3)", flexShrink:0 }}>
                  {ENV_PREFIX[envType]}
                </div>
                <input className={`finp${err ? " err" : ""}`}
                  value={env} onChange={e => setEnv(e.target.value.replace(/[^0-9]/g,""))}
                  placeholder="37372" onKeyDown={e => e.key==="Enter" && handleTest()}
                  style={{ borderRadius:"0 5px 5px 0", borderLeft:"none" }} autoFocus />
              </div>
              <div className="help-text">
                REST endpoint: <code style={{ fontFamily:"var(--mono)", fontSize:".67rem" }}>{domain}/profitrestservices</code>
              </div>
            </div>

            {/* Token */}
            <div className="fgrp">

              </div>
              <input className={`finp${err ? " err" : ""}`}
                type={showToken ? "text" : "password"} value={token}
